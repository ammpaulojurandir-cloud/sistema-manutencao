<!DOCTYPE html>
<html lang="pt-BR">

    <meta charset="UTF-8">

    <title>Sistema de Manutenção - Água</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #2c5282 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }
        
        h1 { text-align: center; margin-bottom: 5px; font-size: 1.6rem; }
        .subtitle { text-align: center; color: #a0c4e8; margin-bottom: 10px; font-size: 0.85rem; }
        
        .systems-filter { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 20px; }
        .system-btn {
            padding: 8px 16px; border: 2px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1);
            color: white; border-radius: 20px; cursor: pointer; font-size: 0.8rem; transition: all 0.3s;
        }
        .system-btn:hover, .system-btn.active { background: #3182ce; border-color: #3182ce; }
        
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .stat-card {
            backdrop-filter: blur(10px); border-radius: 12px;
            padding: 15px; text-align: center; 
            cursor: pointer; transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
        }
        .stat-card:hover { background: rgba(255,255,255,0.2); }
        .stat-number { font-size: 2rem; font-weight: bold; }
        .stat-label { font-size: 0.75rem; color: #a0c4e8; margin-top: 5px; font-weight: 600;}
        
        #card-all .stat-number { color: #63b3ed; }
        #card-ok { background: rgba(56, 161, 105, 0.15); border-color: rgba(56, 161, 105, 0.3); }
        #card-ok:hover { background: rgba(56, 161, 105, 0.25); }
        #card-ok .stat-number { color: #48bb78; }
        #card-alert { background: rgba(214, 158, 46, 0.15); border-color: rgba(214, 158, 46, 0.3); }
        #card-alert:hover { background: rgba(214, 158, 46, 0.25); }
        #card-alert .stat-number { color: #ecc94b; }
        #card-down { background: rgba(229, 62, 62, 0.15); border-color: rgba(229, 62, 62, 0.3); }
        #card-down:hover { background: rgba(229, 62, 62, 0.25); }
        #card-down .stat-number { color: #f56565; }

        .search-box {
            width: 100%; padding: 12px; border: none; border-radius: 10px; margin-bottom: 15px;
            font-size: 0.95rem; background: rgba(255,255,255,0.15); color: white;
        }
        .search-box::placeholder { color: #a0c4e8; }
        
        .equipment-list {
            background: rgba(255,255,255,0.05); border-radius: 15px; overflow: hidden;
            max-height: 60vh; overflow-y: auto;
        }
        .equipment-item {
            padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); display: grid;
            grid-template-columns: 45px 1fr auto; gap: 12px; align-items: center; transition: background 0.3s; cursor: pointer;
        }
        .equipment-item:hover { background: rgba(255,255,255,0.1); }
        
        .status-icon { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
        .status-ok { background: #38a169; }
        .status-alert { background: #d69e2e; }
        .status-down { background: #e53e3e; }
        
        .equipment-name { font-weight: 600; font-size: 0.9rem; }
        .equipment-system { font-size: 0.75rem; color: #a0c4e8; margin-top: 2px; }
        
        .status-badge { padding: 4px 10px; border-radius: 15px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; }
        .badge-ok { background: #38a169; }
        .badge-alert { background: #d69e2e; }
        .badge-down { background: #e53e3e; }
        
        .system-tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.65rem; margin-top: 3px; }
        .tag-100 { background: #e53e3e; } .tag-200 { background: #dd6b20; } .tag-300 { background: #d69e2e; }
        .tag-400 { background: #38a169; } .tag-600 { background: #3182ce; } .tag-700 { background: #805ad5; }

        function getSystemTagClass(code) { return `tag-${code}`; }
        
        let currentSystemFilter = 'all';
        let currentStatusFilter = 'all'; 

        function saveData() {
            localStorage.setItem('manutencao_equipment', JSON.stringify(equipment));
        }
        
        function loadData() {
            const saved = localStorage.getItem('manutencao_equipment');
            if (saved) {
                const savedEquipment = JSON.parse(saved);
                savedEquipment.forEach(savedEq => {
                    const eq = equipment.find(e => e.id === savedEq.id);
                    if (eq) {
                        eq.status = savedEq.status;
                        eq.ultimoTecnico = savedEq.ultimoTecnico;
                        eq.ultimaAlteracao = savedEq.ultimaAlteracao;
                        eq.historico = savedEq.historico;
                    }
                });
            }
        }
        
        function renderEquipment(list = equipment) {
            const container = document.getElementById('equipmentList');
            container.innerHTML = list.map(eq => `
                <div class="equipment-item" onclick="openEquipment('${eq.id}')">
                    <div class="status-icon status-${eq.status}">
                        ${eq.status === 'ok' ? '✓' : eq.status === 'alert' ? '!' : '✕'}
                    </div>
                    <div>
                        <div class="equipment-name">${eq.name}</div>
                        <div class="equipment-system">
                            <span class="system-tag ${getSystemTagClass(eq.systemCode)}">${eq.systemCode}</span>
                            ${eq.system.toUpperCase()} | ID: ${eq.id}
                            ${eq.ultimoTecnico ? `<br><span style="font-size: 0.7rem; color: #63b3ed;">👤 ${eq.ultimoTecnico} | 🕐 ${eq.ultimaAlteracao}</span>` : ''}
                            ${(eq.status === 'alert' || eq.status === 'down') && eq.ultimaAlteracao ? `<br><span style="color: ${eq.status === 'alert' ? '#ecc94b' : '#f56565'}; font-size: 0.7rem; font-weight: bold;">⚠️ Status atual desde: ${eq.ultimaAlteracao}</span>` : ''}
                        </div>
                    </div>
                    <span class="status-badge badge-${eq.status}">
                        ${eq.status === 'ok' ? 'Operando' : eq.status === 'alert' ? 'Atenção' : 'Parado'}
                    </span>
                </div>
            `).join('');
            
            let activeList = (currentSystemFilter !== 'all') ? equipment.filter(e => e.system === currentSystemFilter) : equipment;
            
            document.getElementById('totalCount').textContent = activeList.length;
            document.getElementById('operationalCount').textContent = activeList.filter(e => e.status === 'ok').length;
            document.getElementById('maintenanceCount').textContent = activeList.filter(e => e.status === 'alert').length;
            document.getElementById('downCount').textContent = activeList.filter(e => e.status === 'down').length;
        }
        
        function filterSystem(system) {
            currentSystemFilter = system;
            
            document.querySelectorAll('.system-btn').forEach(btn => btn.classList.remove('active'));
            if(event) event.target.classList.add('active');
            
            applyFilters();
        }

        function filterByStatus(status) {
            currentStatusFilter = status;

            const borderColors = {
                'all': '#63b3ed',     
                'ok': '#48bb78',      
                'alert': '#ecc94b',   
                'down': '#f56565'     
            };

            document.getElementById('card-all').style.border = '1px solid rgba(255,255,255,0.2)';
            document.getElementById('card-ok').style.border = '1px solid rgba(56, 161, 105, 0.3)';
            document.getElementById('card-alert').style.border = '1px solid rgba(214, 158, 46, 0.3)';
            document.getElementById('card-down').style.border = '1px solid rgba(229, 62, 62, 0.3)';

            document.getElementById('card-' + status).style.border = `2px solid ${borderColors[status]}`;

            applyFilters();
        }

        function searchEquipment() {
            applyFilters();
        }

        function applyFilters() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            let filtered = equipment;

            if (currentSystemFilter !== 'all') {
                filtered = filtered.filter(eq => eq.system === currentSystemFilter);
            }

            if (currentStatusFilter !== 'all') {
                filtered = filtered.filter(eq => eq.status === currentStatusFilter);
            }

            if (term !== '') {
                filtered = filtered.filter(eq => 
                    eq.name.toLowerCase().includes(term) ||
                    eq.system.toLowerCase().includes(term) ||
                    eq.id.toLowerCase().includes(term) ||
                    eq.systemCode.includes(term)
                );
            }

            renderEquipment(filtered);
        }
        
        function openEquipment(id) {
            const eq = equipment.find(e => e.id === id);
            
            const existingModal = document.getElementById('qrModal');
            if (existingModal) existingModal.remove();

            const modal = document.createElement('div');
            modal.id = 'qrModal';
            modal.style.cssText = `
                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(0,0,0,0.8); display: flex; align-items: center;
                justify-content: center; z-index: 1000; padding: 20px;
            `;
            
            const statusColors = { 'ok': '#38a169', 'alert': '#d69e2e', 'down': '#e53e3e' };
            const statusLabels = { 'ok': 'OPERANDO', 'alert': 'MANUTENÇÃO', 'down': 'PARADO' };
            
            modal.innerHTML = `
                <div style="background: white; padding: 30px; border-radius: 20px; text-align: center; max-width: 400px; width: 90%; max-height: 90vh; overflow-y: auto;">
                    <h2 style="color: #1e3a5f; margin-bottom: 10px; font-size: 1.2rem;">${eq.name}</h2>
                    <p style="color: #666; margin-bottom: 15px; font-size: 0.9rem;">ID: ${eq.id} | Sistema: ${eq.system.toUpperCase()}</p>
                    
                    <div style="margin: 20px 0; padding: 15px; background: #f7fafc; border-radius: 10px;">
                        <p style="color: #666; font-size: 0.8rem; margin-bottom: 10px;">STATUS ATUAL:</p>
                        <div style="display: inline-block; padding: 8px 20px; border-radius: 20px; color: white; font-weight: bold; font-size: 0.9rem; background: ${statusColors[eq.status]};">
                            ${statusLabels[eq.status]}
                        </div>
                    </div>

                    ${eq.ultimoTecnico ? `
                    <div style="margin: 15px 0; padding: 10px; background: #e6fffa; border-radius: 10px; border-left: 4px solid #38a169; text-align: left;">
                        <p style="color: #234e52; font-size: 0.8rem; margin: 0;">
                            👤 <strong>Última alteração por:</strong> ${eq.ultimoTecnico}<br>
                            🕐 <strong>Data/Hora:</strong> ${eq.ultimaAlteracao}
                        </p>
                    </div>
                    ` : ''}
                    
                    ${eq.historico && eq.historico.length > 0 ? `
                    <div style="margin: 15px 0; max-height: 100px; overflow-y: auto; text-align: left; background: #f9f9f9; padding: 10px; border-radius: 8px;">
                        <p style="color: #666; font-size: 0.75rem; margin-bottom: 5px;"><strong>Histórico Recente:</strong></p>
                        ${eq.historico.slice(-3).map(h => `
                            <div style="font-size: 0.7rem; color: #666; padding: 3px 0; border-bottom: 1px solid #eee;">
                                ${h.data} - <strong>${h.tecnico}</strong>: <em>${statusLabels[h.statusAnterior]} → ${statusLabels[h.statusNovo]}</em>
                            </div>
                        `).join('')}
                    </div>
                    ` : ''}
                    
                    <p style="color: #666; font-size: 0.8rem; margin: 15px 0;">MUDAR STATUS:</p>
                    <div style="display: flex; gap: 10px; justify-content: center; margin-bottom: 20px;">
                        <button onclick="changeStatus('${eq.id}', 'ok')" style="padding: 10px 15px; background: #38a169; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.8rem;">✓ Operando</button>
                        <button onclick="changeStatus('${eq.id}', 'alert')" style="padding: 10px 15px; background: #d69e2e; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.8rem;">🔧 Manutenção</button>
                        <button onclick="changeStatus('${eq.id}', 'down')" style="padding: 10px 15px; background: #e53e3e; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.8rem;">✕ Parado</button>
                    </div>
                    
                    <div style="margin: 20px 0;">
                        <p style="color: #666; font-size: 0.8rem; margin-bottom: 10px;">QR CODE:</p>
                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent('GRUPO:' + eq.id)}" style="width: 150px; height: 150px;" alt="QR Code">
                    </div>
                    
                    <button onclick="document.getElementById('qrModal').remove();" style="margin-top: 15px; padding: 12px 30px; background: #718096; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 1rem;">Fechar</button>
                </div>
            `;
            
            document.body.appendChild(modal);
        }
        
        function changeStatus(id, newStatus) {
            const eq = equipment.find(e => e.id === id);

            if (eq.status === newStatus) {
                alert('O equipamento já está com esse status!');
                return;
            }
            
            const tecnico = usuarioLogado.nome; 
            
            const agora = new Date();
            const horario = agora.toLocaleString('pt-BR', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });

            if (!eq.historico) {
                eq.historico = [];
            }
            
            eq.historico.push({
                data: horario,
                tecnico: tecnico,
                statusAnterior: eq.status,
                statusNovo: newStatus
            });
            
            eq.status = newStatus;
            eq.ultimoTecnico = tecnico;
            eq.ultimaAlteracao = horario;
            
            saveData();
            applyFilters();
            
            const modal = document.getElementById('qrModal');
            if (modal) {
                modal.remove();
                openEquipment(id);
            }
        }
        
        loadData();
        renderEquipment();
      </script>
</body>
</html>
