        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #2c5282 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }
        
        h1 { text-align: center; margin-bottom: 5px; font-size: 1.6rem; }
        .subtitle { text-align: center; color: #a0c4e8; margin-bottom: 10px; font-size: 0.85rem; }
        
        .systems-filter { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 20px; }
        .system-btn {
            padding: 8px 16px; border: 2px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1);
            color: white; border-radius: 20px; cursor: pointer; font-size: 0.8rem; transition: all 0.3s;
        }
        .system-btn:hover, .system-btn.active { background: #3182ce; border-color: #3182ce; }
        
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .stat-card {
            backdrop-filter: blur(10px); border-radius: 12px;
            padding: 15px; text-align: center; 
            cursor: pointer; transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
        }
        .stat-card:hover { background: rgba(255,255,255,0.2); }
        .stat-number { font-size: 2rem; font-weight: bold; }
        .stat-label { font-size: 0.75rem; color: #a0c4e8; margin-top: 5px; font-weight: 600;}
        
        #card-all .stat-number { color: #63b3ed; }
        #card-ok { background: rgba(56, 161, 105, 0.15); border-color: rgba(56, 161, 105, 0.3); }
        #card-ok:hover { background: rgba(56, 161, 105, 0.25); }
        #card-ok .stat-number { color: #48bb78; }
        #card-alert { background: rgba(214, 158, 46, 0.15); border-color: rgba(214, 158, 46, 0.3); }
        #card-alert:hover { background: rgba(214, 158, 46, 0.25); }
        #card-alert .stat-number { color: #ecc94b; }
        #card-down { background: rgba(229, 62, 62, 0.15); border-color: rgba(229, 62, 62, 0.3); }
        #card-down:hover { background: rgba(229, 62, 62, 0.25); }
        #card-down .stat-number { color: #f56565; }

        .search-box {
            width: 100%; padding: 12px; border: none; border-radius: 10px; margin-bottom: 15px;
            font-size: 0.95rem; background: rgba(255,255,255,0.15); color: white;
        }
        .search-box::placeholder { color: #a0c4e8; }
        
        .equipment-list {
            background: rgba(255,255,255,0.05); border-radius: 15px; overflow: hidden;
            max-height: 60vh; overflow-y: auto;
        }
        .equipment-item {
            padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); display: grid;
            grid-template-columns: 45px 1fr auto; gap: 12px; align-items: center; transition: background 0.3s; cursor: pointer;
        }
        .equipment-item:hover { background: rgba(255,255,255,0.1); }
        
        .status-icon { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
        .status-ok { background: #38a169; }
        .status-alert { background: #d69e2e; }
        .status-down { background: #e53e3e; }
        
        .equipment-name { font-weight: 600; font-size: 0.9rem; }
        .equipment-system { font-size: 0.75rem; color: #a0c4e8; margin-top: 2px; }
        
        .status-badge { padding: 4px 10px; border-radius: 15px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; }
        .badge-ok { background: #38a169; }
        .badge-alert { background: #d69e2e; }
        .badge-down { background: #e53e3e; }

        .main-actions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 0 0 18px 0; }
        .action-btn { padding: 10px 16px; border: 1px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.12); color: white; border-radius: 12px; cursor: pointer; font-size: 0.85rem; font-weight: 700; transition: all 0.25s; }

        .action-btn.primary { background: #3182ce; border-color: #3182ce; }
        .action-btn.success { background: #38a169; border-color: #38a169; }
        .os-card { background: #f7fafc; border-radius: 12px; padding: 12px; margin-bottom: 10px; border-left: 5px solid #3182ce; color: #1a202c; text-align: left; }
        .os-card h4 { margin: 0 0 6px 0; color: #1e3a5f; font-size: 0.95rem; }
        .os-card p { margin: 4px 0; color: #4a5568; font-size: 0.78rem; }

    function normalizarTextoGMAN(valor) { return String(valor||'').trim().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,''); }
    function normUpper(valor) { return normalizarTextoGMAN(valor).toUpperCase(); }
    function escaparHTMLGMAN(valor) { return String(valor==null?'':valor).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }
    function getCampo(obj, nomes) { for (const n of nomes) if (obj && obj[n] !== undefined && obj[n] !== null && obj[n] !== '') return obj[n]; return ''; }
    function getSystemTagClass(code) { return `tag-${code}`; }
    function isGestao() { if(!usuarioLogado) return false; return ['administrador','supervisor','coordenador','gerente'].includes(String(usuarioLogado.funcao||'').toLowerCase()); }
    function isEquipamentoBrutaGMAN(eq) { return /^(101|201|301|401|601|701)(-|)/.test(String(eq?.id||'').toUpperCase()); }
    function statusEncerrado(status) { return ['concluida','cancelada','fechada','encerrada','finalizada'].includes(normalizarTextoGMAN(status)); }
    function statusAberto(status) { return normalizarTextoGMAN(status)==='aberta'; }
    function statusIniciado(status) { const s=normalizarTextoGMAN(status); return ['em execucao','em andamento','em teste','aguardando material','aguardando liberacao','parado','em manutencao','operando com restricao'].some(x=>s.includes(x)); }
    function statusAtivo(status) { return statusAberto(status) || statusIniciado(status); }
    function osResponsavelUsuario(os) { return normalizarTextoGMAN(getCampo(os,['responsavel','RESPONSAVEL'])) === normalizarTextoGMAN(usuarioLogado?.nome); }
    function usuarioPodeAlterarOS(os) { return isGestao() || osResponsavelUsuario(os); }
    function tituloPainelOS(modo) { if(modo==='encerradas') return 'Ordens Encerradas'; if(modo==='naoIniciadas') return 'OS Não Iniciadas'; if(modo==='iniciadas') return 'OS Iniciadas'; if(modo==='minhas') return 'Minhas OS'; if(String(modo).startsWith('grupo:')) return 'OS do Grupo'; return 'OS Abertas'; }

    function statusClasseEquip(statusAtual, obs='') { const n=normalizarTextoGMAN(statusAtual+' '+obs); if(n.includes('parado')) return 'down'; if(n.includes('manutencao')||n.includes('aguard')||n.includes('teste')||n.includes('restricao')||n.includes('iniciada')) return 'alert'; return 'ok'; }
    function labelStatusEquipamento(status, observacao='') { if(status==='ok') return 'Operando'; if(status==='down') return 'Manutenção (parado)'; return 'Manutenção'; }
    function labelStatusEquipamentoMaiusculo(status, observacao='') { return labelStatusEquipamento(status, observacao).toUpperCase(); }
    function formatarDataApi(valor) { if(!valor) return ''; const txt=String(valor); if(/^\d{2}\/\d{2}\/\d{4}/.test(txt)) return txt; const d=new Date(valor); if(isNaN(d.getTime())) return txt; return d.toLocaleString('pt-BR',{timeZone:'America/Sao_Paulo',day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'}); }

    function extrairLista(retorno, chaves) { if(Array.isArray(retorno)) return retorno; for(const c of chaves) { if(Array.isArray(retorno?.[c])) return retorno[c]; if(Array.isArray(retorno?.dados?.[c])) return retorno.dados[c]; if(Array.isArray(retorno?.payload?.[c])) return retorno.payload[c]; } return []; }
    async function apiAcao(acao,dados={}) { const resp=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(Object.assign({acao},dados||{}))}); const txt=await resp.text(); let json; try{json=JSON.parse(txt)}catch(e){throw new Error('API não retornou JSON.')} if(!resp.ok||json.sucesso===false) throw new Error(json.erro||json.mensagem||('Falha na ação '+acao)); return json; }

    function atualizarIndicadorConexao(msg,tipo='neutro') { const el=document.getElementById('apiStatus'); el.textContent=msg; el.style.color= tipo==='online'?'#9ae6b4': tipo==='offline'?'#feb2b2':'#a0c4e8'; }
    function saveData() { localStorage.setItem('manutencao_equipment', JSON.stringify(equipment)); }
    function loadData() { try{ const saved=JSON.parse(localStorage.getItem('manutencao_equipment')||'[]'); saved.forEach(s=>{ const eq=equipment.find(e=>e.id===s.id); if(eq) Object.assign(eq,{status:s.status||eq.status, ultimoTecnico:s.ultimoTecnico||'', ultimaAlteracao:s.ultimaAlteracao||'', observacaoStatus:s.observacaoStatus||''}); }); }catch(e){} }

    async function carregarStatusOnline() {
      atualizarIndicadorConexao('🔄 Sincronizando status com a base oficial GMAN...', 'neutro');
      try {
        const retornoStatus = await apiAcao('listarStatus', { usuario: usuarioLogado?.nome || '' });
        const statusOnline = extrairLista(retornoStatus, ['status','statusAtual','listaStatus']);
        statusOnline.forEach(item=>{
          const id=getCampo(item,['idEquipamento','ID_EQUIPAMENTO','id','ID_GRUPO']); const eq=equipment.find(e=>String(e.id)===String(id)); if(!eq) return;
          const st=getCampo(item,['statusAtual','STATUS_ATUAL','status','STATUS_VISUAL','statusVisual'])||'Operando'; const obs=getCampo(item,['observacao','OBSERVACAO','justificativa','JUSTIFICATIVA']);
          eq.status=statusClasseEquip(st,obs); eq.ultimoTecnico=getCampo(item,['usuarioUltimaAlteracao','USUARIO_ULTIMA_ALTERACAO','usuario','USUARIO']); eq.ultimaAlteracao=formatarDataApi(getCampo(item,['dataUltimaAlteracao','DATA_ULTIMA_ALTERACAO','dataHora','DATA_HORA'])); eq.observacaoStatus=obs;
        });
        apiOnline=true; saveData(); applyFilters(); atualizarIndicadorConexao('✅ Online: status conectado à base oficial GMAN', 'online');
        setTimeout(async()=>{ try { const osOnline = await listarOSOnline(); ordensServicoCache=osOnline; atualizarTotalizadoresOS(osOnline); } catch(e) { console.warn('OS carregará sob demanda:', e); } }, 50);
        return true;
      } catch(erro) { apiOnline=false; loadData(); applyFilters(); atualizarIndicadorConexao('⚠️ Modo local: falha ao listar status — '+erro.message, 'offline'); console.error(erro); return false; }
    }
    async function listarOSOnline() { const r=await apiAcao('listarOS',{incluirEncerradas:true, usuario:usuarioLogado?.nome||''}); return extrairLista(r,['ordens','os','listaOS','ordensServico']); }
    async function apiPost(payload) { return apiAcao(payload.acao, payload); }

    function aplicarBotoesPermissao() { const g=isGestao(); ['btnPainelKPI','btnOrdensNaoIniciadasHome','btnOrdensIniciadasHome','btnOrdensEncerradasHome'].forEach(id=>{const el=document.getElementById(id); if(el) el.style.display=g?'inline-block':'none';}); const stats=document.getElementById('statsGestao'); if(stats) stats.style.display=g?'grid':'none'; }
    function fazerLogin() { const user=document.getElementById('loginUser').value.trim(); const pass=document.getElementById('loginPass').value; const erro=document.getElementById('loginErro'); erro.style.display='none'; const encontrado=usuarios.find(u=>normalizarTextoGMAN(u.nome)===normalizarTextoGMAN(user)&&u.senha===pass); if(!encontrado){erro.textContent='Usuário ou senha incorretos!';erro.style.display='block';return;} usuarioLogado=encontrado; localStorage.setItem('manutencao_usuario_logado',JSON.stringify({nome:encontrado.nome,funcao:encontrado.funcao,area:encontrado.area})); document.getElementById('loginScreen').style.display='none'; mostrarUsuarioLogado(); aplicarBotoesPermissao(); setTimeout(()=>carregarStatusOnline(),50); }
    function recuperarLoginSalvo() { try{const dados=JSON.parse(localStorage.getItem('manutencao_usuario_logado')||'null'); if(!dados) return false; const u=usuarios.find(x=>x.nome===dados.nome&&x.funcao===dados.funcao&&x.area===dados.area); if(!u) return false; usuarioLogado=u; document.getElementById('loginScreen').style.display='none'; mostrarUsuarioLogado(); aplicarBotoesPermissao(); return true;}catch(e){return false;} }
    function mostrarUsuarioLogado() { const old=document.getElementById('userInfo'); if(old) old.remove(); const header=document.querySelector('h1'); const info=document.createElement('div'); info.id='userInfo'; info.style.cssText='text-align:center;color:#a0c4e8;font-size:.85rem;margin-bottom:15px;font-weight:500;'; info.innerHTML=`👤 ${usuarioLogado.nome} | ${usuarioLogado.funcao.toUpperCase()} | ${usuarioLogado.area.toUpperCase()} <button onclick="fazerLogout()" style="margin-left:10px;padding:4px 10px;background:rgba(255,255,255,.1);color:white;border:1px solid rgba(255,255,255,.3);border-radius:5px;cursor:pointer;font-size:.75rem;">Sair</button>`; header.parentNode.insertBefore(info, header.nextSibling); }
    function fazerLogout() { localStorage.removeItem('manutencao_usuario_logado'); usuarioLogado=null; document.getElementById('loginScreen').style.display='flex'; document.getElementById('loginUser').value=''; document.getElementById('loginPass').value=''; const info=document.getElementById('userInfo'); if(info) info.remove(); aplicarBotoesPermissao(); atualizarIndicadorConexao('Aguardando login.','neutro'); }

    function renderEquipment(list=equipment) { const container=document.getElementById('equipmentList'); container.innerHTML=list.map(eq=>`<div class="equipment-item" onclick="openEquipment('${eq.id}')"><div class="status-icon status-${eq.status}">${eq.status==='ok'?'✓':eq.status==='alert'?'!':'✕'}</div><div><div class="equipment-name">${escaparHTMLGMAN(eq.name)}</div><div class="equipment-system"><span class="system-tag ${getSystemTagClass(eq.systemCode)}">${eq.systemCode}</span> ${escaparHTMLGMAN(eq.system.toUpperCase())} | ID: ${escaparHTMLGMAN(eq.id)} ${eq.ultimoTecnico?`<br><span style="font-size:.7rem;color:#63b3ed;">👤 ${escaparHTMLGMAN(eq.ultimoTecnico)} | 🕐 ${escaparHTMLGMAN(eq.ultimaAlteracao)}</span>`:''}</div></div><span class="status-badge badge-${eq.status}">${labelStatusEquipamento(eq.status,eq.observacaoStatus)}</span></div>`).join(''); let active=currentSystemFilter==='brutas'?equipment.filter(isEquipamentoBrutaGMAN):(currentSystemFilter!=='all'?equipment.filter(e=>e.system===currentSystemFilter):equipment); document.getElementById('operationalCount').textContent=active.filter(e=>e.status==='ok').length; document.getElementById('maintenanceCount').textContent=active.filter(e=>e.status==='alert'||e.status==='down').length; document.getElementById('downCount').textContent=active.filter(e=>e.status==='down').length; }
    function filterSystem(system) { currentSystemFilter=system; document.querySelectorAll('.system-btn').forEach(btn=>btn.classList.remove('active')); if(event) event.target.classList.add('active'); applyFilters(); }
    function filterByStatus(status) { currentStatusFilter=status; applyFilters(); }
    function searchEquipment() { applyFilters(); }
    function applyFilters() { const term=normalizarTextoGMAN(document.getElementById('searchInput').value); let filtered=equipment; if(currentSystemFilter==='brutas') filtered=filtered.filter(isEquipamentoBrutaGMAN); else if(currentSystemFilter!=='all') filtered=filtered.filter(eq=>eq.system===currentSystemFilter); if(currentStatusFilter!=='all') filtered=filtered.filter(eq=> currentStatusFilter==='alert' ? (eq.status==='alert'||eq.status==='down') : eq.status===currentStatusFilter); if(term) filtered=filtered.filter(eq=>normalizarTextoGMAN([eq.name,eq.system,eq.id,eq.systemCode].join(' ')).includes(term)); renderEquipment(filtered); }

    function atualizarTotalizadoresOS(lista=ordensServicoCache) { const dados=Array.isArray(lista)?lista:[]; const abertas=dados.filter(o=>statusAtivo(getCampo(o,['statusOS','STATUS_OS']))); const nao=dados.filter(o=>statusAberto(getCampo(o,['statusOS','STATUS_OS']))); const iniciadas=dados.filter(o=>statusIniciado(getCampo(o,['statusOS','STATUS_OS']))); const encerradas=dados.filter(o=>statusEncerrado(getCampo(o,['statusOS','STATUS_OS']))); const minhas=abertas.filter(osResponsavelUsuario); const set=(id,n)=>{const el=document.getElementById(id); if(el) el.textContent='('+n+')';}; set('totalOrdensAbertasHome',abertas.length); set('totalOrdensNaoIniciadasHome',nao.length); set('totalOrdensIniciadasHome',iniciadas.length); set('totalOrdensEncerradasHome',encerradas.length); set('totalOrdensAbertasPainel',abertas.length); set('totalOrdensNaoIniciadasPainel',nao.length); set('totalOrdensIniciadasPainel',iniciadas.length); set('totalMinhasOSPainel',minhas.length); set('totalOrdensEncerradasPainel',encerradas.length); return {abertas:abertas.length,naoIniciadas:nao.length,iniciadas:iniciadas.length,encerradas:encerradas.length,minhas:minhas.length}; }
    function classificarStatusOS(status) { const s=normalizarTextoGMAN(status); if(s.includes('execucao')) return 'Em execução'; if(s.includes('andamento')) return 'Em andamento'; if(s.includes('teste')) return 'Em teste'; if(s.includes('material')) return 'Aguardando material'; if(s.includes('liberacao')) return 'Aguardando liberação'; if(s.includes('parad')) return 'Parado'; if(s.includes('manutencao')) return 'Em manutenção'; if(s.includes('concluid')) return 'Concluída'; if(s.includes('cancel')) return 'Cancelada'; if(s.includes('abert')) return 'Aberta'; return status||'Sem status'; }
    function classeStatusOS(status) { const s=normalizarTextoGMAN(status); if(s.includes('exec')||s.includes('andamento')||s.includes('teste')) return 'os-execucao'; if(s.includes('concl')) return 'os-concluida'; if(s.includes('cancel')) return 'os-cancelada'; return 'os-aberta'; }
    function montarResumoOS(lista,modo,listaCompleta=ordensServicoCache) { const totalizadores=atualizarTotalizadoresOS(listaCompleta); return `<div style="background:#edf2f7;border-radius:14px;padding:12px;margin-bottom:12px;border-left:5px solid #3182ce;"><strong style="color:#1e3a5f;">Resumo — ${tituloPainelOS(modo)}</strong><div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;color:#4a5568;font-size:.78rem;font-weight:700;"><span>📋 Abertas: ${totalizadores.abertas}</span><span>⏳ Não iniciadas: ${totalizadores.naoIniciadas}</span><span>🛠️ Iniciadas: ${totalizadores.iniciadas}</span><span>👤 Minhas: ${totalizadores.minhas}</span>${isGestao()?`<span>✅ Encerradas: ${totalizadores.encerradas}</span>`:''}</div></div>`; }

    async function abrirPainelOS(modo='abertas') { if(modo==='encerradas'&&!isGestao()) return alert('Ordens encerradas são visíveis apenas para gestão.'); modoPainelOSAtual=modo; const old=document.getElementById('osModal'); if(old) old.remove(); const modal=document.createElement('div'); modal.id='osModal'; modal.className='modal-overlay'; modal.innerHTML=`<div class="modal-panel"><div style="display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:15px;"><div><h2 id="tituloPainelOS" style="color:#1e3a5f;margin:0;font-size:1.2rem;">${tituloPainelOS(modo)}</h2><p style="color:#718096;margin:4px 0 0;font-size:.82rem;">Consulta de Ordens de Serviço conforme perfil do usuário.</p></div><button onclick="document.getElementById('osModal').remove();" style="padding:10px 14px;border:none;border-radius:10px;background:#718096;color:white;cursor:pointer;">Fechar</button></div><div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;"><button onclick="mudarModoPainelOS('abertas')" style="padding:10px 14px;border:none;border-radius:10px;background:#3182ce;color:white;font-weight:bold;">📋 OS Abertas <span id="totalOrdensAbertasPainel">(0)</span></button>${isGestao()?`<button onclick="mudarModoPainelOS('naoIniciadas')" style="padding:10px 14px;border:none;border-radius:10px;background:#2c5282;color:white;font-weight:bold;">⏳ Não Iniciadas <span id="totalOrdensNaoIniciadasPainel">(0)</span></button><button onclick="mudarModoPainelOS('iniciadas')" style="padding:10px 14px;border:none;border-radius:10px;background:#d69e2e;color:white;font-weight:bold;">🛠️ Iniciadas <span id="totalOrdensIniciadasPainel">(0)</span></button>`:''}<button onclick="mudarModoPainelOS('minhas')" style="padding:10px 14px;border:none;border-radius:10px;background:#805ad5;color:white;font-weight:bold;">👤 Minhas OS <span id="totalMinhasOSPainel">(0)</span></button>${isGestao()?`<button onclick="mudarModoPainelOS('encerradas')" style="padding:10px 14px;border:none;border-radius:10px;background:#718096;color:white;font-weight:bold;">✅ Encerradas <span id="totalOrdensEncerradasPainel">(0)</span></button>`:''}<button onclick="recarregarPainelOS()" style="padding:10px 14px;border:none;border-radius:10px;background:#2c5282;color:white;font-weight:bold;">🔄 Recarregar OS</button></div><div id="osConteudo">Carregando Ordens de Serviço...</div></div>`; document.body.appendChild(modal); await recarregarPainelOS(); }
    function mudarModoPainelOS(modo) { modoPainelOSAtual=modo; const t=document.getElementById('tituloPainelOS'); if(t) t.textContent=tituloPainelOS(modo); renderizarOS(ordensServicoCache); }
    async function recarregarPainelOS() { const c=document.getElementById('osConteudo'); if(c) c.innerHTML='<p style="color:#4a5568;">🔄 Carregando...</p>'; try{ ordensServicoCache=await listarOSOnline(); atualizarTotalizadoresOS(ordensServicoCache); renderizarOS(ordensServicoCache); }catch(e){ if(c) c.innerHTML='<p style="color:#e53e3e;font-weight:bold;">Erro ao carregar OS: '+escaparHTMLGMAN(e.message)+'</p>'; } }
    function renderizarOS(lista) { const c=document.getElementById('osConteudo'); if(!c) return; let base=Array.isArray(lista)?lista.slice():[]; const modo=modoPainelOSAtual; if(String(modo).startsWith('grupo:')) base=base.filter(o=>String(getCampo(o,['idEquipamento','ID_EQUIPAMENTO']))===String(modo).replace('grupo:','')); else if(modo==='encerradas') base=isGestao()?base.filter(o=>statusEncerrado(getCampo(o,['statusOS','STATUS_OS']))):[]; else if(modo==='naoIniciadas') base=isGestao()?base.filter(o=>statusAberto(getCampo(o,['statusOS','STATUS_OS']))):[]; else if(modo==='iniciadas') base=isGestao()?base.filter(o=>statusIniciado(getCampo(o,['statusOS','STATUS_OS']))):[]; else if(modo==='minhas') base=base.filter(o=>statusAtivo(getCampo(o,['statusOS','STATUS_OS']))).filter(osResponsavelUsuario); else base=base.filter(o=>statusAtivo(getCampo(o,['statusOS','STATUS_OS']))); base.reverse(); if(!base.length){c.innerHTML=montarResumoOS(base,modo,lista)+'<p style="color:#4a5568;background:#f7fafc;padding:14px;border-radius:12px;">Nenhuma OS encontrada.</p>';return;} c.innerHTML=montarResumoOS(base,modo,lista)+base.map(cardOS).join(''); }
    function cardOS(os) { const id=getCampo(os,['idOS','ID_OS','numeroOS','NUMERO_OS']); const status=getCampo(os,['statusOS','STATUS_OS']); const encerrada=statusEncerrado(status); const permissao=usuarioPodeAlterarOS(os); const podeIniciar=!encerrada&&permissao&&statusAberto(status); const podeAcoes=!encerrada&&permissao&&(statusIniciado(status)||!statusAberto(status)); const podeCancelar=!encerrada&&isGestao(); const podeSolicitar=!encerrada&&!isGestao()&&permissao; return `<div class="os-card"><h4>${escaparHTMLGMAN(getCampo(os,['numeroOS','NUMERO_OS','idOS','ID_OS'])||id)} — ${escaparHTMLGMAN(getCampo(os,['equipamento','EQUIPAMENTO','idEquipamento','ID_EQUIPAMENTO']))}</h4><span class="os-badge ${classeStatusOS(status)}">${escaparHTMLGMAN(status||'Sem status')}</span><span class="os-badge os-aberta">${escaparHTMLGMAN(getCampo(os,['prioridade','PRIORIDADE'])||'Normal')}</span><p><strong>Área:</strong> ${escaparHTMLGMAN(getCampo(os,['area','AREA']))} | <strong>Tipo:</strong> ${escaparHTMLGMAN(getCampo(os,['tipoManutencao','TIPO_MANUTENCAO']))}</p><p><strong>Responsável:</strong> ${escaparHTMLGMAN(getCampo(os,['responsavel','RESPONSAVEL']))}</p><p><strong>Problema:</strong> ${escaparHTMLGMAN(getCampo(os,['descricaoProblema','DESCRICAO_PROBLEMA']))}</p>${!encerrada&&!permissao?'<p class="rule-box">🔒 Somente o responsável ou a gestão pode alterar esta OS.</p>':''}<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;">${podeIniciar?`<button onclick="iniciarOS('${id}')" style="padding:8px 10px;border:none;border-radius:8px;background:#d69e2e;color:white;">▶️ Iniciar</button>`:''}${podeAcoes?`<button onclick="abrirModalAndamentoOS('${id}')" style="padding:8px 10px;border:none;border-radius:8px;background:#3182ce;color:white;">📝 Atualizar andamento</button><button onclick="abrirModalConcluirOS('${id}')" style="padding:8px 10px;border:none;border-radius:8px;background:#38a169;color:white;">✅ Concluir</button>`:''}${podeCancelar?`<button onclick="cancelarOS('${i     function gerarOpcoesExecutores() { if(!isGestao()) return `<option value="${escaparHTMLGMAN(usuarioLogado?.nome||'')}">${escaparHTMLGMAN(usuarioLogado?.nome||'')}</option>`; return usuarios.filter(u=>['lider','administrador','supervisor','coordenador','gerente'].includes(u.funcao)).map(u=>`<option value="${escaparHTMLGMAN(u.nome)}">${escaparHTMLGMAN(u.nome)} — ${u.funcao.toUpperCase()} / ${u.area.toUpperCase()}</option>`).join(''); }

    function abrirModalCriarOS(idEquipamentoPreSelecionado='') { if(!usuarioLogado) return alert('Faça login para abrir OS.'); if(!idEquipamentoPreSelecionado) return alert('Abra a OS a partir de um grupo/equipamento.'); const eq=equipment.find(e=>e.id===idEquipamentoPreSelecionado); const old=document.getElementById('criarOSModal'); if(old) old.remove(); const modal=document.createElement('div'); modal.id='criarOSModal'; modal.className='modal-overlay'; modal.innerHTML=`<div class="modal-panel" style="max-width:620px;"><h2 style="color:#1e3a5f;margin:0 0 8px;">Abrir Ordem de Serviço</h2><div class="info-box"><strong>Grupo selecionado:</strong><br>${escaparHTMLGMAN(eq?.id||idEquipamentoPreSelecionado)} — ${escaparHTMLGMAN(eq?.name||'')}</div><input type="hidden" id="osEquipamento" value="${escaparHTMLGMAN(idEquipamentoPreSelecionado)}"><label class="form-label">Equipamento solicitado dentro do grupo</label><div style="background:#f7fafc;border:1px solid #e2e8f0;border-radius:12px;padding:10px;margin-bottom:10px;">${componentesAberturaHTML()}</div><label class="form-label">Área / setor</label><select id="osArea" class="form-field"><option value="">Selecione</option><option>Mecânica</option><option>Elétrica</option><option>Automação</option><option>Usinagem</option><option>Caldeiraria</option><option>Instalações Mecânicas</option></select><label class="form-label">Tipo de manutenção</label><select id="osTipo" class="form-field"><option value="">Selecione</option><option>Corretiva</option><option>Preventiva</option><option>Preditiva</option><option>Melhoria</option></select><label class="form-label">Prioridade</label><select id="osPrioridade" class="form-field"><option value="">Selecione</option><option>Normal</option><option>Alta</option><option>Crítica</option><option>Baixa</option></select><label class="form-label">Executor principal / responsável</label><select id="osResponsavel" class="form-field">${gerarOpcoesExecutores()}</select><p class="small-help">Membros da equipe não entram na abertura; são obrigatórios somente no encerramento.</p><label class="form-label">Descrição do problema</label><textarea id="osDescricao" class="form-field" rows="4"></textarea><div style="display:flex;gap:10px;justify-content:flex-end;"><button onclick="document.getElementById('criarOSModal').remove();" style="padding:11px 14px;border:none;border-radius:10px;background:#718096;color:white;">Cancelar</button><button onclick="criarOSPeloModal()" style="padding:11px 14px;border:none;border-radius:10px;background:#38a169;color:white;font-weight:bold;">Criar OS</button></div></div>`; document.body.appendChild(modal); }
    async function criarOSPeloModal() { const idEquipamento=document.getElementById('osEquipamento').value; const eq=equipment.find(e=>e.id===idEquipamento); const componentes=Array.from(document.querySelectorAll('.osComponenteSolicitado:checked')).map(x=>x.value); const area=document.getElementById('osArea').value; const tipoManutencao=document.getElementById('osTipo').value; const prioridade=document.getElementById('osPrioridade').value; const responsavel=document.getElementById('osResponsavel').value.trim(); const descricaoProblema=document.getElementById('osDescricao').value.trim(); const faltas=[]; if(!componentes.length) faltas.push('equipamento solicitado dentro do grupo'); if(!area) faltas.push('área/setor'); if(!tipoManutencao) faltas.push('tipo de manutenção'); if(!prioridade) faltas.push('prioridade'); if(!responsavel) faltas.push('executor principal'); if(!descricaoProblema) faltas.push('descrição do problema'); if(faltas.length) return alert('Preencha: '+faltas.join(', ')+'.'); try{ await apiPost({acao:'criarOS', usuario:usuarioLogado.nome, perfil:usuarioLogado.funcao, funcao:usuarioLogado.funcao, idEquipamento, equipamento:eq?.name||'', sistema:eq?.systemCode||'', area, tipoManutencao, prioridade, descricaoProblema, equipeResponsavel:area, responsavel, componentesSolicitados:componentes.join(', ')}); document.getElementById('criarOSModal').remove(); alert('OS criada com sucesso.'); await carregarStatusOnline(); }catch(e){alert('Erro ao criar OS: '+e.message);} }
    function iniciarOS(idOS) { abrirModalIniciarOS(idOS); }
    function abrirModalIniciarOS(idOS) { const os=ordensServicoCache.find(o=>String(getCampo(o,['idOS','ID_OS','numeroOS','NUMERO_OS']))===String(idOS)); if(!os) return alert('OS não localizada.'); if(!usuarioPodeAlterarOS(os)) return alert('Permissão bloqueada.'); const old=document.getElementById('iniciarOSModal'); if(old) old.remove(); const modal=document.createElement('div'); modal.id='iniciarOSModal'; modal.className='modal-overlay'; modal.innerHTML=`<div class="modal-panel" style="max-width:520px;"><h2 style="color:#1e3a5f;margin:0 0 12px;">Iniciar OS</h2><p class="small-help">Iniciar OS exige informar a condição operacional real. Status da OS e status operacional são separados.</p><label class="form-label">Condição operacional real</label><select id="iniciarCondicao" class="form-field"><option value="">Selecione</option><option>Operando</option><option>Em manutenção (operando)</option><option>Em manutenção (parado)</option><option>Parado</option><option>Aguardando material</option><option>Aguardando liberação</option><option>Em teste</option></select><label class="form-label">Justificativa obrigatória</label><textarea id="iniciarJustificativa" class="form-field" rows="4" placeholder="Informe o motivo/condição real no início da OS"></textarea><div style="display:flex;gap:10px;justify-content:flex-end;"><button onclick="document.getElementById('iniciarOSModal').remove();" style="padding:11px 14px;border:none;border-radius:10px;background:#718096;color:white;">Voltar</button><button onclick="confirmarInicioOS('${idOS}')" style="padding:11px 14px;border:none;border-radius:10px;background:#d69e2e;color:white;font-weight:bold;">Iniciar OS</button></div></div>`; document.body.appendChild(modal); }
    async function confirmarInicioOS(idOS) { const condicao=document.getElementById('iniciarCondicao').value; const justificativa=document.getElementById('iniciarJustificativa').value.trim(); if(!condicao) return alert('Informe a condição operacional real.'); if(!justificativa) return alert('Justificativa obrigatória para iniciar OS.'); try{ await apiPost({acao:'iniciarOS', idOS, usuario:usuarioLogado.nome, perfil:usuarioLogado.funcao, funcao:usuarioLogado.funcao, condicaoOperacional:condicao, justificativa, observacao:justificativa}); document.getElementById('iniciarOSModal').remove(); alert('OS iniciada com condição operacional registrada.'); await recarregarPainelOS(); await carregarStatusOnline(); }catch(e){alert('Erro ao iniciar OS: '+e.message);} }

    function abrirModalAndamentoOS(idOS) { const os=ordensServicoCache.find(o=>String(getCampo(o,['idOS','ID_OS','numeroOS','NUMERO_OS']))===String(idOS)); if(!os) return alert('OS não localizada.'); if(!usuarioPodeAlterarOS(os)) return alert('Permissão bloqueada.'); const old=document.getElementById('andamentoOSModal'); if(old) old.remove(); const modal=document.createElement('div'); modal.id='andamentoOSModal'; modal.className='modal-overlay'; modal.innerHTML=`<div class="modal-panel" style="max-width:520px;"><h2 style="color:#1e3a5f;margin:0 0 12px;">Atualizar andamento da OS</h2><label class="form-label">Status da OS</label><select id="andamentoStatusOS" class="form-field"><option>Em andamento</option><option>Em execução</option><option>Aguardando material</option><option>Aguardando liberação</option><option>Em teste</option><option>Pendente</option></select><label class="form-label">Condição operacional</label><select id="andamentoCondicao" class="form-field"><option>Em manutenção (operando)</option><option>Em manutenção (parado)</option><option>Parado</option><option>Aguardando material</option><option>Aguardando liberação</option><option>Em teste</option></select><label class="form-label">Justificativa obrigatória</label><textarea id="andamentoObs" class="form-field" rows="4"></textarea><div style="display:flex;gap:10px;justify-content:flex-end;"><button onclick="document.getElementById('andamentoOSModal').remove();" style="padding:11px 14px;border:none;border-radius:10px;background:#718096;color:white;">Voltar</button><button onclick="atualizarAndamentoOS('${idOS}')" style="padding:11px 14px;border:none;border-radius:10px;background:#3182ce;color:white;font-weight:bold;">Salvar andamento</button></div></div>`; document.body.appendChild(modal); }
    async function atualizarAndamentoOS(idOS) { const statusOS=document.getElementById('andamentoStatusOS').value; const condicaoOperacional=document.getElementById('andamentoCondicao').value; const justificativa=document.getElementById('andamentoObs').value.trim(); if(!justificativa) return alert('Justificativa obrigatória.'); try{ await apiPost({acao:'atualizarAndamentoOS', idOS, usuario:usuarioLogado.nome, perfil:usuarioLogado.funcao, funcao:usuarioLogado.funcao, statusOS, condicaoOperacional, justificativa, observacao:justificativa}); document.getElementById('andamentoOSModal').remove(); alert('Andamento atualizado.'); await recarregarPainelOS(); await carregarStatusOnline(); }catch(e){alert('Erro ao atualizar andamento: '+e.message);} }

    function areaPatrimonioOpcional(os) { const t=normalizarTextoGMAN([getCampo(os,['area','AREA']),getCampo(os,['equipeResponsavel','EQUIPE_RESPONSAVEL'])].join(' ')); return t.includes('usinagem')||t.includes('caldeiraria')||t.includes('instalacoes mecanicas'); }
    function camposPatrimonioHTML(os) { const opcional=areaPatrimonioOpcional(os); return COMPONENTES.map(c=>`<div style="display:grid;grid-template-columns:150px 1fr 1fr;gap:8px;align-items:start;margin-bottom:9px;padding:9px;border:1px solid #e2e8f0;border-radius:12px;background:#fff;"><strong style="color:#1e3a5f;margin-top:9px;">${c[1]}</strong><div><input id="pat_${c[0]}" class="form-field" placeholder="${c[4]&&!opcional?'PAT obrigatório':'PAT opcional'}"><label style="color:#2d3748;font-size:.75rem;"><input type="checkbox" id="conf_${c[0]}"> Confirmar patrimônio já cadastrado</label></div><textarea id="desc_${c[0]}" class="form-field" rows="3" placeholder="${(FICHAS[c[0]]||[]).join('; ')}"></textarea></div>`).join(''); }
    function abrirModalConcluirOS(idOS) { const os=ordensServicoCache.find(o=>String(getCampo(o,['idOS','ID_OS','numeroOS','NUMERO_OS']))===String(idOS)); if(!os) return alert('OS não localizada.'); if(!usuarioPodeAlterarOS(os)) return alert('Permissão bloqueada.'); const old=document.getElementById('concluirOSModal'); if(old) old.remove(); const modal=document.createElement('div'); modal.id='concluirOSModal'; modal.className='modal-overlay'; modal.innerHTML=`<div class="modal-panel" style="max-width:760px;"><h2 style="color:#1e3a5f;margin:0 0 12px;">Concluir OS</h2><p class="small-help">Concluir somente quando a situação final for Operando. Caso contrário, use Atualizar andamento.</p><label class="form-label">Serviço executado</label><textarea id="concluirServico" class="form-field" rows="4"></textarea><label class="form-label">Materiais utilizados</label><textarea id="concluirMateriais" class="form-field" rows="3"></textarea><label class="form-label">Membros da equipe que participaram</label><textarea id="concluirMembrosEquipe" class="form-field" rows="2"></textarea><label class="form-label">Situação final do equipamento</label><select id="concluirSituacaoFinal" class="form-field"><option>Operando</option></select><label class="form-label">Observação final / justificativa final</label><textarea id="concluirObservacaoFinal" class="form-field" rows="3"></textarea><div class="info-box"><label style="color:#1e3a5f;font-weight:800;"><input type="checkbox" id="concluirSemUsoVeiculo" onchange="toggleVeiculo()"> Sem uso de veículo</label></div><div id="camposVeiculo"><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;"><div><label class="form-label">Motorista</label><input id="concluirMotorista" class="form-field"></div><div><label class="form-label">Prefixo do veículo</label><input id="concluirPrefixoVeiculo" class="form-field"></div><div><label class="form-label">KM inicial</label><input id="concluirKmInicial" class="form-field" type="number" min="0"></div><div><label class="form-label">KM final</label><input id="concluirKmFinal" class="form-field" type="number" min="0"></div></div></div><label class="form-label">Equipamentos/características adicionais</label><textarea id="concluirExtras" class="form-field" rows="2"></textarea><div class="rule-box"><strong>Patrimônio e ficha técnica</strong><br>PAINEL, MOTOR, BOMBA, Válvula de Sucção, Válvula de Recalque e Válvula de Retenção exigem PAT, exceto Usinagem, Caldeiraria e Instalações Mecânicas. Tubulação não exige PAT.</div>${camposPatrimonioHTML(os)}<div class="info-box"><p style="margin-bottom:8px;">📎 Evidências: até 2 fotos por usuário e 1 áudio de até 1 minuto. Vídeo bloqueado.</p><input id="anexoFoto1OS" type="file" accept="image/*" capture="environment" class="form-field"><input id="anexoFoto2OS" type="file" accept="image/*" capture="environment" class="form-field"><input id="anexoAudioOS" type="file" accept="audio/*" capture="microphone" class="form-field"><input id="anexoObsOS" class="form-field" placeholder="Observação da evidência"></div><div style="display:flex;gap:10px;justify-content:flex-end;"><button onclick="document.getElementById('concluirOSModal').remove();" style="padding:11px 14px;border:none;border-radius:10px;background:#718096;color:white;">Voltar</button><button onclick="concluirOS('${idOS}')" style="padding:11px 14px;border:none;border-radius:10px;background:#38a169;color:white;font-weight:bold;">Concluir OS</button></div></div>`; document.body.appendChild(modal); }
    function toggleVeiculo() { const sem=document.getElementById('concluirSemUsoVeiculo')?.checked; const box=document.getElementById('camposVeiculo'); if(box) box.style.display=sem?'none':'block'; }
    function coletarPatrimonios(os) { const obj={}; COMPONENTES.forEach(c=>{ obj[c[2]]=document.getElementById('pat_'+c[0])?.value.trim()||''; obj[c[2].toLowerCase()]=obj[c[2]]; obj[c[3]]=document.getElementById('desc_'+c[0])?.value.trim()||''; obj[c[3].toLowerCase()]=obj[c[3]]; obj['CONFIRMA_'+c[2]]=document.getElementById('conf_'+c[0])?.checked||false; obj['confirma_'+c[2].toLowerCase()]=obj['CONFIRMA_'+c[2]]; }); return obj; }
    async function concluirOS(idOS) { const os=ordensServicoCache.find(o=>String(getCampo(o,['idOS','ID_OS','numeroOS','NUMERO_OS']))===String(idOS)); const servico=document.getElementById('concluirServico').value.trim(); const materiais=document.getElementById('concluirMateriais').value.trim(); const membros=document.getElementById('concluirMembrosEquipe').value.trim(); const observacao=document.getElementById('concluirObservacaoFinal').value.trim(); const semVeic=document.getElementById('concluirSemUsoVeiculo').checked; const faltas=[]; if(!servico) faltas.push('serviço executado'); if(!materiais) faltas.push('materiais utilizados'); if(!membros) faltas.push('membros da equipe'); if(!observacao) faltas.push('observação final'); if(!semVeic){ if(!document.getElementById('concluirMotorista').value.trim()) faltas.push('motorista'); if(!document.getElementById('concluirPrefixoVeiculo').value.trim()) faltas.push('prefixo do veículo'); if(document.getElementById('concluirKmInicial').value==='') faltas.push('KM inicial'); if(document.getElementById('concluirKmFinal').value==='') faltas.push('KM final'); } if(faltas.length) return alert('Preencha: '+faltas.join(', ')+'.'); const payload=Object.assign({acao:'concluirOS', idOS, usuario:usuarioLogado.nome, perfil:usuarioLogado.funcao, funcao:usuarioLogado.funcao, servicoRealizado:servico, materiais, membrosEquipe:membros, situacaoFinalEquipamento:'Operando', observacaoFinal:observacao, semUsoVeiculo:semVeic, motorista:document.getElementById('concluirMotorista').value.trim(), prefixoVeiculo:document.getElementById('concluirPrefixoVeiculo').value.trim(), kmInicial:document.getElementById('concluirKmInicial').value, kmFinal:document.getElementById('concluirKmFinal').value, equipamentosAdicionais:document.getElementById('concluirExtras').value.trim()}, coletarPatrimonios(os)); try{ await apiPost(payload); document.getElementById('concluirOSModal').remove(); alert('OS concluída com sucesso.'); await recarregarPainelOS(); await carregarStatusOnline(); }catch(e){alert('Erro ao concluir OS: '+e.message);} }
    async function cancelarOS(idOS) { const motivo=prompt(isGestao()?'Motivo do cancelamento:':'Motivo da solicitação de cancelamento:')||''; if(!motivo) return alert('Motivo obrigatório.'); try{ if(isGestao()){ await apiPost({acao:'cancelarOS', idOS, usuario:usuarioLogado.nome, perfil:usuarioLogado.funcao, funcao:usuarioLogado.funcao, motivo}); alert('OS cancelada com rastreabilidade.'); } else { await apiPost({acao:'solicitarCancelamentoOS', idOS, usuario:usuarioLogado.nome, perfil:usuarioLogado.funcao, funcao:usuarioLogado.funcao, motivo}); alert('Solicitação de cancelamento registrada para avaliação da gestão.'); } await recarregarPainelOS(); }catch(e){alert('Erro no cancelamento/solicitação: '+e.message);} }

    async function solicitarRedistribuicaoOS(idOS) { const motivo=prompt('Motivo da solicitação de redistribuição:')||''; if(!motivo) return alert('Motivo obrigatório.'); try{ await apiPost({acao:'solicitarRedistribuicaoOS', idOS, usuario:usuarioLogado.nome, perfil:usuarioLogado.funcao, funcao:usuarioLogado.funcao, motivo}); alert('Solicitação de redistribuição registrada para avaliação da gestão.'); }catch(e){alert('Erro ao solicitar redistribuição: '+e.message);} }
    async function anexarArquivoOS() { alert('Evidência selecionada. O envio efetivo permanece controlado pela API/regras de evidência do sistema.'); }
    async function abrirPainelGerencial() {
      if(!isGestao()) return alert('Painel gerencial disponível somente para gestão.');
      const old=document.getElementById('kpiModal'); if(old) old.remove();
      const modal=document.createElement('div'); modal.id='kpiModal'; modal.className='modal-overlay';
      modal.innerHTML=`<div class="modal-panel" style="max-width:940px;"><div style="display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:15px;"><div><h2 style="color:#1e3a5f;margin:0;font-size:1.25rem;">Painel Gerencial — KPIs</h2><p style="color:#718096;margin:4px 0 0;font-size:.82rem;">Somente gestão. KPIs organizados em blocos, sem inventar dado.</p></div><button onclick="document.getElementById('kpiModal').remove();" style="padding:10px 14px;border:none;border-radius:10px;background:#718096;color:white;cursor:pointer;">Fechar</button></div><div id="kpiConteudo" style="color:#1a202c;">Carregando KPIs...</div></div>`;
      document.body.appendChild(modal);
      await carregarPainelGerencial();
    }
    function cardKPIHTML(k) { return `<div style="background:#f7fafc;border-radius:14px;padding:14px;border-left:5px solid ${k.status==='OK'?'#38a169':k.status==='ATENÇÃO'||k.status==='CRÍTICO'?'#d69e2e':'#3182ce'};min-height:92px;"><div style="font-size:.72rem;color:#718096;font-weight:700;text-transform:uppercase;">${escaparHTMLGMAN(k.indicador||'Indicador')}</div><div style="font-size:1.45rem;color:#1e3a5f;font-weight:800;margin-top:4px;">${escaparHTMLGMAN(k.valor)}</div><div style="font-size:.75rem;color:#4a5568;margin-top:2px;">Meta: ${escaparHTMLGMAN(k.meta||'-')}</div><div style="font-size:.72rem;color:#718096;margin-top:6px;">${escaparHTMLGMAN(k.observacao||'')}</div></div>`; }
    function rankingHTML(lista,titulo) { const itens=Array.isArray(lista)?lista.slice(0,5):[]; return `<div style="background:#f7fafc;border-radius:12px;padding:12px;"><h4 style="color:#1e3a5f;margin:0 0 8px;">${titulo}</h4>${itens.length?itens.map((x,i)=>`<div style="display:flex;justify-content:space-between;gap:10px;border-bottom:1px solid #e2e8f0;padding:6px 0;color:#2d3748;font-size:.82rem;"><span>${i+1}. ${escaparHTMLGMAN(x.item||x.nome||x.idEquipamento||'-')}</span><strong>${escaparHTMLGMAN(x.quantidade||x.total||0)}</strong></div>`).join(''):'<p style="color:#718096;margin:0;">Sem dados suficientes.</p>'}</div>`; }
    async function carregarPainelGerencial() {
      const c=document.getElementById('kpiConteudo'); if(!c) return;
      c.innerHTML='<p style="color:#4a5568;">🔄 Calculando indicadores...</p>';
      try { const r=await apiAcao('calcularKPIs',{usuario:usuarioLogado?.nome||''}); const kpis=Array.isArray(r.kpis)?r.kpis:[]; c.innerHTML=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;margin-bottom:16px;">${kpis.map(cardKPIHTML).join('')}</div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;">${rankingHTML(r.rankingReincidencia,'OS grupos de maior reincidência')}${rankingHTML(r.rankingArea,'Ocorrências por área/equipe')}${rankingHTML(r.rankingLider,'Líderes que mais atenderam OS')}</div>`; }
      catch(e) { c.innerHTML='<p style="color:#e53e3e;font-weight:bold;">Erro ao carregar KPIs: '+escaparHTMLGMAN(e.message)+'</p>'; }
    }
    function usuarioEstaPreenchendoGMAN() { const ativo=document.activeElement; return !!document.querySelector('.modal-overlay') || (ativo && ['INPUT','TEXTAREA','SELECT'].includes(ativo.tagName)); }
    async function atualizarAgora() { await carregarStatusOnline(); alert('Sistema atualizado com a base oficial GMAN.'); }
    function openEquipment(id) { const eq=equipment.find(e=>e.id===id); if(!eq) return; const old=document.getElementById('qrModal'); if(old) old.remove(); const modal=document.createElement('div'); modal.id='qrModal'; modal.className='modal-overlay'; modal.innerHTML=`<div class="modal-panel" style="max-width:430px;text-align:center;"><h2 style="color:#1e3a5f;margin-bottom:10px;font-size:1.2rem;">${escaparHTMLGMAN(eq.name)}</h2><p style="color:#666;margin-bottom:15px;font-size:.9rem;">ID: ${escaparHTMLGMAN(eq.id)} | Sistema: ${escaparHTMLGMAN(eq.system.toUpperCase())}</p><div style="margin:20px 0;padding:15px;background:#f7fafc;border-radius:10px;"><p style="color:#666;font-size:.8rem;margin-bottom:10px;">STATUS ATUAL:</p><div style="display:inline-block;padding:8px 20px;border-radius:20px;color:white;font-weight:bold;font-size:.9rem;background:${eq.status==='ok'?'#38a169':eq.status==='alert'?'#d69e2e':'#e53e3e'};">${labelStatusEquipamentoMaiusculo(eq.status,eq.observacaoStatus)}</div></div><div class="rule-box">🔒 Status bloqueado: o status do equipamento só pode ser alterado por OS.</div><div style="display:flex;flex-direction:column;gap:8px;margin:12px 0;"><button onclick="abrirPainelOS('grupo:${eq.id}')" style="padding:10px 15px;background:#3182ce;color:white;border:none;border-radius:8px;cursor:pointer;">📋 Ver OS do grupo</button><button onclick="abrirModalCriarOS('${eq.id}')" style="padding:10px 15px;background:#38a169;color:white;border:none;border-radius:8px;cursor:pointer;">➕ Abrir OS deste equipamento</button></div><button onclick="document.getElementById('qrModal').remove();" style="margin-top:15px;padding:12px 30px;background:#718096;color:white;border:none;border-radius:10px;cursor:pointer;font-size:1rem;">Fechar</button></div>`; document.body.appendChild(modal); }
    function changeStatus() { alert('Alteração direta de status bloqueada. Abra ou conclua uma OS vinculada.'); }
    async function iniciarSistema() { loadData(); renderEquipment(); const logado=recuperarLoginSalvo(); aplicarBotoesPermissao(); if(logado) setTimeout(()=>carregarStatusOnline(),50); setInterval(()=>{ if(usuarioLogado && !usuarioEstaPreenchendoGMAN()) carregarStatusOnline(); },120000); }
    iniciarSistema();
  </script>
</body>
