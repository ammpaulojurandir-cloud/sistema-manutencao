<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GMAN DMAE — Sistema de Manutenção</title>
  <style>
    :root {
      --gman-bg-0:#071525;
      --gman-bg-1:#0a2138;
      --gman-bg-2:#0d2f4d;
      --gman-card:#0f2740;
      --gman-card-2:#123452;
      --gman-line:rgba(110,193,255,.24);
      --gman-line-strong:rgba(40,169,255,.55);
      --gman-blue:#1f9cff;
      --gman-blue-2:#00c2ff;
      --gman-green:#35d07f;
      --gman-yellow:#ffd166;
      --gman-orange:#ff9f1c;
      --gman-red:#ff4d5e;
      --gman-text:#f5fbff;
      --gman-muted:#9fc0d9;
      --gman-soft:#d8efff;
      --gman-shadow:0 18px 45px rgba(0,0,0,.38);
      --gman-radius:22px;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    html { min-height:100%; background:#071525; }
    body {
      font-family:'Segoe UI', Arial, sans-serif;
      min-height:100vh;
      color:var(--gman-text);
      padding:14px 14px 86px;
      background:
        radial-gradient(circle at 18% 0%, rgba(0,194,255,.24), transparent 34%),
        radial-gradient(circle at 92% 16%, rgba(53,208,127,.11), transparent 32%),
        linear-gradient(145deg, var(--gman-bg-0) 0%, var(--gman-bg-1) 48%, #050b14 100%);
      overflow-x:hidden;
    }
    body:before {
      content:'';
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.18;
      background-image:
        linear-gradient(rgba(255,255,255,.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.045) 1px, transparent 1px);
      background-size:32px 32px;
      mask-image:linear-gradient(to bottom, #000 0%, rgba(0,0,0,.65) 44%, transparent 100%);
      z-index:-1;
    }

    h1 { text-align:center; margin:0; font-size:1.12rem; letter-spacing:.11em; text-transform:uppercase; font-weight:850; }
    .subtitle { text-align:center; color:var(--gman-muted); margin-top:4px; margin-bottom:0; font-size:.78rem; letter-spacing:.04em; }

    #loginScreen { background:linear-gradient(135deg,#0b253d 0%,#123d63 100%) !important; }
    #loginScreen > div { border:1px solid rgba(31,156,255,.22); }

    .gman-app-shell { max-width:940px; margin:0 auto; }
    .gman-topbar {
      display:grid;
      grid-template-columns:1fr auto 1fr;
      align-items:center;
      gap:10px;
      margin-bottom:12px;
    }
    .gman-user-chip {
      min-height:54px;
      border:1px solid rgba(110,193,255,.22);
      background:linear-gradient(145deg, rgba(15,39,64,.78), rgba(9,26,44,.72));
      border-radius:18px;
      display:flex;
      align-items:center;
      gap:9px;
      padding:8px 10px;
      box-shadow:0 10px 26px rgba(0,0,0,.24), inset 0 1px 0 rgba(255,255,255,.05);
      overflow:hidden;
    }
    .gman-avatar {
      width:34px;
      height:34px;
      min-width:34px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:1rem;
      background:radial-gradient(circle at 35% 30%, #e8f7ff 0%, #49b6ff 32%, #0b5d9b 100%);
      box-shadow:0 0 18px rgba(0,194,255,.34);
      position:relative;
    }
    .gman-avatar:after {
      content:'';
      width:8px;
      height:8px;
      border-radius:50%;
      background:var(--gman-green);
      border:2px solid #0d2238;
      position:absolute;
      right:-1px;
      bottom:0;
      box-shadow:0 0 8px rgba(53,208,127,.85);
    }
    .gman-user-lines { line-height:1.1; min-width:0; }
    .gman-user-name { font-weight:850; font-size:.68rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; letter-spacing:.03em; }
    .gman-user-role { color:var(--gman-muted); font-size:.58rem; margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-transform:uppercase; }
    .gman-level-badge { display:inline-block; margin-top:5px; padding:2px 7px; border-radius:999px; background:rgba(31,156,255,.18); color:#cceeff; border:1px solid rgba(31,156,255,.35); font-weight:800; font-size:.52rem; letter-spacing:.05em; }

    .gman-brand {
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      min-width:118px;
      min-height:58px;
      border-radius:20px;
      background:linear-gradient(145deg, rgba(17,55,88,.82), rgba(7,20,34,.92));
      border:1px solid rgba(80,185,255,.28);
      box-shadow:0 0 30px rgba(0,174,255,.24), inset 0 1px 0 rgba(255,255,255,.08);
      text-transform:uppercase;
    }
    .gman-brand .brand-top { font-size:.95rem; font-weight:950; letter-spacing:.14em; color:#f5fbff; text-shadow:0 0 12px rgba(0,194,255,.75); }
    .gman-brand .brand-bottom { font-size:.62rem; font-weight:850; letter-spacing:.2em; color:#5fd6ff; margin-top:1px; }
    .gman-logout-top {
      justify-self:end;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      border:1px solid rgba(255,77,94,.52);
      background:linear-gradient(145deg, rgba(255,77,94,.16), rgba(255,77,94,.07));
      color:#ffdce1;
      border-radius:16px;
      padding:10px 13px;
      font-size:.72rem;
      font-weight:850;
      cursor:pointer;
      box-shadow:0 0 18px rgba(255,77,94,.15);
    }
    .gman-title-block {
      border:1px solid rgba(110,193,255,.18);
      background:linear-gradient(145deg, rgba(9,26,44,.76), rgba(12,36,60,.62));
      border-radius:22px;
      padding:13px 12px 14px;
      margin-bottom:12px;
      box-shadow:var(--gman-shadow), inset 0 1px 0 rgba(255,255,255,.05);
    }

    .systems-filter { display:flex; flex-wrap:nowrap; gap:8px; justify-content:flex-start; margin:0 auto 12px; overflow-x:auto; padding:2px 2px 7px; scrollbar-width:none; }
    .systems-filter::-webkit-scrollbar { display:none; }
    .system-btn {
      padding:10px 14px;
      border:1px solid rgba(110,193,255,.24);
      background:linear-gradient(145deg, rgba(15,39,64,.78), rgba(10,28,46,.76));
      color:#dbefff;
      border-radius:999px;
      cursor:pointer;
      font-size:.73rem;
      font-weight:850;
      letter-spacing:.02em;
      transition:all .22s ease;
      white-space:nowrap;
      box-shadow:0 8px 18px rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.05);
    }
    .system-btn[data-system-filter="reservatorios"] {
      border-color:rgba(53,208,127,.34);
      color:#e7fff2;
    }
    .system-btn:hover, .system-btn.active {
      background:linear-gradient(145deg, rgba(31,156,255,.95), rgba(0,96,170,.86));
      border-color:rgba(0,194,255,.82);
      color:white;
      box-shadow:0 0 24px rgba(31,156,255,.32), inset 0 1px 0 rgba(255,255,255,.18);
      transform:translateY(-1px);
    }


    .quick-view-btn {
      min-width:42px;
      height:38px;
      border:1px solid rgba(110,193,255,.24);
      background:linear-gradient(145deg, rgba(15,39,64,.82), rgba(7,20,34,.86));
      color:#dbefff;
      border-radius:14px;
      cursor:pointer;
      font-size:1rem;
      font-weight:950;
      box-shadow:0 8px 18px rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.06);
      transition:all .22s ease;
      flex:0 0 auto;
    }
    .quick-view-btn:hover {
      border-color:rgba(0,194,255,.82);
      box-shadow:0 0 24px rgba(31,156,255,.3), inset 0 1px 0 rgba(255,255,255,.16);
      transform:translateY(-1px);
    }

    .search-row {
      display:grid;
      grid-template-columns:1fr 46px;
      gap:9px;
      align-items:center;
      margin-bottom:12px;
    }
    .search-row .search-box { margin-bottom:0; }
    .advanced-filter-btn {
      width:46px;
      height:46px;
      border:none;
      border-radius:16px;
      cursor:pointer;
      color:white;
      font-size:1.08rem;
      font-weight:950;
      background:linear-gradient(145deg, rgba(31,156,255,.95), rgba(0,96,170,.9));
      border:1px solid rgba(0,194,255,.55);
      box-shadow:0 12px 26px rgba(31,156,255,.25), inset 0 1px 0 rgba(255,255,255,.14);
    }
    .advanced-filter-btn:active { transform:scale(.98); }
    body.gman-view-grade .equipment-list {
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(270px, 1fr));
      gap:10px;
      background:transparent;
      border:none;
      max-height:none;
      overflow:visible;
    }
    body.gman-view-grade .equipment-item { height:100%; }

    .loading-note {
      text-align:left;
      color:var(--gman-muted);
      font-size:.76rem;
      margin:4px 0 12px;
      min-height:22px;
      border:1px solid rgba(53,208,127,.24);
      border-radius:16px;
      background:linear-gradient(145deg, rgba(53,208,127,.11), rgba(15,39,64,.7));
      padding:11px 74px 11px 14px;
      position:relative;
      box-shadow:0 12px 26px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.05);
    }
    .loading-note:before { content:'⟳'; color:var(--gman-blue-2); font-weight:900; margin-right:7px; }
    .loading-note:after {
      content:'ONLINE';
      position:absolute;
      right:10px;
      top:50%;
      transform:translateY(-50%);
      padding:4px 8px;
      border-radius:999px;
      color:#052215;
      font-size:.58rem;
      font-weight:950;
      background:linear-gradient(145deg, #6bffab, #26c875);
      box-shadow:0 0 14px rgba(53,208,127,.55);
    }

    .stats { display:grid; grid-template-columns:repeat(3, minmax(0,1fr)); gap:9px; margin-bottom:12px; }
    .stat-card {
      backdrop-filter:blur(10px);
      border-radius:18px;
      padding:12px 8px;
      text-align:center;
      cursor:pointer;
      transition:all .22s ease;
      border:1px solid rgba(110,193,255,.18);
      background:linear-gradient(145deg, rgba(15,39,64,.78), rgba(10,28,46,.78));
      box-shadow:0 12px 26px rgba(0,0,0,.24), inset 0 1px 0 rgba(255,255,255,.05);
    }
    .stat-card:hover { transform:translateY(-1px); border-color:var(--gman-line-strong); }
    .stat-number { font-size:1.42rem; font-weight:950; line-height:1; }
    .stat-label { font-size:.62rem; color:var(--gman-muted); margin-top:6px; font-weight:850; letter-spacing:.04em; }
    #card-ok { background:linear-gradient(145deg, rgba(53,208,127,.18), rgba(15,39,64,.78)); border-color:rgba(53,208,127,.28); }
    #card-ok .stat-number { color:var(--gman-green); }
    #card-alert { background:linear-gradient(145deg, rgba(255,159,28,.18), rgba(15,39,64,.78)); border-color:rgba(255,159,28,.28); }
    #card-alert .stat-number { color:var(--gman-orange); }
    #card-down { background:linear-gradient(145deg, rgba(255,77,94,.18), rgba(15,39,64,.78)); border-color:rgba(255,77,94,.28); }
    #card-down .stat-number { color:var(--gman-red); }

    .search-box {
      width:100%;
      padding:13px 14px;
      border:1px solid rgba(110,193,255,.22);
      border-radius:17px;
      margin-bottom:11px;
      font-size:.86rem;
      background:linear-gradient(145deg, rgba(15,39,64,.76), rgba(8,24,41,.76));
      color:white;
      outline:none;
      box-shadow:0 12px 26px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.05);
    }
    .search-box:focus { border-color:rgba(0,194,255,.72); box-shadow:0 0 22px rgba(0,194,255,.18), inset 0 1px 0 rgba(255,255,255,.08); }
    .search-box::placeholder { color:#8eb3cf; }

    .main-actions { display:grid; grid-template-columns:repeat(2, minmax(0,1fr)); gap:9px; justify-content:center; margin:0 0 12px; }
    .action-btn {
      padding:12px 12px;
      border:1px solid rgba(110,193,255,.22);
      background:linear-gradient(145deg, rgba(15,39,64,.8), rgba(8,24,41,.8));
      color:#edf8ff;
      border-radius:17px;
      cursor:pointer;
      font-size:.76rem;
      font-weight:900;
      transition:all .22s ease;
      box-shadow:0 12px 26px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.05);
    }
    .action-btn:hover { background:linear-gradient(145deg, rgba(31,156,255,.34), rgba(8,24,41,.86)); transform:translateY(-1px); }
    .action-btn.primary { background:linear-gradient(145deg, rgba(31,156,255,.95), rgba(14,88,150,.92)); border-color:rgba(0,194,255,.56); }
    .action-btn.success { background:linear-gradient(145deg, rgba(53,208,127,.88), rgba(13,117,66,.88)); border-color:rgba(53,208,127,.5); }

    .equipment-list { background:transparent; border-radius:0; overflow:visible; max-height:none; }
    .equipment-item {
      margin-bottom:12px;
      padding:14px;
      border:1px solid var(--gman-line);
      display:grid;
      grid-template-columns:52px 1fr auto;
      gap:12px;
      align-items:center;
      transition:all .24s ease;
      cursor:pointer;
      border-radius:22px;
      background:linear-gradient(145deg, rgba(14,38,63,.92), rgba(7,21,36,.94));
      box-shadow:0 16px 35px rgba(0,0,0,.32), inset 0 1px 0 rgba(255,255,255,.05);
      position:relative;
      overflow:hidden;
    }
    .equipment-item:before {
      content:'';
      position:absolute;
      inset:0;
      pointer-events:none;
      background:linear-gradient(100deg, rgba(255,255,255,.08), transparent 30%, transparent 70%, rgba(31,156,255,.07));
      opacity:.68;
    }
    .equipment-item:hover { transform:translateY(-2px); border-color:var(--gman-line-strong); box-shadow:0 20px 45px rgba(0,0,0,.42), 0 0 28px rgba(31,156,255,.15); }
    .equipment-item.status-card-ok { border-left:4px solid var(--gman-green); }
    .equipment-item.status-card-alert { border-left:4px solid var(--gman-orange); }
    .equipment-item.status-card-down { border-left:4px solid var(--gman-red); }

    .status-icon {
      width:48px;
      height:48px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:1.15rem;
      font-weight:950;
      color:white;
      z-index:1;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.28), 0 0 22px rgba(255,255,255,.12);
    }
    .status-ok { background:radial-gradient(circle at 35% 25%, #bfffe0 0%, var(--gman-green) 38%, #0f7a43 100%); box-shadow:0 0 22px rgba(53,208,127,.42); }
    .status-alert { background:radial-gradient(circle at 35% 25%, #fff0bd 0%, var(--gman-orange) 40%, #935400 100%); box-shadow:0 0 22px rgba(255,159,28,.42); }
    .status-down { background:radial-gradient(circle at 35% 25%, #ffd4da 0%, var(--gman-red) 40%, #8b0d1b 100%); box-shadow:0 0 22px rgba(255,77,94,.45); }
    .equipment-main { z-index:1; min-width:0; }
    .equipment-name { font-weight:950; font-size:.98rem; letter-spacing:.035em; text-transform:uppercase; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .equipment-system { font-size:.70rem; color:var(--gman-muted); margin-top:5px; line-height:1.35; }
    .equipment-responsavel { margin-top:8px; display:flex; flex-wrap:wrap; gap:8px; color:#c5e3f7; font-size:.67rem; font-weight:750; }
    .equipment-actions { z-index:1; display:flex; flex-direction:column; align-items:flex-end; gap:8px; }

    .status-badge {
      padding:6px 10px;
      border-radius:999px;
      font-size:.58rem;
      font-weight:950;
      text-transform:uppercase;
      letter-spacing:.04em;
      white-space:nowrap;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.2);
    }
    .badge-ok { background:linear-gradient(145deg, #40df8b, #159657); color:#062c19; }
    .badge-alert { background:linear-gradient(145deg, #ffc76b, #ff8f13); color:#3f2500; }
    .badge-down { background:linear-gradient(145deg, #ff7b88, #dd2337); color:#fff5f6; }

    .system-tag {
      display:inline-block;
      padding:3px 8px;
      border-radius:999px;
      font-size:.58rem;
      margin-right:4px;
      color:white;
      font-weight:950;
      box-shadow:0 0 14px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.18);
    }
    .tag-100 { background:linear-gradient(145deg,#ff5b6a,#b81224); }
    .tag-200 { background:linear-gradient(145deg,#ff9f1c,#b45a00); }
    .tag-300 { background:linear-gradient(145deg,#ffd166,#b08400); color:#241a00; }
    .tag-400 { background:linear-gradient(145deg,#35d07f,#0c8246); }
    .tag-600 { background:linear-gradient(145deg,#1f9cff,#095a9c); }
    .tag-700 { background:linear-gradient(145deg,#a78bfa,#6042b8); }

    .equipment-meta {
      grid-column:1 / -1;
      z-index:1;
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:8px;
      padding-top:11px;
      border-top:1px solid rgba(110,193,255,.13);
      margin-top:0;
    }
    .meta-chip {
      border:1px solid rgba(110,193,255,.16);
      background:rgba(255,255,255,.045);
      border-radius:15px;
      padding:8px 9px;
      min-width:0;
    }
    .meta-label { display:block; color:#7fa8c6; font-size:.56rem; text-transform:uppercase; font-weight:900; letter-spacing:.05em; margin-bottom:3px; }
    .meta-value { display:block; color:#f3fbff; font-size:.70rem; font-weight:900; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .meta-value.priority-alta { color:#ffb9c0; }
    .meta-value.priority-normal { color:#aeefff; }
    .card-mini-btn {
      width:30px;
      height:30px;
      border-radius:50%;
      border:1px solid rgba(110,193,255,.22);
      background:rgba(255,255,255,.06);
      color:#dcefff;
      cursor:pointer;
      font-weight:950;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .os-card { background:#f7fafc; border-radius:12px; padding:12px; margin-bottom:10px; border-left:5px solid #3182ce; color:#1a202c; text-align:left; }
    .os-card h4 { margin:0 0 6px 0; color:#1e3a5f; font-size:.95rem; }
    .os-card p { margin:4px 0; color:#4a5568; font-size:.78rem; }
    .os-badge { display:inline-block; padding:4px 8px; border-radius:999px; color:white; font-size:.68rem; font-weight:700; margin:2px 4px 2px 0; }
    .os-aberta { background:#3182ce; }
    .os-execucao { background:#d69e2e; }
    .os-concluida { background:#38a169; }
    .os-cancelada { background:#718096; }
    .form-field { width:100%; padding:10px; margin-bottom:10px; border:1px solid #cbd5e0; border-radius:9px; color:#1a202c; font-size:.9rem; }
    .form-label { display:block; color:#2d3748; font-size:.78rem; font-weight:700; margin:8px 0 5px; text-align:left; }
    .hidden { display:none !important; }
    .modal-panel { background:white; border-radius:20px; padding:24px; width:95%; max-width:760px; max-height:92vh; overflow-y:auto; color:#1a202c; }
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.82); z-index:1200; display:flex; align-items:center; justify-content:center; padding:18px; }
    .small-help { color:#718096; font-size:.75rem; margin:-6px 0 10px; text-align:left; }
    .rule-box { background:#fffaf0; border-left:4px solid #d69e2e; border-radius:12px; padding:10px; color:#744210; font-size:.8rem; margin:10px 0; text-align:left; }
    .info-box { background:#ebf8ff; border-left:5px solid #3182ce; border-radius:14px; padding:12px; margin:10px 0; text-align:left; color:#1e3a5f; }

    .bottom-nav {
      position:fixed;
      left:50%;
      bottom:10px;
      transform:translateX(-50%);
      width:min(94vw, 620px);
      z-index:950;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:5px;
      padding:8px;
      border-radius:24px;
      border:1px solid rgba(110,193,255,.22);
      background:linear-gradient(145deg, rgba(9,26,44,.94), rgba(5,15,27,.94));
      box-shadow:0 18px 40px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.06);
      backdrop-filter:blur(14px);
    }
    .bottom-nav button {
      border:none;
      background:transparent;
      color:#9fc0d9;
      border-radius:17px;
      padding:8px 4px;
      font-size:.58rem;
      font-weight:850;
      cursor:pointer;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:3px;
      position:relative;
    }
    .bottom-nav button strong { font-size:1rem; line-height:1; }
    .bottom-nav button.active, .bottom-nav button.center {
      color:#fff;
      background:linear-gradient(145deg, rgba(31,156,255,.35), rgba(0,194,255,.12));
      box-shadow:0 0 18px rgba(31,156,255,.18);
    }
    .bottom-nav .notify-badge {
      position:absolute;
      top:4px;
      right:20%;
      width:16px;
      height:16px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--gman-red);
      color:white;
      font-size:.52rem;
      font-weight:950;
      box-shadow:0 0 12px rgba(255,77,94,.56);
    }

    @media (max-width:560px) {
      body { padding:10px 10px 84px; }
      .gman-topbar { grid-template-columns:1fr auto 54px; gap:7px; }
      .gman-brand { min-width:104px; }
      .gman-logout-top { width:54px; padding:10px 0; font-size:0; }

    async function carregarPatrimonioExistenteGMAN85694(os) {
      try {
        const idEquip=getCampo(os,['idEquipamento','ID_EQUIPAMENTO','idGrupo','ID_GRUPO']);
        if(!idEquip) return;
        const r=await apiAcao('listarPatrimonioGrupo',{idEquipamento:idEquip, idGrupo:idEquip, usuario:usuarioLogado?.nome||'', perfil:usuarioLogado?.funcao||'', funcao:usuarioLogado?.funcao||'', area:usuarioLogado?.area||''});
        const p=r.patrimonio||r.dados||{};
        COMPONENTES.forEach(c=>{
          const pat=p[c[2]]||p[c[2].toLowerCase()]||'';
          const desc=p[c[3]]||p[c[3].toLowerCase()]||'';
          const patEl=document.getElementById('pat_'+c[0]);
          const descEl=document.getElementById('desc_'+c[0]);
          const confEl=document.getElementById('conf_'+c[0]);
          const infoEl=document.getElementById('pat_info_'+c[0]);
          if(patEl && pat) { patEl.value=pat; patEl.dataset.valorOriginal=pat; }
          if(descEl && desc) { descEl.value=desc; descEl.dataset.valorOriginal=desc; }
          if(confEl) confEl.checked=false;
          if(infoEl && (pat||desc)) infoEl.textContent='Última atualização carregada. Marque a caixa se o equipamento permanece o mesmo ou ajuste os campos se houve alteração.';
        });
      } catch(e) { console.warn('Patrimônio existente não carregado:', e); }
    }

     * GMAN 8.5.6.102 — RESET ÚNICO E AJUSTES FUNCIONAIS PÓS-TESTE
     * Motivo: checklist preenchido apontou busca bloqueada, duplicidade
     * de OS, status difícil de encontrar, horário exibido sempre 04:00,

    function gmanValorCampoLista_(obj, nomes) {
      return getCampo(obj || {}, nomes || []) || '';
    }


    function nomeSistemaCodigoGMAN_(code) {
      const c = String(code || '').replace(/\.0$/,'');
      const nomes = {'100':'moinhos de vento','200':'são joao','300':'menino deus','400':'belem novo','600':'ilha da pintada','700':'tristeza'};
      return nomes[c] || c;
    }

    function normalizarSistemaCodigoGMAN_(valor, id) {
      let s = String(valor || '').trim().replace(/\.0$/,'');
      if (s === '500') s = '300';
      if (['100','200','300','400','600','700'].includes(s)) return s;
      const pref = String(id || '').trim().split('-')[0].charAt(0);
      return ['1','2','3','4','6','7'].includes(pref) ? pref + '00' : s;
    }

    function normalizarEquipamentoOficialGMAN_(item, anterior={}) {
      const id = gmanValorCampoLista_(item,['idEquipamento','ID_EQUIPAMENTO','id','ID','ID_GRUPO','ID_NORMALIZADO']);
      const sistemaCodigo = normalizarSistemaCodigoGMAN_(gmanValorCampoLista_(item,['sistema','SISTEMA','systemCode','SYSTEM_CODE']), id);
      const nome = gmanValorCampoLista_(item,['equipamento','EQUIPAMENTO','nome','NOME','NOME_EQUIPAMENTO_GRUPO','NOME_GRUPO']) || id;
      return Object.assign({}, anterior || {}, {
        id:id,
        name:nome,
        system:nomeSistemaCodigoGMAN_(sistemaCodigo),
        systemCode:sistemaCodigo,
        bruta:gmanValorCampoLista_(item,['bruta','BRUTA','filtroBrutas','FILTRO_BRUTAS']) || (isEquipamentoBrutaGMAN({id}) ? 'SIM' : 'NÃO'),
        status:anterior.status || 'ok'
      });
    }

    async function sincronizarEquipamentosOficiaisGMAN85694_() {
      const retornoEq = await apiAcao('listarEquipamentos', { usuario: usuarioLogado?.nome || '', perfil: usuarioLogado?.funcao || '', funcao: usuarioLogado?.funcao || '', area: usuarioLogado?.area || '' });
      const listaEq = extrairLista(retornoEq, ['equipamentos','listaEquipamentos','equipment','dados']);
      if (!Array.isArray(listaEq) || !listaEq.length) throw new Error('API não retornou equipamentos oficiais. Cadastro local antigo bloqueado para evitar divergência.');
      const anteriores = {};
      equipment.forEach(e => { if (e && e.id) anteriores[String(e.id)] = e; });
      equipment = listaEq.map(item => normalizarEquipamentoOficialGMAN_(item, anteriores[String(gmanValorCampoLista_(item,['idEquipamento','ID_EQUIPAMENTO','id','ID','ID_GRUPO','ID_NORMALIZADO']))] || {})).filter(e => e.id && ['100','200','300','400','600','700'].includes(String(e.systemCode)));
      return true;
    }

    function formatarDataHoraBrasilGMAN_(data, hora, fallback) {
      const d = String(data || '').trim();
      const h = String(hora || '').trim();
      if (/^\d{2}\/\d{2}\/\d{4}/.test(d)) {
        if (/^\d{1,2}:\d{2}/.test(h)) return d.replace(/[, ]+$/,'') + ' ' + h;
        return d;
      }
      if (fallback) return formatarDataApi(fallback);
      return '';
    }

    async function carregarStatusOnline() {
      atualizarIndicadorConexao('↻ Sincronizando status com a base oficial do GMAN...', 'neutro');
      try {
        await sincronizarEquipamentosOficiaisGMAN85694_();
        const retornoStatus = await apiAcao('listarStatus', { usuario: usuarioLogado?.nome || '', perfil: usuarioLogado?.funcao || '', funcao: usuarioLogado?.funcao || '', area: usuarioLogado?.area || '' });
        const statusOnline = extrairLista(retornoStatus, ['status','statusAtual','listaStatus']);
        statusOnline.forEach(item=>{
          const id = gmanValorCampoLista_(item,['idEquipamento','ID_EQUIPAMENTO','id','ID_GRUPO']);
          const eq = equipment.find(e=>String(e.id)===String(id));
          if(!eq) return;
          const st = gmanValorCampoLista_(item,['statusAtual','STATUS_ATUAL','status','STATUS_VISUAL','statusVisual']) || 'Operando';
          const obs = gmanValorCampoLista_(item,['justificativa','JUSTIFICATIVA','observacao','OBSERVACAO','observacaoFinal','OBSERVACAO_FINAL','justificativaFinal','JUSTIFICATIVA_FINAL','servicoRealizado','SERVICO_REALIZADO','andamentoTexto','ANDAMENTO_TEXTO','motivo','MOTIVO']);
          const data = gmanValorCampoLista_(item,['dataUltimaAlteracao','DATA_ULTIMA_ALTERACAO','data','DATA']);
          const hora = gmanValorCampoLista_(item,['horaUltimaAlteracao','HORA_ULTIMA_ALTERACAO','hora','HORA']);
          const dataHora = gmanValorCampoLista_(item,['dataHora','DATA_HORA','atualizadoEm','ATUALIZADO_EM']);
          eq.status = statusClasseEquip(st,obs);
          eq.ultimoTecnico = gmanValorCampoLista_(item,['usuarioUltimaAlteracao','USUARIO_ULTIMA_ALTERACAO','usuario','USUARIO']) || eq.ultimoTecnico || '';
          eq.ultimaAlteracao = formatarDataHoraBrasilGMAN_(data, hora, dataHora) || eq.ultimaAlteracao || '';
          eq.observacaoStatus = obs;
          eq.statusAtualTexto = st;
          eq.quantidadeOSAtivas = Number(gmanValorCampoLista_(item,['quantidadeOSAtivas','QUANTIDADE_OS_ATIVAS']) || 0);
          eq.responsaveisAtivos = gmanValorCampoLista_(item,['responsaveisAtivos','RESPONSAVEIS_ATIVOS']) || '';
          eq.numeroOSAtiva = gmanValorCampoLista_(item,['numeroOS','NUMERO_OS']) || '';
        });
        apiOnline=true;
        saveData();
        applyFilters();
        atualizarIndicadorConexao('✓ Online: status conectado à base oficial do GMAN', 'online');
        setTimeout(async()=>{
          try {
            const osOnline = await listarOSOnline();
            ordensServicoCache=osOnline;
            atualizarTotalizadoresOS(osOnline);
            applyFilters();
          } catch(e) { console.warn('OS carregará sob demanda:', e); }
        }, 50);
        return true;
      } catch(erro) {
        apiOnline=false;
        loadData();
        equipment=[];
        renderEquipment([]);
        atualizarIndicadorConexao('⚠ Falha ao listar status. Cadastro local antigo bloqueado; use somente a base oficial do GMAN — '+erro.message, 'offline');
        console.error(erro);
        return false;
      }
    }

    window.toggleGavetaPatrimonio85696=function(codigo){ const el=document.getElementById('gaveta_'+codigo); if(el) el.classList.toggle('open'); };
    camposPatrimonioHTML = window.camposPatrimonioHTML = function(os){
      const opcional=areaPatrimonioOpcional(os);
      return `<div class="gman-card-dark"><h4 class="gman-section-title">Ficha técnica / Patrimônio dos equipamentos</h4><p class="gman-kpi-meta">Abra cada gaveta pelo sinal de +. Se o equipamento permanece igual, marque a confirmação externa.</p>${COMPONENTES.map(c=>{ const [codigo,label,pat,desc,obrig]=c; const existentePat=getCampo(os,[pat,pat.toLowerCase()]); const existenteDesc=getCampo(os,[desc,desc.toLowerCase()]); const campos=(FICHAS[codigo]||[]).map((nome,idx)=>campoFicha85696(codigo,nome,idx,'')).join(''); return `<div id="gaveta_${codigo}" class="gman-card-dark gman-accordion" style="margin-top:10px;"><div class="gman-accordion-title" onclick="toggleGavetaPatrimonio85696('${codigo}')"><strong>+ ${escaparHTMLGMAN(label)}</strong><span class="gman-status-pill ${obrig&&!opcional?'gman-pill-warn':'gman-pill-ok'}">${obrig&&!opcional?'PAT obrigatório':'Opcional/confirmar'}</span></div><label style="display:block;margin-top:10px;font-weight:850;"><input type="checkbox" id="conf_${codigo}" ${existentePat?'':'data-sem-pat="sim"'}> Este equipamento continua sendo o mesmo desde a última atualização</label><div class="gman-accordion-body"><label class="form-label">Patrimônio ${obrig&&!opcional?'*':''}</label><input class="form-field" id="pat_${codigo}" value="${escaparHTMLGMAN(existentePat)}" placeholder="Informe ou confirme o patrimônio"><label class="form-label">Descrição técnica</label><textarea class="form-field" id="desc_${codigo}" rows="2">${escaparHTMLGMAN(existenteDesc)}</textarea><div class="gman-form-grid">${campos}</div></div></div>`; }).join('')}</div>`;
    };

    const concluirOSBase85696 = window.concluirOS || concluirOS;
    window.concluirOS = concluirOS = async function(idOS){
      return concluirOSBase85696(idOS);
    };

    const carregarStatusOnlineBase85696 = carregarStatusOnline;
    carregarStatusOnline = window.carregarStatusOnline = async function(){ const r=await carregarStatusOnlineBase85696(); try{ aplicarLogo3DGMAN85696(); atualizarAlertasUsuario85696(); }catch(e){} return r; };
    const abrirMenuMaisBase85696 = abrirMenuMaisGMAN;
    abrirMenuMaisGMAN = window.abrirMenuMaisGMAN = function(){
      if(isGestao()||isCoordenadorGMAN()){
        const botoes=[];
        if(isGestao()) botoes.push(`<button class="gman-action-row" onclick="abrirPainelGerencial()"><span><strong>Dashboard / KPIs</strong><small>Indicadores e rankings de gestão total.</small></span><span class="gman-icon-circle">◈</span></button>`);
        botoes.push(`<button class="gman-action-row" data-gman-solicitacoes onclick="abrirSolicitacoesGestaoGMAN85696()"><span><strong>Solicitações pendentes</strong><small>Cancelamento e redistribuição aguardando resposta.</small></span><span class="gman-icon-circle">◇</span><span data-count>0</span></button>`);
        botoes.push(`<button class="gman-action-row" onclick="abrirPainelOS('abertas')"><span><strong>Ordens de Serviço</strong><small>${isGestao()?'Abertas, iniciadas, minhas e encerradas.':'OS da sua área conforme coordenação.'}</small></span><span class="gman-icon-circle">▣</span></button>`);
        if(isGestao()) botoes.push(`<button class="gman-action-row" onclick="abrirCentralSegurancaGMAN()"><span><strong>Central de Segurança</strong><small>Diagnóstico e auditoria.</small></span><span class="gman-icon-circle">⌬</span></button>`);
        modalPremiumGMAN('menuMaisGMAN','Menu Mais',isGestao()?'Recursos administrativos.':'Recursos de coordenação por área.',`<div class="gman-grid">${botoes.join('')}</div>`,'840px');
        atualizarAlertasUsuario85696();
      } else abrirMenuMaisBase85696();
    };


    const abrirNotificacoesBaseGMAN85696 = abrirNotificacoesGMAN;
    abrirNotificacoesGMAN = window.abrirNotificacoesGMAN = async function(){
      fecharPerfilDrawerGMAN();
      atualizarAlertaOS85694(minhasOSNaoIniciadas85696().length); document.querySelectorAll('.notify-badge').forEach(b=>{ b.textContent=''; b.style.display='none'; });
      const itens=[];
      minhasOSNaoIniciadas85696().forEach(o=>itens.push({tipo:'OS recebida / não iniciada',titulo:getCampo(o,['numeroOS','NUMERO_OS','idOS','ID_OS']),detalhe:`${getCampo(o,['equipamento','EQUIPAMENTO','idEquipamento','ID_EQUIPAMENTO'])} — aguardando início`, id:getCampo(o,['idOS','ID_OS','numeroOS','NUMERO_OS'])}));
      try{
        const r=await apiAcao('listarNotificacoesUsuario',{_silencioso:true, usuario:usuarioLogado.nome, perfil:usuarioLogado.funcao, funcao:usuarioLogado.funcao, area:usuarioLogado.area});
        (Array.isArray(r.notificacoes)?r.notificacoes:[]).forEach(n=>itens.push({tipo:'Resposta da gestão — '+(n.tipo||''),titulo:n.numeroOS||n.idOS,detalhe:n.mensagem||'', id:n.idOS}));
      }catch(e){}
      const criticas=equipment.filter(e=>e.status==='down');
      criticas.slice(0,6).forEach(e=>itens.push({tipo:'Equipamento crítico',titulo:e.id,detalhe:nomeGrupoVisualGMAN(e.name)}));
      modalPremiumGMAN('notificacoesGMAN','Notificações','OS recebidas, respostas da gestão e alertas carregados para o usuário logado.',
        itens.length ? `<div class="gman-action-list">${itens.map((n,i)=>`<div class="gman-card-dark gman-click-card" ${n.id?`onclick="abrirDetalheOS85694('${escaparHTMLGMAN(n.id)}')"`:''} style="border-left:4px solid ${i%2?'var(--gman-orange)':'var(--gman-red)'};"><div class="gman-kpi-label">${escaparHTMLGMAN(n.tipo)}</div><div class="gman-kpi-value" style="font-size:1rem;">${escaparHTMLGMAN(n.titulo||'Sem título')}</div><div class="gman-kpi-meta">${escaparHTMLGMAN(n.detalhe||'')}</div></div>`).join('')}</div>` : `<div class="gman-card-dark"><span class="gman-status-pill gman-pill-ok">Sem alertas ativos</span><p style="color:var(--gman-muted);margin-top:8px;">Não há OS não iniciada nem resposta pendente carregada no momento.</p></div>`, '760px');
    };

    setTimeout(()=>{ try { aplicarBotoesPermissao(); } catch(e){} }, 100);
    iniciarSistema();

  </script>
  </main>
  <nav class="bottom-nav" aria-label="Navegação principal GMAN">
    <button class="active" onclick="window.scrollTo({top:0,behavior:'smooth'});"><strong>⌂</strong>Início</button>
    <button onclick="abrirPainelGerencial();"><strong>◈</strong>Dashboard</button>
    <button class="center" onclick="abrirMenuFABGMAN();"><strong>＋</strong>Nova OS</button>
    <button onclick="abrirNotificacoesGMAN();"><strong>⌁</strong>Notificações<span class="notify-badge"></span></button>
    <button onclick="abrirMenuMaisGMAN();"><strong>☰</strong>Mais</button>
  </nav>
</body>
</html>
