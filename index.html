<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Manutenção GMAN - V8.5.7.9</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #1e3a5f 0%, #2c5282 100%); min-height: 100vh; color: white; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .header { text-align: center; margin-bottom: 20px; }
        .card { background: white; color: #333; padding: 20px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; transition: 0.3s; }
        .btn-primary { background: #3182ce; color: white; }
        .btn-success { background: #38a169; color: white; }
        .btn-close { background: #718096; color: white; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #cbd5e0; font-size: 1rem; }
        .status-tag { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; color: white; }
        .tag-sim { background: #e53e3e; } 
        .tag-nao { background: #38a169; } 
    </style>
</head>
<body>

<div class="container">
    <div id="loginScreen" class="card" style="text-align: center;">
        <h2 style="color: #1e3a5f;">GMAN Maintenance</h2>
        <p style="color: #718096; margin-bottom: 20px;">Água Potável - Grupos Motobombas</p>
        <input type="text" id="loginUser" placeholder="Nome Completo">
        <input type="password" id="loginPass" placeholder="Senha">
        <button class="btn btn-primary" onclick="fazerLogin()">Entrar no Sistema</button>
    </div>

    <div id="appScreen" style="display: none;">
        <div class="header">
            <h2 id="welcomeText">👤 Usuário</h2>
            <button onclick="location.reload()" style="background:none; border:1px solid white; color:white; padding:5px 10px; border-radius:5px; cursor:pointer;">Sair</button>
        </div>

        <div class="card">
            <h3>Equipamentos</h3>
            <div id="listaEquipamentos" style="margin-top: 15px; color: #4a5568;">Carregando dados do Banco Central...</div>
        </div>
    </div>
</div>

<div id="modalConcluir" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center; padding:20px;">
    <div class="card" style="width:100%; max-width:500px;">
        <h3>Concluir Ordem de Serviço</h3>
        <label>Motorista</label>
        <input type="text" id="concluirMotorista" placeholder="Nome do Motorista">
        <label>Prefixo do Veículo</label>
        <input type="text" id="concluirPrefixo" placeholder="Ex: V-123">
        <div style="display: flex; gap: 10px;">
            <div>
                <label>KM Inicial</label>
                <input type="number" id="concluirKmInicial">
            </div>
            <div>
                <label>KM Final</label>
                <input type="number" id="concluirKmFinal">
            </div>
        </div>
        <label>Serviço Realizado</label>
        <textarea id="concluirServico" rows="3"></textarea>
        <label>Materiais</label>
        <input type="text" id="concluirMateriais">
        
        <button class="btn btn-success" id="btnSalvarConclusao">Gravar e Finalizar</button>
        <button class="btn btn-close" onclick="fecharModal()">Cancelar</button>
    </div>
</div>

<script>
    // 1. URL DA API CORRIGIDA COM ASPAS
    const API_URL = 'https://script.google.com/macros/s/AKfycbyp5VVzVsN7_3Hq1ysdrK4HvpuO9sxJqVFKUSGpbujpMC6Y36qER9UaO4SBdBVKY1qeEQ/exec';

    let usuarioLogado = null;
    const usuarios = [
        { nome: 'Paulo Jurandir', senha: 'dmae2026', funcao: 'administrador', area: 'mecanica' },
        { nome: 'Paulo Jurandir', senha: 'dmae2026', funcao: 'supervisor', area: 'todos' },
        { nome: 'Rogério Alves', senha: 'dmae2026', funcao: 'supervisor', area: 'todos' },
        { nome: 'Valneir Oliveira', senha: 'dmae2026', funcao: 'lider', area: 'mecanica' }
    ];

    function fazerLogin() {
        const uInput = document.getElementById('loginUser').value.trim();
        const pInput = document.getElementById('loginPass').value;
        
        const matches = usuarios.filter(x => x.nome.toLowerCase() === uInput.toLowerCase() && x.senha === pInput);

        if (matches.length > 1) {
            const opt = confirm("Entrar como ADMINISTRADOR? (OK para Sim / Cancelar para SUPERVISOR)");
            usuarioLogado = opt ? matches.find(m => m.funcao === 'administrador') : matches.find(m => m.funcao === 'supervisor');
        } else if (matches.length === 1) {
            usuarioLogado = matches[0];
        }

        if (usuarioLogado) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('appScreen').style.display = 'block';
            document.getElementById('welcomeText').innerText = "👤 " + usuarioLogado.nome + " | " + usuarioLogado.funcao.toUpperCase();
            carregarDados();
        } else {
            alert("Erro: Usuário ou senha inválidos.");
        }
    }

    async function carregarDados() {
        const div = document.getElementById('listaEquipamentos');
        div.innerHTML = "Atualizando...";
        
        try {
            const resp = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ acao: 'listarStatus' }) });
            const dados = await resp.json();
            
            div.innerHTML = dados.map(eq => `
                <div style="border-bottom: 1px solid #eee; padding: 10px 0; display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <strong>${eq.ID_EQUIPAMENTO}</strong><br>
                        <small>${eq.SISTEMA}</small>
                    </div>
                    <div>
                        <span class="status-tag ${String(eq.BLOQUEADO).toLowerCase() === 'sim' ? 'tag-sim' : 'tag-nao'}">
                            ${String(eq.BLOQUEADO).toLowerCase() === 'sim' ? 'BLOQUEADO' : 'LIVRE'}
                        </span>
                        ${String(eq.BLOQUEADO).toLowerCase() === 'sim' ? 
                            `<button onclick="prepararConclusao('${eq.ID_EQUIPAMENTO}')" style="margin-left:10px; cursor:pointer;">Finalizar</button>` : 
                            `<button onclick="abrirOS('${eq.ID_EQUIPAMENTO}')" style="margin-left:10px; cursor:pointer;">Abrir OS</button>`}
                    </div>
                </div>
            `).join('');
        } catch (e) { 
            console.error(e);
            div.innerHTML = "Erro ao conectar com a API."; 
        }
    }

    async function abrirOS(id) {
        const prob = prompt("Descreva o problema para o motor " + id + ":");
        if (!prob) return;

        const payload = {
            acao: 'criarOS',
            idEquipamento: id,
            usuario: usuarioLogado.nome,
            area: usuarioLogado.area,
            descricaoProblema: prob,
            equipamento: "Motor", 
            sistema: "Manutenção", 
            tipoManutencao: "Corretiva",
            prioridade: "Normal",
            equipeResponsavel: "Campo",
            responsavel: usuarioLogado.nome
        };

        const resp = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
        const res = await resp.json();
        alert(res.mensagem);
        carregarDados();
    }

    let idEquipamentoParaConcluir = "";
    function prepararConclusao(id) {
        idEquipamentoParaConcluir = id;
        document.getElementById('modalConcluir').style.display = 'flex';
    }

    function fecharModal() { document.getElementById('modalConcluir').style.display = 'none'; }

    document.getElementById('btnSalvarConclusao').onclick = async function() {
        const btn = this;
        btn.disabled = true;
        btn.innerText = "Gravando...";

        try {
            // Busca a OS ativa enviando o ID_EQUIPAMENTO para o servidor
            const respList = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ acao: 'listarOS' }) });
            const listaOS = await respList.json();
            const osAtiva = listaOS.find(o => o.ID_EQUIPAMENTO === idEquipamentoParaConcluir && o.STATUS_OS === 'Aberta');

            if (!osAtiva) { 
                alert("Erro: Nenhuma OS aberta encontrada para este motor."); 
                btn.disabled = false;
                btn.innerText = "Gravar e Finalizar";
                return; 
            }

            const payload = {
                acao: 'concluirOS',
                idOS: osAtiva.ID_OS,
                servicoRealizado: document.getElementById('concluirServico').value,
                materiais: document.getElementById('concluirMateriais').value,
                motorista: document.getElementById('concluirMotorista').value,
                prefixoVeiculo: document.getElementById('concluirPrefixo').value,
                kmInicial: Number(document.getElementById('concluirKmInicial').value),
                kmFinal: Number(document.getElementById('concluirKmFinal').value),
                kmRodado: Number(document.getElementById('concluirKmFinal').value) - Number(document.getElementById('concluirKmInicial').value),
                usuario: usuarioLogado.nome
            };

            const resp = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            const res = await resp.json();
            alert(res.mensagem);
            fecharModal();
            carregarDados();
        } catch (e) {
            alert("Erro ao finalizar OS: " + e);
        } finally {
            btn.disabled = false;
            btn.innerText = "Gravar e Finalizar";
        }
    };
</script>

</body>
</html>
