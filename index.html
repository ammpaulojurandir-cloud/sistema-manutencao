    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #2c5282 100%);
            min-height: 100vh;

            padding: 20px;

        h1 { text-align: center; margin-bottom: 5px; font-size: 1.6rem; }

        .systems-filter { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 20px; }
        .system-btn {

        }
        .system-btn:hover, .system-btn.active { background: #3182ce; border-color: #3182ce; }
        
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .stat-card {
            backdrop-filter: blur(10px); border-radius: 12px;
            padding: 15px; text-align: center; 
            cursor: pointer; transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
        }
        .stat-card:hover { background: rgba(255,255,255,0.2); }
        .stat-number { font-size: 2rem; font-weight: bold; }
        .stat-label { font-size: 0.75rem; color: #a0c4e8; margin-top: 5px; font-weight: 600;}
        
        #card-all .stat-number { color: #63b3ed; }
        #card-ok { background: rgba(56, 161, 105, 0.15); border-color: rgba(56, 161, 105, 0.3); }
        #card-ok:hover { background: rgba(56, 161, 105, 0.25); }
        #card-ok .stat-number { color: #48bb78; }
        #card-alert { background: rgba(214, 158, 46, 0.15); border-color: rgba(214, 158, 46, 0.3); }
        #card-alert:hover { background: rgba(214, 158, 46, 0.25); }
        #card-alert .stat-number { color: #ecc94b; }
        #card-down { background: rgba(229, 62, 62, 0.15); border-color: rgba(229, 62, 62, 0.3); }
        #card-down:hover { background: rgba(229, 62, 62, 0.25); }
        #card-down .stat-number { color: #f56565; }

        .search-box {
            width: 100%; padding: 12px; border: none; border-radius: 10px; margin-bottom: 15px;
            font-size: 0.95rem; background: rgba(255,255,255,0.15); color: white;
        }
        .search-box::placeholder { color: #a0c4e8; }
        
        .equipment-list {
            background: rgba(255,255,255,0.05); border-radius: 15px; overflow: hidden;
            max-height: 60vh; overflow-y: auto;
        }
        .equipment-item {
            padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); display: grid;
            grid-template-columns: 45px 1fr auto; gap: 12px; align-items: center; transition: background 0.3s; cursor: pointer;
        }
        .equipment-item:hover { background: rgba(255,255,255,0.1); }
        
        .status-icon { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
        .status-ok { background: #38a169; }
        .status-alert { background: #d69e2e; }
        .status-down { background: #e53e3e; }
        
        .equipment-name { font-weight: 600; font-size: 0.9rem; }
        .equipment-system { font-size: 0.75rem; color: #a0c4e8; margin-top: 2px; }
        
        .status-badge { padding: 4px 10px; border-radius: 15px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; }
        .badge-ok { background: #38a169; }
        .badge-alert { background: #d69e2e; }
        .badge-down { background: #e53e3e; }
        
        .system-tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.65rem; margin-top: 3px; }
        .tag-100 { background: #e53e3e; } .tag-200 { background: #dd6b20; } .tag-300 { background: #d69e2e; }
        .tag-400 { background: #38a169; } .tag-600 { background: #3182ce; } .tag-700 { background: #805ad5; }

        .main-actions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 0 0 18px 0; }
        .action-btn { padding: 10px 16px; border: 1px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.12); color: white; border-radius: 12px; cursor: pointer; font-size: 0.85rem; font-weight: 700; transition: all 0.25s; }
        .action-btn:hover { background: rgba(255,255,255,0.22); transform: translateY(-1px); }
        .action-btn.primary { background: #3182ce; border-color: #3182ce; }
        .action-btn.success { background: #38a169; border-color: #38a169; }
        .os-card { background: #f7fafc; border-radius: 12px; padding: 12px; margin-bottom: 10px; border-left: 5px solid #3182ce; color: #1a202c; text-align: left; }
        .os-card h4 { margin: 0 0 6px 0; color: #1e3a5f; font-size: 0.95rem; }
        .os-card p { margin: 4px 0; color: #4a5568; font-size: 0.78rem; }
        .os-badge { display: inline-block; padding: 4px 8px; border-radius: 999px; color: white; font-size: 0.68rem; font-weight: 700; margin: 2px 4px 2px 0; }
        .os-aberta { background: #3182ce; }
        .os-execucao { background: #d69e2e; }
        .os-concluida { background: #38a169; }
        .os-cancelada { background: #718096; }
        .form-field { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #cbd5e0; border-radius: 9px; color: #1a202c; font-size: 0.9rem; }
        .form-label { display: block; color: #2d3748; font-size: 0.78rem; font-weight: 700; margin: 8px 0 5px; text-align: left; }

      <input type="text" class="search-box" id="searchInput" placeholder="🔍 Buscar por nome, código ou sistema..." onkeyup="searchEquipment()">

      <div class="main-actions">
        <button class="action-btn primary" id="btnOrdensAbertasHome" onclick="abrirPainelOS('abertas')">📋 OS Abertas <span id="totalOrdensAbertasHome">(0)</span></button>
        <button class="action-btn" id="btnOrdensNaoIniciadasHome" onclick="abrirPainelOS('naoIniciadas')" style="display:none;">⏳ OS Não Iniciadas <span id="totalOrdensNaoIniciadasHome">(0)</span></button>
        <button class="action-btn" id="btnOrdensIniciadasHome" onclick="abrirPainelOS('iniciadas')" style="display:none;">🛠️ OS Iniciadas <span id="totalOrdensIniciadasHome">(0)</span></button>
        <button class="action-btn" id="btnOrdensEncerradasHome" onclick="abrirPainelOS('encerradas')">✅ Ordens Encerradas <span id="totalOrdensEncerradasHome">(0)</span></button>
        <button class="action-btn" id="btnPainelKPI" onclick="abrirPainelGerencial()" style="display:none;">📊 Painel Gerencial</button>
        <button class="action-btn" onclick="atualizarAgora()">🔄 Atualizar agora</button>

      <script>
        // LISTA DE USUÁRIOS (Restaurada com senha padrão 'dmae2026' e sem usuário teste)
        const usuarios = [
            // GESTÃO OFICIAL
            { nome: 'PAULO JURANDIR', senha: 'dmae2026', funcao: 'administrador', area: 'todos' },
            { nome: 'RAFAEL SPIES', senha: 'dmae2026', funcao: 'supervisor', area: 'todos' },
            { nome: 'JEFERSON MACHADO', senha: 'dmae2026', funcao: 'coordenador', area: 'eletrica' },
            { nome: 'VALTEMIR OLMOS', senha: 'dmae2026', funcao: 'coordenador', area: 'mecanica' },
            { nome: 'MAURICIO DO CARMO', senha: 'dmae2026', funcao: 'coordenador', area: 'eletrica' },
            { nome: 'ROGÉRIO ALVES', senha: 'dmae2026', funcao: 'gerente', area: 'todos' },

            // LÍDERES MECÂNICA
            { nome: 'RODRIGO FORTES', senha: 'dmae2026', funcao: 'lider', area: 'mecanica' },
            { nome: 'LUCIANO CRUZ', senha: 'dmae2026', funcao: 'lider', area: 'mecanica' },
            { nome: 'RONALDO LEMOS', senha: 'dmae2026', funcao: 'lider', area: 'mecanica' },
            { nome: 'VALNEIR OLIVEIRA', senha: 'dmae2026', funcao: 'lider', area: 'mecanica' },
            { nome: 'ANTONIO CARLOS LEAL', senha: 'dmae2026', funcao: 'lider', area: 'mecanica' },
            { nome: 'RICARDO MATHIOLA', senha: 'dmae2026', funcao: 'lider', area: 'mecanica' },

            // INSTALAÇÕES MECÂNICAS / USINAGEM / CALDEIRARIA
            { nome: 'PAULO JURANDIR', senha: 'dmae2026', funcao: 'lider', area: 'instalações mecânicas' },
            { nome: 'SIDNEI ROCHA', senha: 'dmae2026', funcao: 'lider', area: 'caldeiraria' },
            { nome: 'GABRIEL STUMM', senha: 'dmae2026', funcao: 'lider', area: 'usinagem' },

            // LÍDERES ELÉTRICA
            { nome: 'CARLOS ALBERTO', senha: 'dmae2026', funcao: 'lider', area: 'eletrica' },
            { nome: 'ANDRE MARQUES', senha: 'dmae2026', funcao: 'lider', area: 'eletrica' },
            { nome: 'ROQUE BECKER', senha: 'dmae2026', funcao: 'lider', area: 'eletrica' },
            { nome: 'SAULO LOCKMAN', senha: 'dmae2026', funcao: 'lider', area: 'eletrica' }
        ];
        
        let usuarioLogado = null;
        const API_URL = 'https://script.google.com/macros/s/AKfycbwyF6kMzoDhLiM1B4-1qW40wNrbH9tmXAIqUzJj7a2Rz7Jocjju29LnwKbmubbxpSZh/exec';
        const VERSAO_FRONTEND_GMAN = 'GMAN 8.5.6.71 — visual 8.5.6.14 restaurado e API atual compatível';
        const VERSAO_BACKEND_ESPERADA_GMAN = 'GMAN 8.5.6.70';
        let apiOnline = false;
        let modoPainelOSAtual = 'abertas';

        function normalizarTextoGMAN(valor) {
            return String(valor || '')
                .trim()
                .toLowerCase()
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '');
        }

        function isOSEncerrada(status) {
            const s = normalizarTextoGMAN(status);
            return ['concluida', 'cancelada', 'fechada', 'encerrada', 'finalizada'].includes(s);
        }

        function isOSAberta(status) {
            return normalizarTextoGMAN(status) === 'aberta';
        }

        function isOSIniciada(status) {
            const s = normalizarTextoGMAN(status);
            return [
                'em execucao',
                'em teste',
                'aguardando material',
                'aguardando liberacao',
                'parado',
                'em manutencao',
                'operando com restricao'
            ].includes(s);
        }

        function isOSAtivaOperacional(status) {
            return isOSAberta(status) || isOSIniciada(status);
        }

        function isOSAbertaGeral(status) {
            return isOSAtivaOperacional(status);
        }

        function isResponsavelUsuarioLogado(os) {
            if (!usuarioLogado) return false;
            return normalizarTextoGMAN(os.responsavel) === normalizarTextoGMAN(usuarioLogado.nome);
        }

        function tituloPainelOS(modo) {
            if (modo === 'encerradas') return 'Ordens Encerradas';
            if (modo === 'naoIniciadas') return 'OS Não Iniciadas';
            if (modo === 'iniciadas') return 'OS Iniciadas';
            if (modo === 'minhas') return 'Minhas OS';
            return 'OS Abertas';
        }

        function classificarStatusOSGMAN(status) {
            const s = normalizarTextoGMAN(status);

            if (s.includes('execucao') || s.includes('execucao')) return 'Em execução';
            if (s.includes('teste')) return 'Em teste';
            if (s.includes('aguardando material')) return 'Aguardando material';
            if (s.includes('aguardando liberacao')) return 'Aguardando liberação';
            if (s.includes('restricao')) return 'Operando com restrição';
            if (s.includes('parad')) return 'Parado';
            if (s.includes('manutencao')) return 'Em manutenção';
            if (s.includes('reabert')) return 'Reaberta';
            if (s.includes('concluid')) return 'Concluída';
            if (s.includes('cancel')) return 'Cancelada';
            if (s.includes('fechad')) return 'Fechada';
            if (s.includes('encerrad')) return 'Encerrada';
            if (s.includes('finalizad')) return 'Finalizada';
            if (s.includes('abert')) return 'Aberta';

            return status || 'Sem status';
        }

        function contarStatusOSGMAN(lista) {
            const contagem = {};

            (Array.isArray(lista) ? lista : []).forEach(os => {
                const chave = classificarStatusOSGMAN(os.statusOS);
                contagem[chave] = (contagem[chave] || 0) + 1;
            });

            return contagem;
        }

        function atualizarTotalizadoresOS(lista = ordensServicoCache) {
            const dados = Array.isArray(lista) ? lista : [];
            const abertasGerais = dados.filter(os => isOSAbertaGeral(os.statusOS));
            const naoIniciadas = dados.filter(os => isOSAberta(os.statusOS));
            const iniciadas = dados.filter(os => isOSIniciada(os.statusOS));
            const encerradas = dados.filter(os => isOSEncerrada(os.statusOS));
            const minhas = dados.filter(os => isOSAtivaOperacional(os.statusOS)).filter(os => isResponsavelUsuarioLogado(os));

            const totalAbertasHome = document.getElementById('totalOrdensAbertasHome');
            const totalNaoIniciadasHome = document.getElementById('totalOrdensNaoIniciadasHome');
            const totalIniciadasHome = document.getElementById('totalOrdensIniciadasHome');
            const totalEncerradasHome = document.getElementById('totalOrdensEncerradasHome');
            const totalAbertasPainel = document.getElementById('totalOrdensAbertasPainel');
            const totalNaoIniciadasPainel = document.getElementById('totalOrdensNaoIniciadasPainel');
            const totalIniciadasPainel = document.getElementById('totalOrdensIniciadasPainel');
            const totalMinhasPainel = document.getElementById('totalMinhasOSPainel');
            const totalEncerradasPainel = document.getElementById('totalOrdensEncerradasPainel');

            if (totalAbertasHome) totalAbertasHome.textContent = '(' + abertasGerais.length + ')';
            if (totalNaoIniciadasHome) totalNaoIniciadasHome.textContent = '(' + naoIniciadas.length + ')';
            if (totalIniciadasHome) totalIniciadasHome.textContent = '(' + iniciadas.length + ')';
            if (totalEncerradasHome) totalEncerradasHome.textContent = '(' + encerradas.length + ')';
            if (totalAbertasPainel) totalAbertasPainel.textContent = '(' + abertasGerais.length + ')';
            if (totalNaoIniciadasPainel) totalNaoIniciadasPainel.textContent = '(' + naoIniciadas.length + ')';
            if (totalIniciadasPainel) totalIniciadasPainel.textContent = '(' + iniciadas.length + ')';
            if (totalMinhasPainel) totalMinhasPainel.textContent = '(' + minhas.length + ')';
            if (totalEncerradasPainel) totalEncerradasPainel.textContent = '(' + encerradas.length + ')';

            return {
                abertas: abertasGerais.length,
                naoIniciadas: naoIniciadas.length,
                iniciadas: iniciadas.length,
                encerradas: encerradas.length,
                minhas: minhas.length
            };
        }

        function montarResumoOSGMAN(listaFiltrada, modo, listaCompleta = ordensServicoCache) {
            const lista = Array.isArray(listaFiltrada) ? listaFiltrada : [];
            const contagem = contarStatusOSGMAN(lista);
            const total = lista.length;

            const cards = [];

            if (modo === 'encerradas') {
                ['Concluída', 'Cancelada', 'Fechada', 'Encerrada', 'Finalizada'].forEach(status => {
                    cards.push({ titulo: status, valor: contagem[status] || 0 });
                });
            } else if (modo === 'naoIniciadas') {
                ['Aberta'].forEach(status => {
                    cards.push({ titulo: status, valor: contagem[status] || 0 });
                });
            } else {
                ['Aberta', 'Em execução', 'Em teste', 'Aguardando material', 'Aguardando liberação', 'Parado', 'Em manutenção', 'Operando com restrição'].forEach(status => {
                    cards.push({ titulo: status, valor: contagem[status] || 0 });
                });
            }

            const totalizadores = atualizarTotalizadoresOS(listaCompleta);

            return `
                <div style="background:#edf2f7; border-radius:14px; padding:12px; margin-bottom:12px; border-left:5px solid #3182ce;">
                    <div style="display:flex; flex-wrap:wrap; gap:8px; align-items:center; justify-content:space-between; margin-bottom:10px;">
                        <strong style="color:#1e3a5f;">Resumo — ${tituloPainelOS(modo)}</strong>
                        <span style="color:#2d3748; font-size:0.82rem; font-weight:700;">Total exibido: ${total}</span>
                    </div>

                    <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(120px, 1fr)); gap:8px;">
                        ${cards.map(card => `
                            <div style="background:white; border-radius:12px; padding:10px; border:1px solid #e2e8f0;">
                                <div style="color:#718096; font-size:0.68rem; font-weight:800; text-transform:uppercase;">${card.titulo}</div>
                                <div style="color:#1e3a5f; font-size:1.35rem; font-weight:900; margin-top:2px;">${card.valor}</div>
                            </div>
                        `).join('')}
                    </div>

                    <div style="display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; color:#4a5568; font-size:0.78rem; font-weight:700;">
                        <span>📋 Abertas: ${totalizadores.abertas}</span>
                        <span>⏳ Não iniciadas: ${totalizadores.naoIniciadas}</span>
                        <span>🛠️ Iniciadas: ${totalizadores.iniciadas}</span>
                        <span>👤 Minhas: ${totalizadores.minhas}</span>
                        <span>✅ Encerradas: ${totalizadores.encerradas}</span>
                    </div>
                </div>
            `;
        }

        function atualizarIndicadorConexao(mensagem, tipo = 'neutro') {
            let indicador = document.getElementById('apiStatus');
            if (!indicador) {
                indicador = document.createElement('div');
                indicador.id = 'apiStatus';
                indicador.style.cssText = `
                    text-align: center;
                    margin: 0 auto 15px auto;
                    padding: 8px 12px;
                    border-radius: 12px;
                    max-width: 420px;
                    font-size: 0.8rem;
                    font-weight: 600;
                    background: rgba(255,255,255,0.12);
                    border: 1px solid rgba(255,255,255,0.2);
                `;
                const filtro = document.querySelector('.systems-filter');
                filtro.parentNode.insertBefore(indicador, filtro);
            }

            const cores = {

        function normalizarStatusApp(valor, observacao = '') {
            const texto = String(valor || '').toLowerCase()
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '');

            const obs = String(observacao || '').toLowerCase()
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '');

            if (texto.includes('parad') || obs.includes('condicao operacional: parado') || obs.includes('condição operacional: parado')) return 'down';
            if (texto.includes('manut') || texto.includes('aguard') || texto.includes('restri') || obs.includes('em teste') || texto.includes('em teste') || texto.includes('alert') || texto.includes('atencao')) return 'alert';
            return 'ok';
        }

        function statusParaPlanilha(status) {
            if (status === 'alert') return 'Manutenção';
            if (status === 'down') return 'Manutenção';
            return 'Operando';
        }

        function extrairCondicaoOperacional(observacao) {
            const texto = String(observacao || '');
            if (!texto) return '';

            const match = texto.match(/Condi(?:ç|c)ão operacional:\s*([^|]+)/i);
            if (!match || !match[1]) return '';

            const condicao = match[1].trim();

            if (!condicao || condicao.toLowerCase() === 'normal') return '';

            return condicao;
        }

        function formatarCondicaoParaStatus(condicao) {
            const c = String(condicao || '').trim();
            if (!c) return '';

            const lower = c.toLowerCase();

            if (lower === 'parado') return 'parado';
            if (lower === 'os em execução' || lower === 'os em execucao') return 'OS em execução';
            if (lower === 'aguardando material') return 'aguardando material';
            if (lower === 'aguardando liberação' || lower === 'aguardando liberacao') return 'aguardando liberação';
            if (lower === 'em teste') return 'em teste';
            if (lower === 'operando com restrição' || lower === 'operando com restricao') return 'operando com restrição';

            return c;
        }

        function labelStatusEquipamento(status, observacao = '') {
            if (status === 'ok') return 'Operando';

            const condicao = formatarCondicaoParaStatus(extrairCondicaoOperacional(observacao));

            if (status === 'alert') {
                return condicao ? `Manutenção (${condicao})` : 'Manutenção';
            }

            if (status === 'down') {
                return condicao ? `Manutenção (${condicao})` : 'Manutenção (parado)';
            }

            return 'Operando';
        }

        function labelStatusEquipamentoMaiusculo(status, observacao = '') {
            return labelStatusEquipamento(status, observacao).toUpperCase();
        }

        function formatarDataApi(valor) {
            if (!valor) return '';
            const data = new Date(valor);
            if (isNaN(data.getTime())) return String(valor);

            return data.toLocaleString('pt-BR', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }

        function extrairListaGMAN_(retorno, chaves) {
            if (Array.isArray(retorno)) return retorno;
            for (const chave of chaves) {
                if (Array.isArray(retorno?.[chave])) return retorno[chave];
                if (Array.isArray(retorno?.dados?.[chave])) return retorno.dados[chave];
                if (Array.isArray(retorno?.payload?.[chave])) return retorno.payload[chave];
            }
            return [];
        }

        async function apiAcaoGMAN(acao, dados = {}) {
            const resposta = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(Object.assign({ acao }, dados || {}))
            });

            const texto = await resposta.text();
            let retorno;
            try {
                retorno = JSON.parse(texto);
            } catch (erro) {
                throw new Error('A API respondeu em formato inválido. Esperado JSON da base oficial GMAN.');
            }

            if (!resposta.ok || retorno.sucesso === false) {
                throw new Error(retorno.erro || retorno.mensagem || ('Falha na ação ' + acao));
            }

            return retorno;
        }

        async function carregarStatusOnline() {
            atualizarIndicadorConexao('🔄 Sincronizando com a base oficial GMAN...', 'neutro');

            try {
                const retorno = await apiAcaoGMAN('listarTudo', { usuario: usuarioLogado ? usuarioLogado.nome : '' });
                const statusOnline = extrairListaGMAN_(retorno, ['status', 'statusAtual', 'listaStatus']);

                if (!Array.isArray(statusOnline)) throw new Error('Resposta da API não trouxe status em formato de lista.');

                statusOnline.forEach(item => {
                    const id = item.idEquipamento || item.ID_EQUIPAMENTO || item.id || item.equipamento || item.EQUIPAMENTO;
                    const eq = equipment.find(e => String(e.id) === String(id));
                    if (!eq) return;

                    const statusAtual = item.statusAtual || item.STATUS_ATUAL || item.status || item.Status || item.statusVisual || item.STATUS_VISUAL || 'Operando';
                    const observacao = item.observacao || item.OBSERVACAO || item.justificativa || item.JUSTIFICATIVA || item.justificativaStatus || '';

                    eq.status = normalizarStatusApp(statusAtual, observacao);
                    eq.ultimoTecnico = item.usuarioUltimaAlteracao || item.USUARIO_ULTIMA_ALTERACAO || item.usuario || item.USUARIO || '';
                    eq.ultimaAlteracao = formatarDataApi(item.dataUltimaAlteracao || item.DATA_ULTIMA_ALTERACAO || item.dataHora || item.DATA_HORA || '');
                    eq.observacaoStatus = observacao;
                });

                apiOnline = true;
                saveData();
                applyFilters();
                atualizarIndicadorConexao('✅ Online: conectado à base oficial GMAN', 'online');
                return true;

            } catch (erro) {
                apiOnline = false;
                loadData();
                applyFilters();
                atualizarIndicadorConexao('⚠️ Modo local: API online no health, mas falhou ao listar dados — ' + erro.message, 'offline');
                console.error('Erro ao carregar status online:', erro);
                return false;
            }
        }

            try {

        function renderizarOS(lista) {
            const container = document.getElementById('osConteudo');
            if (!container) return;

            const modo = modoPainelOSAtual || 'abertas';
            let base = Array.isArray(lista) ? lista.slice() : [];

            if (modo === 'encerradas') {
                base = base.filter(os => isOSEncerrada(os.statusOS));
            } else if (modo === 'naoIniciadas') {
                if (!podeGerenciarOS()) {
                    base = [];
                } else {
                    base = base.filter(os => isOSAberta(os.statusOS));
                }
            } else if (modo === 'iniciadas') {
                if (!podeGerenciarOS()) {
                    base = [];
                } else {
                    base = base.filter(os => isOSIniciada(os.statusOS));
                }
            } else if (modo === 'minhas') {
                base = base.filter(os => isOSAtivaOperacional(os.statusOS)).filter(os => isResponsavelUsuarioLogado(os));
            } else {
                base = base.filter(os => isOSAbertaGeral(os.statusOS));
            }

            base = base.slice().reverse();

            if (!base.length) {
                const mensagem = modo === 'encerradas'
                    ? 'Nenhuma OS encerrada encontrada.'
                    : modo === 'naoIniciadas'
                        ? 'Nenhuma OS não iniciada encontrada.'
                        : modo === 'iniciadas'
                            ? 'Nenhuma OS iniciada encontrada.'
                            : modo === 'minhas'
                                ? 'Nenhuma OS ativa operacional encontrada para o usuário responsável logado.'
                                : 'Nenhuma OS aberta operacional encontrada.';
                container.innerHTML = montarResumoOSGMAN(base, modo, lista) + `<p style="color:#4a5568; background:#f7fafc; padding:14px; border-radius:12px;">${mensagem}</p>`;
                return;
            }

            const resumoHTML = montarResumoOSGMAN(base, modo, lista);

            container.innerHTML = resumoHTML + base.map(os => {
                const encerrada = isOSEncerrada(os.statusOS);
                const podeIniciar = !encerrada && podeExecutarOS() && String(os.statusOS) === 'Aberta';
                const statusPermiteAcao = ['Em execução', 'Aguardando material', 'Aguardando liberação', 'Reaberta', 'Parado', 'Em teste', 'OS em execução', 'Operando com restrição'].includes(String(os.statusOS));
                const podeConcluir = !encerrada && podeExecutarOS() && statusPermiteAcao;
                const podeAtualizarAndamento = !encerrada && podeExecutarOS() && statusPermiteAcao;
                const podeCancelar = !encerrada && podeGerenciarOS();

                return `
                    <div class="os-card">
                        <h4>${os.idOS} — ${os.equipamento || os.idEquipamento}</h4>
                        <span class="os-badge ${classeStatusOS(os.statusOS)}">${os.statusOS || 'Sem status'}</span>
                        <span class="os-badge os-aberta">${os.prioridade || 'Normal'}</span>
                        <p><strong>Área:</strong> ${os.area || '-'} | <strong>Tipo:</strong> ${os.tipoManutencao || '-'}</p>
                        <p><strong>Sistema:</strong> ${os.sistema || '-'} | <strong>Equipe:</strong> ${os.equipeResponsavel || '-'}</p>
                        <p><strong>Responsável:</strong> ${os.responsavel || '-'}</p>
                        <p><strong>Problema:</strong> ${os.descricaoProblema || '-'}</p>
                        ${os.dataAbertura ? `<p><strong>Abertura:</strong> ${formatarDataApi(os.dataAbertura)} ${os.horaAbertura ? '| ' + os.horaAbertura : ''}</p>` : ''}
                        ${os.dataConclusao ? `<p><strong>Conclusão:</strong> ${formatarDataApi(os.dataConclusao)} ${os.horaConclusao ? '| ' + os.horaConclusao : ''}</p>` : ''}
                        ${os.servicoRealizado ? `<p><strong>Serviço realizado:</strong> ${os.servicoRealizado}</p>` : ''}
                        ${os.finalizadoPor ? `<p><strong>Finalizado por:</strong> ${os.finalizadoPor}</p>` : ''}
                        ${encerrada ? '<p style="color:#2f855a; font-weight:700;">✅ OS encerrada</p>' : ''}
                        <div style="display:flex; flex-wrap:wrap; gap:8px; margin-top:10px;">
                            ${podeIniciar ? `<button onclick="iniciarOS('${os.idOS}')" style="padding:8px 10px; border:none; border-radius:8px; background:#d69e2e; color:white; cursor:pointer;">▶️ Iniciar</button>` : ''}

            }).join('');

        function arquivoParaBase64(arquivo) {
            const tipo = String(arquivo.type || '').toLowerCase();

            if (tipo.startsWith('image/')) {
                return comprimirImagemBase64(arquivo, 1280, 0.7);
            }

            return new Promise((resolve, reject) => {
                const leitor = new FileReader();
                leitor.onload = () => {
                    const resultado = String(leitor.result || '');
                    const base64 = resultado.split(',')[1] || '';
                    resolve({
                        base64,
                        mimeType: arquivo.type,
                        nomeArquivo: arquivo.name
                    });
                };
                leitor.onerror = reject;
                leitor.readAsDataURL(arquivo);
            });
        }

        function comprimirImagemBase64(arquivo, maxLargura = 1280, qualidade = 0.7) {
            return new Promise((resolve, reject) => {
                const leitor = new FileReader();

                leitor.onload = (event) => {
                    const img = new Image();

                    img.onload = () => {
                        let largura = img.width;
                        let altura = img.height;

                        if (largura > maxLargura) {
                            altura = Math.round(altura * (maxLargura / largura));
                            largura = maxLargura;
                        }

                        const canvas = document.createElement('canvas');
                        canvas.width = largura;
                        canvas.height = altura;

                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, largura, altura);

                        const dataUrl = canvas.toDataURL('image/jpeg', qualidade);
                        const base64 = dataUrl.split(',')[1] || '';

                        const nomeSemExtensao = String(arquivo.name || 'foto')
                            .replace(/\.[^.]+$/, '')
                            .replace(/[^\w\-]+/g, '_')
                            .substring(0, 60);

                        resolve({
                            base64,
                            mimeType: 'image/jpeg',
                            nomeArquivo: nomeSemExtensao + '_compactada.jpg'
                        });
                    };

                    img.onerror = () => reject(new Error('Não foi possível processar a imagem selecionada.'));
                    img.src = event.target.result;
                };

                leitor.onerror = () => reject(new Error('Erro ao ler o arquivo de imagem.'));
                leitor.readAsDataURL(arquivo);
            });
        }


        function obterDuracaoAudio(arquivo) {
            return new Promise((resolve) => {
                const url = URL.createObjectURL(arquivo);
                const audio = document.createElement('audio');

                audio.preload = 'metadata';

                audio.onloadedmetadata = () => {
                    URL.revokeObjectURL(url);
                    const duracao = Number(audio.duration || 0);
                    resolve(isFinite(duracao) ? duracao : '');
                };

                audio.onerror = () => {
                    URL.revokeObjectURL(url);
                    resolve('');
                };

                audio.src = url;
            });
        }

        function detectarTipoAnexo(arquivo) {
            const tipo = String(arquivo.type || '').toLowerCase();
            if (tipo.startsWith('image/')) return 'Foto';
            if (tipo.startsWith('audio/')) return 'Audio';
            if (tipo.startsWith('video/')) return 'Video';
            return 'Outro';
        }

        async function anexarArquivoOS(idOS, idEquipamento, inputId, observacaoId) {
            const input = document.getElementById(inputId);
            const obs = document.getElementById(observacaoId);

            if (!input || !input.files || !input.files.length) {
                alert('Selecione um arquivo primeiro.');
                return;
            }

            const arquivo = input.files[0];
            const tipoAnexo = detectarTipoAnexo(arquivo);

            if (tipoAnexo === 'Video') {
                alert('Vídeo bloqueado. O sistema permite somente fotos e áudio.');
                input.value = '';
                return;
            }

            if (!['Foto', 'Audio'].includes(tipoAnexo)) {
                alert('Arquivo inválido. Envie somente foto ou áudio.');
                input.value = '';
                return;
            }

            let duracaoSegundos = '';

            if (tipoAnexo === 'Audio') {
                duracaoSegundos = await obterDuracaoAudio(arquivo);

                if (duracaoSegundos && duracaoSegundos > 60) {
                    input.value = '';
                    alert('Áudio máximo de 1 minuto atingido. Grave um áudio mais curto.');
                    return;
                }

                alert('Atenção: o áudio deve ter no máximo 1 minuto.');
            }

            const botao = event && event.target ? event.target : null;
            const textoOriginal = botao ? botao.textContent : '';

            try {
                if (botao) {
                    botao.disabled = true;
                    botao.textContent = '⏳ Enviando...';
                    botao.style.opacity = '0.7';
                }

                const arquivoProcessado = await arquivoParaBase64(arquivo);

                await apiPost({
                    acao: 'anexarArquivo',
                    idOS,
                    idEquipamento,
                    usuario: usuarioLogado.nome,
                    funcao: usuarioLogado.funcao,
                    tipoAnexo,
                    nomeArquivo: arquivoProcessado.nomeArquivo,
                    mimeType: arquivoProcessado.mimeType,
                    conteudoBase64: arquivoProcessado.base64,
                    duracaoSegundos,
                    observacao: obs ? obs.value.trim() : ''
                });

                input.value = '';

                if (botao) {
                    botao.textContent = '✅ Enviado';
                    botao.style.background = '#38a169';
                }

                alert(tipoAnexo + ' enviado com sucesso e registrado na OS.');

            } catch (erro) {
                console.error(erro);

                const mensagem = erro.message || 'Erro ao anexar arquivo.';

                if (mensagem.toLowerCase().includes('limite')) {
                    alert(mensagem);
                } else {
                    alert(mensagem);
                }

                if (botao) {
                    botao.disabled = false;
                    botao.textContent = textoOriginal;
                    botao.style.opacity = '1';
                }
            }
        }

        async function concluirOS(idOS) {
            // --- TRAVA DE SEGURANÇA DE EVIDÊNCIAS ---
            const fFoto1 = document.getElementById('anexoFoto1OS');
            const fFoto2 = document.getElementById('anexoFoto2OS');
            const fAudio = document.getElementById('anexoAudioOS');

            if ((fFoto1 && fFoto1.files.length > 0) || 
                (fFoto2 && fFoto2.files.length > 0) || 
                (fAudio && fAudio.files.length > 0)) {
                return alert('⚠️ Atenção: você selecionou uma evidência, mas esqueceu de clicar no botão Enviar. Envie a evidência ou cancele a seleção antes de concluir a OS.');
            }
            // -----------------------------------------

            const servicoRealizado = document.getElementById('concluirServico').value.trim();
            const materiais = document.getElementById('concluirMateriais').value.trim();
            const motorista = document.getElementById('concluirMotorista').value.trim();
            const prefixoVeiculo = document.getElementById('concluirPrefixoVeiculo').value.trim();
            const kmInicialTexto = document.getElementById('concluirKmInicial').value;
            const kmFinalTexto = document.getElementById('concluirKmFinal').value;
            const situacaoFinalEquipamento = document.getElementById('concluirSituacaoFinal').value;
            const observacaoFinal = document.getElementById('concluirObservacaoFinal').value.trim();

            const kmInicial = kmInicialTexto === '' ? '' : Number(kmInicialTexto);
            const kmFinal = kmFinalTexto === '' ? '' : Number(kmFinalTexto);

            const camposFaltantes = [];
            if (!servicoRealizado) camposFaltantes.push('serviço executado');
            if (!materiais) camposFaltantes.push('materiais utilizados');
            if (!motorista) camposFaltantes.push('motorista');
            if (!prefixoVeiculo) camposFaltantes.push('prefixo do veículo');
            if (kmInicialTexto === '') camposFaltantes.push('KM inicial');
            if (kmFinalTexto === '') camposFaltantes.push('KM final');
            if (!situacaoFinalEquipamento) camposFaltantes.push('situação final do equipamento');
            if (!observacaoFinal) camposFaltantes.push('observação final');

            if (camposFaltantes.length) {
                return alert('Preencha todos os campos obrigatórios antes de concluir a OS: ' + camposFaltantes.join(', ') + '. Fotos e áudio não são obrigatórios.');

            if (situacaoFinalEquipamento !== 'Operando') {

            }

            if (kmFinal < kmInicial) {
                return alert('KM final inválido. O KM final deve ser maior ou igual ao KM inicial.');
            }

            try {
                await apiPost({
                    acao: 'concluirOS',

                    usuario: usuarioLogado.nome,

                    servicoRealizado,

                await recarregarPainelOS();

        function parseDataKPI(valor) {
            if (!valor) return null;

            if (valor instanceof Date) {
                return isNaN(valor.getTime()) ? null : valor;
            }

            const texto = String(valor).trim();
            if (!texto) return null;

            let data = new Date(texto);
            if (!isNaN(data.getTime())) return data;

            const br = texto.match(/^(\d{2})\/(\d{2})\/(\d{4})(?:\s+(\d{2}):(\d{2})(?::(\d{2}))?)?$/);
            if (br) {
                const dia = Number(br[1]);
                const mes = Number(br[2]) - 1;
                const ano = Number(br[3]);
                const hora = Number(br[4] || 0);
                const minuto = Number(br[5] || 0);
                const segundo = Number(br[6] || 0);
                data = new Date(ano, mes, dia, hora, minuto, segundo);
                return isNaN(data.getTime()) ? null : data;
            }

            return null;
        }

        function formatarDuracaoMinutos(minutos) {
            if (!minutos || minutos <= 0 || !isFinite(minutos)) return 'Sem dados';
            if (minutos < 60) return `${Math.round(minutos)} min`;
            const horas = Math.floor(minutos / 60);
            const mins = Math.round(minutos % 60);
            return `${horas}h ${mins}min`;
        }

                return acc;

        }

            if (!podeGerenciarOS()) {
                alert('Painel gerencial disponível somente para gestão.');
                return;
            }

            const existingModal = document.getElementById('kpiModal');
            if (existingModal) existingModal.remove();

            const modal = document.createElement('div');
            modal.id = 'kpiModal';
            modal.style.cssText = 'position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.82); display: flex; align-items: center; justify-content: center; z-index: 1200; padding: 18px;';
            modal.innerHTML = `
                <div style="background:white; border-radius:20px; padding:22px; width:96%; max-width:940px; max-height:90vh; overflow-y:auto;">
                    <div style="display:flex; justify-content:space-between; gap:10px; align-items:center; margin-bottom:15px;">
                        <div>
                            <h2 style="color:#1e3a5f; margin:0; font-size:1.25rem;">Painel Gerencial — KPIs</h2>
                            <p style="color:#718096; margin:4px 0 0; font-size:0.82rem;">Visível somente para gestão. Dados calculados pelo Banco Central GMAN.</p>
                        </div>
                        <button onclick="document.getElementById('kpiModal').remove();" style="padding:10px 14px; border:none; border-radius:10px; background:#718096; color:white; cursor:pointer;">Fechar</button>
                    </div>
                    <div id="kpiConteudo" style="color:#1a202c;">Carregando KPIs...</div>
                </div>
            `;

            document.body.appendChild(modal);
            await carregarPainelGerencial();
        }

        async function carregarPainelGerencial() {
            const container = document.getElementById('kpiConteudo');
            if (!container) return;

            container.innerHTML = '<p style="color:#4a5568;">🔄 Calculando indicadores GMAN...</p>';

            try {
                await carregarStatusOnline();
                const listaOS = await listarOSOnline();

                const totalEquipamentos = equipment.length;
                const operando = equipment.filter(e => e.status === 'ok').length;
                const indisponiveis = equipment.filter(e => e.status === 'alert' || e.status === 'down').length;
                const parados = equipment.filter(e => e.status === 'down').length;

                const disponibilidade = totalEquipamentos ? Math.round((operando / totalEquipamentos) * 100) : 0;

                const osBacklog = listaOS.filter(os => !['Concluída', 'Cancelada'].includes(String(os.statusOS || ''))).length;
                const osConcluidas = listaOS.filter(os => String(os.statusOS || '') === 'Concluída').length;

                const corretivasConcluidas = listaOS.filter(os =>
                    String(os.statusOS || '') === 'Concluída' &&
                    String(os.tipoManutencao || '').toLowerCase().includes('corretiva')
                );

                const corretivas = listaOS.filter(os =>
                    String(os.tipoManutencao || '').toLowerCase().includes('corretiva')
                );

                const temposReparo = corretivasConcluidas
                    .map(os => {
                        const inicio = parseDataKPI(os.dataInicio);
                        const fim = parseDataKPI(os.dataConclusao);
                        if (!inicio || !fim) return null;
                        const minutos = (fim.getTime() - inicio.getTime()) / 60000;
                        return minutos > 0 ? minutos : null;
                    })
                    .filter(Boolean);

                const mttr = temposReparo.length
                    ? temposReparo.reduce((a, b) => a + b, 0) / temposReparo.length
                    : 0;

                const porEquipeConcluidas = contarPorCampo(
                    listaOS.filter(os => String(os.statusOS || '') === 'Concluída' && (os.equipeResponsavel || os.responsavel)),
                    'equipeResponsavel'
                );

                const agora = new Date();
                const trintaDiasAtras = new Date(agora.getTime() - (30 * 24 * 60 * 60 * 1000));
                const corretivas30 = corretivas.filter(os => {
                    const data = parseDataKPI(os.dataAbertura) || parseDataKPI(os.dataInicio) || parseDataKPI(os.dataConclusao);
                    return data && data >= trintaDiasAtras;
                });

                const reincidenciaPorEquip = {};
                corretivas30.forEach(os => {
                    const chave = os.equipamento || os.idEquipamento || 'Não informado';
                    reincidenciaPorEquip[chave] = (reincidenciaPorEquip[chave] || 0) + 1;
                });

                const reincidentes = Object.entries(reincidenciaPorEquip).filter(([_, total]) => total >= 3);
                const mtbfTexto = corretivas.length >= 2 ? 'Em cálculo' : 'Dados insuficientes';

                container.innerHTML = `
                    <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(170px, 1fr)); gap:10px; margin-bottom:16px;">
                        ${montarCardKPI('Disponibilidade', disponibilidade + '%', 'Equipamentos aptos a operar', disponibilidade >= 90 ? '#38a169' : '#d69e2e')}
                        ${montarCardKPI('MTTR', formatarDuracaoMinutos(mttr), 'Corretivas concluídas', '#3182ce')}
                        ${montarCardKPI('MTBF', mtbfTexto, 'Mínimo 2 corretivas por equipamento', '#805ad5')}
                        ${montarCardKPI('Backlog de OS', osBacklog, 'OS abertas e pendentes', '#d69e2e')}
                        ${montarCardKPI('Produtividade', osConcluidas, 'OS concluídas no total', '#38a169')}
                        ${montarCardKPI('Reincidência', reincidentes.length, '3 corretivas em 30 dias', reincidentes.length ? '#e53e3e' : '#38a169')}
                    </div>

                    <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(260px, 1fr)); gap:12px;">
                        ${montarRankingHTML(porEquipeConcluidas, 'Produtividade por equipe')}
                        ${montarRankingHTML(reincidenciaPorEquip, 'Possíveis reincidências')}
                    </div>

                    <div style="margin-top:14px; background:#ebf8ff; border-left:5px solid #3182ce; border-radius:12px; padding:12px; color:#2c5282; font-size:0.82rem;">
                        <strong>GMAN:</strong> painel com os 6 KPIs oficiais: disponibilidade, MTTR, MTBF, backlog, produtividade e reincidência.
                        <br>
                        <strong>Situação atual:</strong> ${operando} operando, ${indisponiveis} em manutenção/alerta, ${parados} parados e ${osBacklog} OS no backlog.
                    </div>
                `;

            } catch (erro) {
                console.error(erro);
                container.innerHTML = '<p style="color:#e53e3e; font-weight:bold;">Erro ao carregar KPIs. Confira a conexão com a API, a planilha e os nomes das abas.</p>';
            }
        }

        function recuperarLoginSalvo() {
            const usuarioSalvo = localStorage.getItem('manutencao_usuario_logado');
            if (!usuarioSalvo) return false;

            try {
                const dados = JSON.parse(usuarioSalvo);
                const encontrado = usuarios.find(u =>
                    u.nome === dados.nome &&
                    u.funcao === dados.funcao &&
                    u.area === dados.area
                );

                if (!encontrado) {
                    localStorage.removeItem('manutencao_usuario_logado');
                    return false;
                }

                usuarioLogado = encontrado;
                document.getElementById('loginScreen').style.display = 'none';
                mostrarUsuarioLogado();
                aplicarPermissoes();
                aplicarBotoesPermissao();
                return true;
            } catch (e) {
                localStorage.removeItem('manutencao_usuario_logado');
                return false;
            }
        }

        function fazerLogin() {
            const user = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value;
            const erro = document.getElementById('loginErro');
            
            const encontrado = usuarios.find(u => 
                u.nome.toLowerCase() === user.toLowerCase() && u.senha === pass
            );
            
            if (!encontrado) {
                erro.textContent = 'Usuário ou senha incorretos!';
                erro.style.display = 'block';
                return;
            }
            
            usuarioLogado = encontrado;
            localStorage.setItem('manutencao_usuario_logado', JSON.stringify({
                nome: encontrado.nome,
                funcao: encontrado.funcao,
                area: encontrado.area
            }));
            document.getElementById('loginScreen').style.display = 'none';
            mostrarUsuarioLogado();
            aplicarPermissoes();
            aplicarBotoesPermissao();
            setTimeout(() => atualizarAgoraSemAlerta(), 50);
        }

        function getSystemTagClass(code) { return `tag-${code}`; }

        function isEquipamentoBrutaGMAN(eq) {
            const id = String(eq && eq.id ? eq.id : '').trim().toUpperCase();
            return /^(101|201|301|401|601|701)(-|\b)/.test(id);
        }
        
        let currentSystemFilter = 'all';
        let currentStatusFilter = 'all';
        let ordensServicoCache = []; 

        function saveData() {
            localStorage.setItem('manutencao_equipment', JSON.stringify(equipment));
        }
        
        function loadData() {
            const saved = localStorage.getItem('manutencao_equipment');
            if (saved) {
                const savedEquipment = JSON.parse(saved);
                savedEquipment.forEach(savedEq => {
                    const eq = equipment.find(e => e.id === savedEq.id);
                    if (eq) {
                        eq.status = savedEq.status;
                        eq.ultimoTecnico = savedEq.ultimoTecnico;
                        eq.ultimaAlteracao = savedEq.ultimaAlteracao;
                        eq.historico = savedEq.historico;
                        eq.observacaoStatus = savedEq.observacaoStatus;
                    }
                });
            }
        }
        
        function renderEquipment(list = equipment) {
            const container = document.getElementById('equipmentList');
            container.innerHTML = list.map(eq => `
                <div class="equipment-item" onclick="openEquipment('${eq.id}')">
                    <div class="status-icon status-${eq.status}">
                        ${eq.status === 'ok' ? '✓' : eq.status === 'alert' ? '!' : '✕'}
                    </div>
                    <div>
                        <div class="equipment-name">${eq.name}</div>
                        <div class="equipment-system">
                            <span class="system-tag ${getSystemTagClass(eq.systemCode)}">${eq.systemCode}</span>
                            ${eq.system.toUpperCase()} | ID: ${eq.id}
                            ${eq.ultimoTecnico ? `<br><span style="font-size: 0.7rem; color: #63b3ed;">👤 ${eq.ultimoTecnico} | 🕐 ${eq.ultimaAlteracao}</span>` : ''}
                            ${(eq.status === 'alert' || eq.status === 'down') && eq.ultimaAlteracao ? `<br><span style="color: ${eq.status === 'alert' ? '#ecc94b' : '#f56565'}; font-size: 0.7rem; font-weight: bold;">⚠️ ${labelStatusEquipamento(eq.status, eq.observacaoStatus)} desde: ${eq.ultimaAlteracao}</span>` : ''}
                        </div>
                    </div>
                    <span class="status-badge badge-${eq.status}">
                        ${labelStatusEquipamento(eq.status, eq.observacaoStatus)}
                    </span>
                </div>
            `).join('');
            
            let activeList = equipment;

            if (currentSystemFilter === 'brutas') {
                activeList = equipment.filter(e => isEquipamentoBrutaGMAN(e));
            } else if (currentSystemFilter !== 'all') {
                activeList = equipment.filter(e => e.system === currentSystemFilter);
            }
            
            const totalAtivos = activeList.length;
            const totalOperando = activeList.filter(e => e.status === 'ok').length;
            const totalManutencao = activeList.filter(e => e.status === 'alert' || e.status === 'down').length;
            const totalParados = activeList.filter(e => e.status === 'down').length;

            document.getElementById('operationalCount').textContent = totalOperando;
            document.getElementById('maintenanceCount').textContent = totalManutencao;
            document.getElementById('downCount').textContent = totalParados;

            const percentualOperando = totalAtivos > 0 ? ((totalOperando / totalAtivos) * 100).toFixed(1) : '0.0';
            const percentualManutencao = totalAtivos > 0 ? ((totalManutencao / totalAtivos) * 100).toFixed(1) : '0.0';
            const percentualParados = totalAtivos > 0 ? ((totalParados / totalAtivos) * 100).toFixed(1) : '0.0';

            const operationalPercent = document.getElementById('operationalPercent');
            const maintenancePercent = document.getElementById('maintenancePercent');
            const downPercent = document.getElementById('downPercent');

            if (operationalPercent) operationalPercent.textContent = percentualOperando + '%';
            if (maintenancePercent) maintenancePercent.textContent = percentualManutencao + '%';
            if (downPercent) downPercent.textContent = percentualParados + '%';
        }
        
        function filterSystem(system) {
            currentSystemFilter = system;
            
            document.querySelectorAll('.system-btn').forEach(btn => btn.classList.remove('active'));
            if(event) event.target.classList.add('active');
            
            applyFilters();
        }

        function filterByStatus(status) {
            currentStatusFilter = status;

            const borderColors = {
                'ok': '#48bb78',      
                'alert': '#ecc94b',   
                'down': '#f56565'     
            };

            const cardOk = document.getElementById('card-ok');
            const cardAlert = document.getElementById('card-alert');
            const cardDown = document.getElementById('card-down');

            if (cardOk) cardOk.style.border = '1px solid rgba(56, 161, 105, 0.3)';
            if (cardAlert) cardAlert.style.border = '1px solid rgba(214, 158, 46, 0.3)';
            if (cardDown) cardDown.style.border = '1px solid rgba(229, 62, 62, 0.3)';

            const cardSelecionado = document.getElementById('card-' + status);
            if (cardSelecionado && borderColors[status]) {
                cardSelecionado.style.border = `2px solid ${borderColors[status]}`;
            }

            applyFilters();
        }

        function searchEquipment() {
            applyFilters();
        }

        function applyFilters() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            let filtered = equipment;

            if (currentSystemFilter === 'brutas') {
                filtered = filtered.filter(eq => isEquipamentoBrutaGMAN(eq));
            } else if (currentSystemFilter !== 'all') {
                filtered = filtered.filter(eq => eq.system === currentSystemFilter);
            }

            if (currentStatusFilter !== 'all') {
                if (currentStatusFilter === 'alert') {
                    filtered = filtered.filter(eq => eq.status === 'alert' || eq.status === 'down');
                } else {
                    filtered = filtered.filter(eq => eq.status === currentStatusFilter);
                }
            }

            if (term !== '') {
                filtered = filtered.filter(eq => 
                    eq.name.toLowerCase().includes(term) ||
                    eq.system.toLowerCase().includes(term) ||
                    eq.id.toLowerCase().includes(term) ||
                    eq.systemCode.includes(term)
                );
            }

            renderEquipment(filtered);
        }
        
        function openEquipment(id) {

            const existingModal = document.getElementById('qrModal');

                    ` : ''}
                    
                    ${eq.historico && eq.historico.length > 0 ? `
                    <div style="margin: 15px 0; max-height: 100px; overflow-y: auto; text-align: left; background: #f9f9f9; padding: 10px; border-radius: 8px;">
                        <p style="color: #666; font-size: 0.75rem; margin-bottom: 5px;"><strong>Histórico Recente:</strong></p>
                        ${eq.historico.slice(-3).map(h => `
                            <div style="font-size: 0.7rem; color: #666; padding: 3px 0; border-bottom: 1px solid #eee;">
                                ${h.data} - <strong>${h.tecnico}</strong>: <em>${statusLabels[h.statusAnterior]} → ${statusLabels[h.statusNovo]}</em>
                            </div>
                        `).join('')}
                    </div>
                    ` : ''}
                    
                    <div style="margin: 15px 0; padding: 12px; background: #fffaf0; border-left: 4px solid #d69e2e; border-radius: 10px; text-align: left;">
                        <p style="color: #744210; font-size: 0.8rem; margin: 0;">
                            🔒 <strong>Status bloqueado:</strong> o status do equipamento só pode ser alterado no encerramento de uma OS vinculada.
                        </p>
                    </div>
                    ${usuarioLogado ? `<button onclick="abrirModalCriarOS('${eq.id}')" style="padding: 10px 15px; background: #3182ce; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.85rem; margin-bottom: 12px;">➕ Abrir OS deste equipamento</button>` : ''}

                    <div style="margin: 20px 0;">
                        <p style="color: #666; font-size: 0.8rem; margin-bottom: 10px;">QR CODE:</p>
                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent('GRUPO:' + eq.id)}" style="width: 150px; height: 150px;" alt="QR Code">
                    </div>
                    
                    <button onclick="document.getElementById('qrModal').remove();" style="margin-top: 15px; padding: 12px 30px; background: #718096; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 1rem;">Fechar</button>
                </div>
            `;
            
            document.body.appendChild(modal);
        }
        
        async function changeStatus(id, newStatus) {
            alert('Alteração direta de status bloqueada. Abra uma OS e defina o status final no encerramento/conclusão da OS.');
            return;
        }

        async function iniciarSistema() {
            loadData();
            renderEquipment();
            const logado = recuperarLoginSalvo();
            aplicarBotoesPermissao();
            if (logado) setTimeout(() => atualizarAgoraSemAlerta(), 50);

            setInterval(async () => {
                if (!usuarioLogado) return;
                await atualizarAgoraSemAlerta();
            }, 120000);
        }

        iniciarSistema();
      </script>
</body>
</html>
