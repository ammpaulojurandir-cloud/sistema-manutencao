<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Manutenção GMAN</title>
  <link rel="icon" type="image/png" href="./logo.png">
  <link rel="apple-touch-icon" href="./logo.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #1e3a5f 0%, #2c5282 100%);
      min-height: 100vh;
      color: white;
      padding: 20px;
    }
    body::before {
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 12% 8%, rgba(56,161,105,0.22), transparent 28%),
        radial-gradient(circle at 88% 16%, rgba(49,130,206,0.24), transparent 32%),
        radial-gradient(circle at 50% 100%, rgba(255,255,255,0.08), transparent 35%);
      z-index:-1;
    }
    h1 { text-align: center; margin-bottom: 5px; font-size: 1.6rem; letter-spacing:.02em; }
    .subtitle { text-align: center; color: #a0c4e8; margin-bottom: 10px; font-size: 0.85rem; }
    .top-logo { text-align:center; margin-bottom:20px; }
    .top-logo img { width:100px; height:100px; object-fit:contain; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,.3); margin-bottom:10px; }
    .systems-filter { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:16px; }
    .system-btn {
      padding:8px 16px; border:2px solid rgba(255,255,255,.3); background:rgba(255,255,255,.1);
      color:white; border-radius:20px; cursor:pointer; font-size:.8rem; transition:all .2s; font-weight:700;
      box-shadow:0 8px 18px rgba(0,0,0,.10);
    }
    .system-btn:hover, .system-btn.active { background:linear-gradient(135deg,#38a169,#3182ce); border-color:rgba(255,255,255,.55); }
    .status-line { text-align:center; margin:0 auto 14px auto; padding:8px 12px; border-radius:12px; max-width:780px; font-size:.8rem; font-weight:700; background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.2); color:#a0c4e8; }
    .status-line.online { background:rgba(56,161,105,.18); border-color:rgba(56,161,105,.45); color:#c6f6d5; }
    .status-line.offline { background:rgba(229,62,62,.18); border-color:rgba(229,62,62,.45); color:#fed7d7; }
    .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(100px,1fr)); gap:10px; margin-bottom:20px; }
    .stat-card { backdrop-filter:blur(10px); border-radius:12px; padding:15px; text-align:center; cursor:pointer; transition:all .2s; border:1px solid rgba(255,255,255,.2); background:rgba(255,255,255,.1); }
    .stat-card:hover { background:rgba(255,255,255,.2); transform:translateY(-1px); }
    .stat-card.active { outline:2px solid rgba(255,255,255,.55); }
    .stat-number { font-size:2rem; font-weight:900; }
    .stat-label { font-size:.75rem; color:#a0c4e8; margin-top:5px; font-weight:800; }
    .stat-percent { font-size:.82rem; color:#fff; margin-top:6px; font-weight:800; opacity:.95; }
    #card-ok { background:rgba(56,161,105,.15); border-color:rgba(56,161,105,.3); }
    #card-ok .stat-number { color:#48bb78; }
    #card-alert { background:rgba(214,158,46,.15); border-color:rgba(214,158,46,.3); }
    #card-alert .stat-number { color:#ecc94b; }
    #card-down { background:rgba(229,62,62,.15); border-color:rgba(229,62,62,.3); }
    #card-down .stat-number { color:#f56565; }
    .search-box { width:100%; padding:12px; border:none; border-radius:10px; margin-bottom:15px; font-size:.95rem; background:rgba(255,255,255,.15); color:white; }
    .search-box::placeholder { color:#a0c4e8; }
    .main-actions { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin:0 0 18px 0; padding:8px; border-radius:20px; background:rgba(255,255,255,.05); backdrop-filter:blur(10px); }
    .action-btn { padding:10px 16px; border:1px solid rgba(255,255,255,.25); background:rgba(255,255,255,.12); color:white; border-radius:12px; cursor:pointer; font-size:.85rem; font-weight:800; transition:all .2s; box-shadow:inset 0 1px 3px rgba(255,255,255,.16),0 8px 18px rgba(0,0,0,.12); }
    .action-btn:hover { background:rgba(255,255,255,.22); transform:translateY(-1px); }
    .action-btn.primary { background:#3182ce; border-color:#3182ce; }
    .action-btn.success { background:#38a169; border-color:#38a169; }
    .equipment-list { background:rgba(255,255,255,.05); border-radius:15px; overflow:hidden; max-height:60vh; overflow-y:auto; border:1px solid rgba(255,255,255,.14); box-shadow:0 18px 42px rgba(0,0,0,.16); padding:6px; }
    .equipment-item { padding:12px; margin:8px; border-radius:18px; border-bottom:1px solid rgba(255,255,255,.08); display:grid; grid-template-columns:45px 1fr auto; gap:12px; align-items:center; cursor:pointer; background:linear-gradient(135deg,rgba(255,255,255,.075),rgba(255,255,255,.025)); transition:all .2s; box-shadow:0 10px 22px rgba(0,0,0,.10); }
    .equipment-item:hover { background:linear-gradient(135deg,rgba(255,255,255,.18),rgba(56,161,105,.12)); transform:translateY(-1px); }
    .status-icon { width:35px; height:35px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1rem; font-weight:1000; text-shadow:0 2px 2px rgba(0,0,0,.25); border:1px solid rgba(255,255,255,.35); box-shadow:inset 0 2px 6px rgba(255,255,255,.34), inset 0 -5px 10px rgba(0,0,0,.16), 0 10px 20px rgba(0,0,0,.20); }
    .status-ok { background:linear-gradient(135deg,#68d391,#2f855a); }
    .status-alert { background:linear-gradient(135deg,#f6e05e,#d69e2e); }
    .status-down { background:linear-gradient(135deg,#fc8181,#c53030); }
    .equipment-name { font-weight:800; font-size:.9rem; }
    .equipment-system { font-size:.75rem; color:#a0c4e8; margin-top:2px; line-height:1.35; }
    .status-badge { padding:4px 10px; border-radius:15px; font-size:.7rem; font-weight:900; text-transform:uppercase; box-shadow:inset 0 2px 5px rgba(255,255,255,.20),0 8px 16px rgba(0,0,0,.12); }
    .badge-ok { background:#38a169; }
    .badge-alert { background:#d69e2e; }
    .badge-down { background:#e53e3e; }
    .system-tag { display:inline-block; padding:2px 8px; border-radius:10px; font-size:.65rem; margin-top:3px; font-weight:900; }
    .tag-100 { background:#e53e3e; } .tag-200 { background:#dd6b20; } .tag-300 { background:#d69e2e; } .tag-400 { background:#38a169; } .tag-600 { background:#3182ce; } .tag-700 { background:#805ad5; }
    #loginScreen { position:fixed; inset:0; background:linear-gradient(135deg,#1e3a5f 0%,#2c5282 100%); display:flex; align-items:center; justify-content:center; z-index:9999; }
    .login-card { background:white; padding:40px; border-radius:20px; text-align:center; max-width:400px; width:90%; box-shadow:0 26px 70px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.6); }
    .login-card img { width:80px; height:80px; margin-bottom:20px; object-fit:contain; }
    .login-card h2 { color:#1e3a5f; margin-bottom:5px; }
    .login-card p { color:#718096; margin-bottom:30px; font-size:.9rem; }
    .login-card input { width:100%; padding:12px; margin-bottom:15px; border:2px solid #e2e8f0; border-radius:10px; font-size:1rem; color:#333; }
    .login-card button { width:100%; padding:15px; background:#3182ce; color:white; border:none; border-radius:10px; font-size:1rem; font-weight:700; cursor:pointer; }
    #loginErro { color:#e53e3e; margin-top:15px; font-size:.85rem; display:none; font-weight:800; }
    #userInfo { text-align:center; color:#a0c4e8; font-size:.85rem; margin-bottom:15px; font-weight:700; }
    #userInfo button { margin-left:10px; padding:4px 10px; background:rgba(255,255,255,.1); color:white; border:1px solid rgba(255,255,255,.3); border-radius:5px; cursor:pointer; font-size:.75rem; }
    .modal { position:fixed; inset:0; background:rgba(0,0,0,.82); display:flex; align-items:center; justify-content:center; z-index:1200; padding:18px; }
    .modal-card { background:white; color:#1a202c; border-radius:20px; padding:22px; width:95%; max-width:760px; max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.25); }
    .modal-head { display:flex; justify-content:space-between; gap:10px; align-items:flex-start; margin-bottom:14px; }
    .modal-head h2 { color:#1e3a5f; margin:0; font-size:1.15rem; }
    .close-btn { padding:10px 14px; border:none; border-radius:10px; background:#718096; color:white; cursor:pointer; font-weight:800; }
    .form-field { width:100%; padding:10px; margin-bottom:10px; border:1px solid #cbd5e0; border-radius:9px; color:#1a202c; font-size:.9rem; }
    .form-label { display:block; color:#2d3748; font-size:.78rem; font-weight:900; margin:8px 0 5px; text-align:left; }
    .os-card { background:#f7fafc; border-radius:12px; padding:12px; margin-bottom:10px; border-left:5px solid #3182ce; color:#1a202c; text-align:left; }
    .os-card h4 { margin:0 0 6px 0; color:#1e3a5f; font-size:.95rem; }
    .os-card p { margin:4px 0; color:#4a5568; font-size:.78rem; }
    .os-badge { display:inline-block; padding:4px 8px; border-radius:999px; color:white; font-size:.68rem; font-weight:900; margin:2px 4px 2px 0; }
    .os-aberta { background:#3182ce; } .os-iniciada { background:#ed8936; } .os-execucao { background:#d69e2e; } .os-pendente { background:#c53030; } .os-concluida { background:#38a169; } .os-cancelada { background:#718096; }
    .empty-box { background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.18); border-radius:15px; padding:16px; text-align:center; color:#bee3f8; font-weight:700; }
    .grid-2 { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:10px; }
    .hidden { display:none !important; }
  </style>
</head>
<body>
  <div id="loginScreen">
    <div class="login-card">
      <img src="./logo.png" alt="Logo DMAE">
      <h2>Sistema de Manutenção</h2>
      <p>GMAN DMAE — Gestão de Manutenção de Bombeamento e Reservação</p>
      <form id="loginFormGMAN">
        <input type="text" id="loginUser" placeholder="Usuário ou login" autocomplete="username" required>
        <input type="password" id="loginPass" placeholder="Senha" autocomplete="current-password" required>
        <button type="submit">Entrar</button>
      </form>
      <p id="loginErro"></p>
    </div>
  </div>

  <div class="top-logo">
    <img src="./logo.png" alt="Logo DMAE">
    <h1>Sistema de Manutenção</h1>
    <p class="subtitle">GMAN DMAE — Gestão de Manutenção de Bombeamento e Reservação</p>
  </div>

  <div id="userInfo" class="hidden"></div>
  <div id="apiStatus" class="status-line">GMAN 8.5.7.5 — aguardando login</div>

  <div class="systems-filter" id="systemsFilter">
    <button class="system-btn active" data-system="all">TODAS</button>
    <button class="system-btn" data-system="100">100 - Moinhos de Vento</button>
    <button class="system-btn" data-system="200">200 - São João</button>
    <button class="system-btn" data-system="300">300 - Menino Deus</button>
    <button class="system-btn" data-system="400">400 - Belém Novo</button>
    <button class="system-btn" data-system="600">600 - Ilhas</button>
    <button class="system-btn" data-system="700">700 - Tristeza</button>
    <button class="system-btn" data-system="brutas">BRUTAS</button>
  </div>

  <div class="stats">
    <div class="stat-card" id="card-ok" data-status="ok"><div class="stat-number" id="operationalCount">0</div><div class="stat-label">OPERANDO</div><div class="stat-percent" id="operationalPercent">0%</div></div>
    <div class="stat-card" id="card-alert" data-status="alert"><div class="stat-number" id="maintenanceCount">0</div><div class="stat-label">MANUTENÇÃO</div><div class="stat-percent" id="maintenancePercent">0%</div></div>
    <div class="stat-card" id="card-down" data-status="down"><div class="stat-number" id="downCount">0</div><div class="stat-label">PARADOS</div><div class="stat-percent" id="downPercent">0%</div></div>
  </div>

  <input type="text" class="search-box" id="searchInput" placeholder="🔍 Buscar por nome, código ou sistema...">

  <div class="main-actions" id="mainActions">
    <button class="action-btn primary" id="btnOrdensAbertasHome" data-action="os-abertas">📋 OS Abertas <span id="totalOrdensAbertasHome">(0)</span></button>
    <button class="action-btn" id="btnMinhasOSHome" data-action="os-minhas">👤 Minhas OS <span id="totalMinhasOSHome">(0)</span></button>
    <button class="action-btn" id="btnOrdensNaoIniciadasHome" data-action="os-nao-iniciadas" data-gestao="true">⏳ OS Não Iniciadas <span id="totalOrdensNaoIniciadasHome">(0)</span></button>
    <button class="action-btn" id="btnOrdensIniciadasHome" data-action="os-iniciadas" data-gestao="true">🛠️ OS Iniciadas <span id="totalOrdensIniciadasHome">(0)</span></button>
    <button class="action-btn" id="btnOrdensEncerradasHome" data-action="os-encerradas" data-gestao="true">✅ Ordens Encerradas <span id="totalOrdensEncerradasHome">(0)</span></button>
    <button class="action-btn" id="btnPainelKPI" data-action="kpis" data-gestao="true">📊 KPIs Industriais</button>
    <button class="action-btn" id="btnAtualizarAgora" data-action="atualizar">🔄 Atualizar agora</button>
    <button class="action-btn" id="btnLimparCache" data-action="limpar-cache">🧹 Limpar cache</button>
  </div>

  <div class="equipment-list" id="equipmentList"></div>

  <script>
  (function(){
    'use strict';

    const GMAN = {
      versaoIndex: 'GMAN 8.5.7.5 — Index clássico limpo sem Núcleo e sem ações antigas',
      apiUrl: 'https://script.google.com/macros/s/AKfycbwyF6kMzoDhLiM1B4-1qW40wNrbH9tmXAIqUzJj7a2Rz7Jocjju29LnwKbmubbxpSZh/exec',
      storageUser: 'GMAN_USUARIO_LOGADO_OFICIAL_8575',
      syncMs: 120000
    };

    const state = {
      usuario: null,
      equipamentos: [],
      ordens: [],
      filtroSistema: 'all',
      filtroStatus: '',
      busca: '',
      sincronizando: false,
      timer: null
    };

    const perfilGestao = ['administrador','gerente','supervisor','coordenador'];

    function $(id){ return document.getElementById(id); }
    function canon(v){ return String(v || '').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, ''); }
    function sim(v){ const c = canon(v); return c === 'sim' || c === 's' || c === 'true' || c === '1'; }
    function esc(v){ return String(v == null ? '' : v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }
    function pct(n,total){ return total ? ((n/total)*100).toFixed(1).replace('.0','') + '%' : '0%'; }
    function agora(){ return new Date().toLocaleString('pt-BR', { timeZone:'America/Sao_Paulo' }); }

    function setStatus(txt, tipo){
      const el = $('apiStatus');
      if (!el) return;
      el.className = 'status-line' + (tipo ? ' ' + tipo : '');
      el.textContent = txt;
    }

    function apiUrl(params){
      const p = new URLSearchParams(Object.assign({}, params || {}, { t: Date.now() }));
      return GMAN.apiUrl + '?' + p.toString();
    }

    async function apiGet(action, params){
      const ret = await fetch(apiUrl(Object.assign({ action }, params || {})), { cache:'no-store' });
      const json = await ret.json();
      validarRetorno(json);
      return json;
    }

    async function apiPost(action, payload){
      const ret = await fetch(GMAN.apiUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(Object.assign({ action }, payload || {}))
      });
      const json = await ret.json();
      validarRetorno(json);
      return json;
    }

    function validarRetorno(json){
      if (!json) throw new Error('Resposta vazia da API GMAN.');
      if (json.ok === false || json.sucesso === false) throw new Error(json.mensagem || json.erro || json.codigo || 'A API recusou a operação.');
    }

    function extrairLista(retorno, nomes){
      if (Array.isArray(retorno)) return retorno;
      for (const n of nomes) if (Array.isArray(retorno[n])) return retorno[n];
      if (retorno.dados && Array.isArray(retorno.dados)) return retorno.dados;
      if (retorno.resultado && Array.isArray(retorno.resultado)) return retorno.resultado;
      return [];
    }

    function ehGestao(usuario){
      if (!usuario) return false;
      if (usuario.gestao === true) return true;
      if (canon(usuario.nome).includes('paulo jurandir')) return true;
      const perfil = canon(usuario.perfil || usuario.funcao || '');
      return perfilGestao.includes(perfil);
    }

    function perfilUsuario(usuario){ return usuario ? String(usuario.perfil || usuario.funcao || '').toUpperCase() : ''; }
    function setorUsuario(usuario){ return usuario ? String(usuario.setorPadrao || usuario.area || '').toUpperCase() : ''; }

    function normalizarUsuario(retorno){
      const u = retorno.usuario || retorno.user || retorno || {};
      const nome = u.nome || u.NOME || u.name || u.login || u.LOGIN || '';
      const perfil = u.perfil || u.PERFIL || u.funcao || u.FUNCAO || '';
      const setor = u.setorPadrao || u.SETOR_PADRAO || u.area || u.AREA || '';
      const gestao = retorno.gestao === true || u.gestao === true || perfilGestao.includes(canon(perfil)) || canon(nome).includes('paulo jurandir');
      return { idUsuario: u.idUsuario || u.ID_USUARIO || '', nome, login: u.login || u.LOGIN || nome, perfil, setorPadrao: setor, gestao };
    }

    function statusClasse(statusOperacional){
      const s = canon(statusOperacional);
      if (s.includes('parado') && !s.includes('operando')) return 'down';
      if (s.includes('manutencao') || s.includes('teste') || s.includes('restricao') || s.includes('aguard')) return 'alert';
      return 'ok';
    }

    function labelStatus(e){
      return e.statusOperacional || (e.status === 'ok' ? 'Operando' : e.status === 'down' ? 'Parado' : 'Manutenção');
    }

    function equipamentoDeStatus(row){
      const id = row.ID_EQUIPAMENTO || row.idEquipamento || row.equipamento || '';
      const sistema = String(row.SISTEMA || row.sistema || '').trim();
      const statusOperacional = row.STATUS_OPERACIONAL || row.STATUS_ATUAL || row.statusOperacional || row.statusAtual || 'Operando';
      const nome = row.NOME_EQUIPAMENTO_GRUPO || row.NOME_GRUPO || row.nomeEquipamentoGrupo || row.EQUIPAMENTO || row.equipamento || id;
      const local = row.LOCAL_ESTACAO || row.localEstacao || row.LOCAL || '';
      const filtroBrutas = sim(row.FILTRO_BRUTAS || row.filtroBrutas);
      const status = statusClasse(statusOperacional);
      return {
        id, name: nome, local, systemCode: sistema, system: nomeSistema(sistema), filtroBrutas,
        tipoLocal: row.TIPO_LOCAL || row.tipoLocal || '', statusOperacional, status,
        justificativa: row.JUSTIFICATIVA_STATUS || row.OBSERVACAO || row.observacao || '',
        atualizadoEm: row.DATA_ULTIMA_ALTERACAO || row.ATUALIZADO_EM || row.horarioBrasil || ''
      };
    }

    function osApiParaTela(row){
      return {
        idOS: row.ID_OS || row.idOs || row.idOS || row.NUMERO_OS || '',
        numeroOS: row.NUMERO_OS || row.numeroOS || row.ID_OS || '',
        idEquipamento: row.ID_EQUIPAMENTO || row.idEquipamento || '',
        equipamento: row.EQUIPAMENTO || row.NOME_EQUIPAMENTO_GRUPO || row.equipamento || row.ID_EQUIPAMENTO || '',
        sistema: row.SISTEMA || row.sistema || '',
        tipoLocal: row.TIPO_LOCAL || row.tipoLocal || '',
        localEstacao: row.LOCAL_ESTACAO || row.localEstacao || '',
        statusOS: row.STATUS_OS || row.statusOS || row.status || '',
        setorEquipe: row.SETOR_EQUIPE || row.setorEquipe || row.area || '',
        tipoOs: row.TIPO_OS || row.tipoOs || row.tipoManutencao || '',
        prioridade: row.PRIORIDADE || row.prioridade || 'Normal',
        responsavel: row.RESPONSAVEL || row.responsavel || '',
        descricao: row.DESCRICAO_SOLICITACAO || row.DESCRICAO_PROBLEMA || row.descricaoSolicitacao || row.descricaoProblema || '',
        dataAbertura: row.DATA_ABERTURA || row.dataAbertura || '',
        dataInicio: row.DATA_INICIO || row.dataInicio || '',
        dataConclusao: row.DATA_CONCLUSAO || row.dataConclusao || '',
        servicoRealizado: row.SERVICO_REALIZADO || row.servicoRealizado || '',
        finalizadoPor: row.FINALIZADO_POR || row.finalizadoPor || '',
        membrosEquipe: row.MEMBROS_EQUIPE || row.membrosEquipe || ''
      };
    }

    function nomeSistema(codigo){
      const mapa = { '100':'Moinhos de Vento', '200':'São João', '300':'Menino Deus', '400':'Belém Novo', '600':'Ilhas', '700':'Tristeza' };
      return mapa[String(codigo)] || String(codigo || '');
    }

    function osEncerrada(os){ const s = canon(os.statusOS); return ['concluida','cancelada','encerrada','fechada','finalizada'].includes(s); }
    function osAberta(os){ return canon(os.statusOS) === 'aberta'; }
    function osIniciada(os){ const s = canon(os.statusOS); return s.includes('iniciada') || s.includes('execucao') || s.includes('andamento'); }
    function osPendente(os){ return canon(os.statusOS).includes('pendente'); }
    function osAtiva(os){ return !osEncerrada(os); }

    function isResponsavel(os){ return state.usuario && canon(os.responsavel) === canon(state.usuario.nome); }
    function podeAlterarOS(os){ return ehGestao(state.usuario) || isResponsavel(os); }

    async function fazerLogin(){
      const login = $('loginUser').value.trim();
      const senha = $('loginPass').value;
      const erro = $('loginErro');
      erro.style.display = 'none';
      if (!login || !senha) { erro.textContent = 'Informe usuário e senha.'; erro.style.display = 'block'; return; }
      try {
        setStatus('🔄 Validando login na API oficial...', '');
        const ret = await apiPost('login', { login, usuario: login, senha });
        state.usuario = normalizarUsuario(ret);
        if (!state.usuario.nome) throw new Error('Login validado, mas a API não retornou nome do usuário.');
        localStorage.setItem(GMAN.storageUser, JSON.stringify(state.usuario));
        $('loginScreen').style.display = 'none';
        mostrarUsuarioLogado();
        aplicarPermissoes();
        await atualizarAgora();
      } catch(e){
        erro.textContent = e.message || 'Falha no login.';
        erro.style.display = 'block';
        setStatus('⚠️ Login não validado: ' + (e.message || e), 'offline');
      }
    }

    function recuperarLoginSalvo(){
      try {
        const salvo = JSON.parse(localStorage.getItem(GMAN.storageUser) || 'null');
        if (!salvo || !salvo.nome) return false;
        state.usuario = salvo;
        $('loginScreen').style.display = 'none';
        mostrarUsuarioLogado();
        aplicarPermissoes();
        return true;
      } catch(e){ localStorage.removeItem(GMAN.storageUser); return false; }
    }

    function mostrarUsuarioLogado(){
      const box = $('userInfo');
      if (!state.usuario) { box.classList.add('hidden'); box.innerHTML = ''; return; }
      const tipo = ehGestao(state.usuario) ? 'GESTÃO' : 'OPERACIONAL';
      box.classList.remove('hidden');
      box.innerHTML = `👤 ${esc(state.usuario.nome)} | ${esc(perfilUsuario(state.usuario) || 'SEM PERFIL')} | ${tipo}${setorUsuario(state.usuario) ? ' | ' + esc(setorUsuario(state.usuario)) : ''}<button id="btnSairGMAN">Sair</button>`;
      $('btnSairGMAN').addEventListener('click', fazerLogout);
    }

    function fazerLogout(){
      localStorage.removeItem(GMAN.storageUser);
      state.usuario = null;
      $('loginScreen').style.display = 'flex';
      $('loginUser').value = '';
      $('loginPass').value = '';
      mostrarUsuarioLogado();
      aplicarPermissoes();
      setStatus('GMAN 8.5.7.5 — sessão encerrada', '');
    }

    function aplicarPermissoes(){
      const gestao = ehGestao(state.usuario);
      document.querySelectorAll('[data-gestao="true"]').forEach(el => el.classList.toggle('hidden', !gestao));
    }

    async function carregarStatus(){
      const ret = await apiGet('listarStatusAtual');
      const lista = extrairLista(ret, ['status','statusAtual','equipamentos']);
      state.equipamentos = lista.map(equipamentoDeStatus).filter(e => e.id);
      if (!state.equipamentos.length) throw new Error('A API não retornou equipamentos/status oficiais.');
    }

    async function carregarOrdens(){
      const ret = await apiGet('listarOrdensServico');
      const lista = extrairLista(ret, ['ordens','ordensServico','os']);
      state.ordens = lista.map(osApiParaTela).filter(o => o.idOS || o.numeroOS);
    }

    async function atualizarAgora(){
      if (state.sincronizando) return;
      state.sincronizando = true;
      setStatus('🔄 Sincronizando com API oficial GMAN 8.5.6.44...', '');
      try {
        await carregarStatus();
        try { await carregarOrdens(); } catch(e){ console.warn('OS não carregadas:', e); state.ordens = []; }
        atualizarTotalizadores();
        renderEquipamentos();
        aplicarPermissoes();
        setStatus(`✅ Online: API oficial GMAN conectada | ${GMAN.versaoIndex} | ${agora()}`, 'online');
      } catch(e){
        console.error(e);
        renderEquipamentos();
        setStatus('⚠️ Falha ao carregar API oficial: ' + (e.message || e), 'offline');
      } finally { state.sincronizando = false; }
    }

    function atualizarTotalizadores(){
      const total = state.equipamentos.length;
      const ok = state.equipamentos.filter(e => e.status === 'ok').length;
      const alert = state.equipamentos.filter(e => e.status === 'alert').length;
      const down = state.equipamentos.filter(e => e.status === 'down').length;
      $('operationalCount').textContent = ok;
      $('maintenanceCount').textContent = alert;
      $('downCount').textContent = down;
      $('operationalPercent').textContent = pct(ok,total);
      $('maintenancePercent').textContent = pct(alert,total);
      $('downPercent').textContent = pct(down,total);

      const abertas = state.ordens.filter(osAtiva).length;
      const nao = state.ordens.filter(osAberta).length;
      const ini = state.ordens.filter(osIniciada).length;
      const enc = state.ordens.filter(osEncerrada).length;
      const minhas = state.ordens.filter(o => osAtiva(o) && isResponsavel(o)).length;
      $('totalOrdensAbertasHome').textContent = `(${abertas})`;
      $('totalOrdensNaoIniciadasHome').textContent = `(${nao})`;
      $('totalOrdensIniciadasHome').textContent = `(${ini})`;
      $('totalOrdensEncerradasHome').textContent = `(${enc})`;
      $('totalMinhasOSHome').textContent = `(${minhas})`;
    }

    function listaFiltrada(){
      const q = canon(state.busca);
      return state.equipamentos.filter(e => {
        if (state.filtroSistema === 'brutas' && !e.filtroBrutas) return false;
        if (state.filtroSistema !== 'all' && state.filtroSistema !== 'brutas' && String(e.systemCode) !== String(state.filtroSistema)) return false;
        if (state.filtroStatus && e.status !== state.filtroStatus) return false;
        if (q && !canon([e.id,e.name,e.local,e.system,e.systemCode,e.tipoLocal,e.statusOperacional].join(' ')).includes(q)) return false;
        return true;
      });
    }

    function renderEquipamentos(){
      const box = $('equipmentList');
      const dados = listaFiltrada();
      if (!dados.length) { box.innerHTML = '<div class="empty-box">Nenhum equipamento encontrado para este filtro.</div>'; return; }
      box.innerHTML = dados.map(e => `
        <div class="equipment-item" data-eq="${esc(e.id)}">
          <div class="status-icon status-${e.status}">${e.status === 'ok' ? '✓' : e.status === 'alert' ? '!' : '✕'}</div>
          <div>
            <div class="equipment-name">${esc(e.id)} — ${esc(e.name)}</div>
            <div class="equipment-system">${esc(e.local || 'Local não informado')}<br><span class="system-tag tag-${esc(e.systemCode)}">${esc(e.systemCode)}</span> ${esc(e.system)} ${e.filtroBrutas ? ' · BRUTA' : ''}</div>
            ${e.justificativa ? `<div class="equipment-system">Justificativa: ${esc(e.justificativa)}</div>` : ''}
          </div>
          <div><span class="status-badge badge-${e.status}">${esc(labelStatus(e))}</span></div>
        </div>`).join('');
      box.querySelectorAll('.equipment-item').forEach(item => item.addEventListener('click', () => abrirGrupo(item.dataset.eq)));
    }

    function abrirGrupo(id){
      const e = state.equipamentos.find(x => x.id === id);
      if (!e) return;
      const ordensGrupo = state.ordens.filter(o => canon(o.idEquipamento) === canon(id) || canon(o.equipamento).includes(canon(id)));
      const ativa = ordensGrupo.filter(osAtiva).length;
      abrirModal(`Grupo ${esc(e.id)}`, `
        <div style="background:#ebf8ff;border-left:5px solid #3182ce;border-radius:14px;padding:12px;margin-bottom:12px;">
          <strong>${esc(e.id)} — ${esc(e.name)}</strong><br>
          Local: ${esc(e.local || '-')}<br>
          Sistema: ${esc(e.systemCode)} — ${esc(e.system)}<br>
          Status: <strong>${esc(labelStatus(e))}</strong>${e.filtroBrutas ? '<br><strong>Filtro BRUTAS:</strong> SIM' : ''}
        </div>
        <div class="grid-2" style="margin-bottom:12px;">
          <button class="action-btn primary" id="modalOSGrupo">📋 Ver OS do grupo (${ordensGrupo.length})</button>
          ${ehGestao(state.usuario) ? '<button class="action-btn success" id="modalCriarOS">➕ Abrir OS neste grupo</button>' : ''}
        </div>
        <div style="color:#4a5568;font-size:.86rem;">OS ativas no grupo: <strong>${ativa}</strong></div>
      `);
      $('modalOSGrupo').addEventListener('click', () => abrirPainelOS('grupo:' + id));
      const criar = $('modalCriarOS'); if (criar) criar.addEventListener('click', () => abrirModalCriarOS(id));
    }

    function abrirModal(titulo, corpo){
      fecharModal();
      const modal = document.createElement('div');
      modal.className = 'modal'; modal.id = 'modalGMAN';
      modal.innerHTML = `<div class="modal-card"><div class="modal-head"><h2>${titulo}</h2><button class="close-btn" id="modalFechar">Fechar</button></div><div id="modalBody">${corpo}</div></div>`;
      document.body.appendChild(modal);
      $('modalFechar').addEventListener('click', fecharModal);
    }
    function fecharModal(){ const m = $('modalGMAN'); if (m) m.remove(); }

    function classeOS(status){ const s=canon(status); if(s.includes('concl')) return 'os-concluida'; if(s.includes('cancel')) return 'os-cancelada'; if(s.includes('pend')) return 'os-pendente'; if(s.includes('inici')) return 'os-iniciada'; if(s.includes('exec') || s.includes('andamento')) return 'os-execucao'; return 'os-aberta'; }

    function filtrarOS(modo){
      let lista = state.ordens.slice();
      if (modo === 'encerradas') lista = lista.filter(osEncerrada);
      else if (modo === 'naoIniciadas') lista = lista.filter(osAberta);
      else if (modo === 'iniciadas') lista = lista.filter(osIniciada);
      else if (modo === 'minhas') lista = lista.filter(o => osAtiva(o) && isResponsavel(o));
      else if (String(modo).startsWith('grupo:')) { const id = String(modo).replace('grupo:',''); lista = lista.filter(o => canon(o.idEquipamento) === canon(id) || canon(o.equipamento).includes(canon(id))); }
      else lista = lista.filter(osAtiva);
      return lista.reverse();
    }

    function abrirPainelOS(modo){
      if (modo === 'encerradas' && !ehGestao(state.usuario)) { alert('Ordens encerradas são visíveis apenas para gestão.'); return; }
      const lista = filtrarOS(modo);
      const titulo = modo === 'encerradas' ? 'Ordens Encerradas' : modo === 'naoIniciadas' ? 'OS Não Iniciadas' : modo === 'iniciadas' ? 'OS Iniciadas' : modo === 'minhas' ? 'Minhas OS' : String(modo).startsWith('grupo:') ? 'OS do grupo' : 'OS Abertas';
      const html = `
        <div class="grid-2" style="margin-bottom:12px;">
          <button class="action-btn primary" data-modo-os="abertas">📋 OS Abertas</button>
          <button class="action-btn" data-modo-os="minhas">👤 Minhas OS</button>
          ${ehGestao(state.usuario) ? '<button class="action-btn" data-modo-os="naoIniciadas">⏳ Não Iniciadas</button><button class="action-btn" data-modo-os="iniciadas">🛠️ Iniciadas</button><button class="action-btn" data-modo-os="encerradas">✅ Encerradas</button>' : ''}
        </div>
        ${lista.length ? lista.map(cardOS).join('') : '<div style="background:#f7fafc;border-radius:12px;padding:14px;color:#4a5568;">Nenhuma OS encontrada neste filtro.</div>'}
      `;
      abrirModal(titulo, html);
      document.querySelectorAll('[data-modo-os]').forEach(b => b.addEventListener('click', () => abrirPainelOS(b.dataset.modoOs)));
      document.querySelectorAll('[data-iniciar-os]').forEach(b => b.addEventListener('click', () => iniciarOS(b.dataset.iniciarOs)));
      document.querySelectorAll('[data-andamento-os]').forEach(b => b.addEventListener('click', () => abrirModalAndamentoOS(b.dataset.andamentoOs)));
      document.querySelectorAll('[data-concluir-os]').forEach(b => b.addEventListener('click', () => abrirModalConcluirOS(b.dataset.concluirOs)));
    }

    function cardOS(os){
      const encerrada = osEncerrada(os), pendente = osPendente(os), perm = podeAlterarOS(os);
      const iniciar = !encerrada && !pendente && perm && osAberta(os);
      const andamento = !encerrada && !pendente && perm;
      const concluir = !encerrada && !pendente && perm && !osAberta(os);
      return `<div class="os-card">
        <h4>${esc(os.numeroOS || os.idOS)} — ${esc(os.equipamento || os.idEquipamento)}</h4>
        <span class="os-badge ${classeOS(os.statusOS)}">${esc(os.statusOS || 'Sem status')}</span><span class="os-badge os-aberta">${esc(os.prioridade || 'Normal')}</span>
        <p><strong>Sistema:</strong> ${esc(os.sistema || '-')} | <strong>Setor:</strong> ${esc(os.setorEquipe || '-')} | <strong>Tipo:</strong> ${esc(os.tipoOs || '-')}</p>
        <p><strong>Responsável:</strong> ${esc(os.responsavel || '-')}</p>
        <p><strong>Solicitação:</strong> ${esc(os.descricao || '-')}</p>
        ${os.dataAbertura ? `<p><strong>Abertura:</strong> ${esc(formatarData(os.dataAbertura))}</p>` : ''}
        ${!encerrada && !perm ? '<p style="color:#744210;background:#fffaf0;border-left:4px solid #d69e2e;border-radius:10px;padding:8px;font-weight:800;">🔒 Somente o responsável ou a gestão pode alterar esta OS.</p>' : ''}
        ${pendente ? '<p style="color:#742a2a;background:#fff5f5;border-left:4px solid #e53e3e;border-radius:10px;padding:8px;font-weight:800;">⚠️ OS pendente não pode ser concluída diretamente.</p>' : ''}
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;">
          ${iniciar ? `<button class="action-btn" data-iniciar-os="${esc(os.idOS)}">▶️ Iniciar</button>` : ''}
          ${andamento ? `<button class="action-btn" data-andamento-os="${esc(os.idOS)}">📝 Atualizar andamento</button>` : ''}
          ${concluir ? `<button class="action-btn success" data-concluir-os="${esc(os.idOS)}">✅ Concluir</button>` : ''}
        </div>
      </div>`;
    }

    function formatarData(v){
      if (!v) return '';
      const d = new Date(v);
      if (!isNaN(d.getTime())) return d.toLocaleString('pt-BR',{timeZone:'America/Sao_Paulo'});
      return String(v);
    }

    function abrirModalCriarOS(idEquipamento){
      const eq = state.equipamentos.find(e => e.id === idEquipamento);
      if (!eq) return alert('Grupo não localizado. Atualize a tela.');
      abrirModal('Abrir Ordem de Serviço', `
        <div style="background:#ebf8ff;border-left:5px solid #3182ce;border-radius:14px;padding:12px;margin-bottom:14px;"><strong>Grupo selecionado:</strong><br>${esc(eq.id)} — ${esc(eq.name)}<br>${esc(eq.local || '')}</div>
        <label class="form-label">Setor/equipe</label><select id="osSetor" class="form-field"><option value="">Selecione</option><option>Mecânica</option><option>Elétrica</option><option>Automação</option><option>Usinagem</option><option>Caldeiraria</option><option>Instalações Mecânicas</option></select>
        <label class="form-label">Tipo da OS</label><select id="osTipo" class="form-field"><option value="">Selecione</option><option>Corretiva</option><option>Preventiva</option><option>Preditiva</option><option>Melhoria</option></select>
        <label class="form-label">Prioridade</label><select id="osPrioridade" class="form-field"><option>Normal</option><option>Alta</option><option>Crítica</option></select>
        <label class="form-label">Responsável/executor principal</label><input id="osResponsavel" class="form-field" placeholder="Nome do responsável">

        <div style="display:flex;gap:10px;justify-content:flex-end;"><button class="close-btn" id="cancelCriarOS">Cancelar</button><button class="action-btn success" id="confirmCriarOS">Criar OS</button></div>
      `);
      $('cancelCriarOS').addEventListener('click', fecharModal);
      $('confirmCriarOS').addEventListener('click', async () => {
        const setorEquipe = $('osSetor').value, tipoOs = $('osTipo').value, prioridade = $('osPrioridade').value, responsavel = $('osResponsavel').value.trim(), descricaoSolicitacao = $('osDescricao').value.trim();
        const faltam = [];
        if(!setorEquipe) faltam.push('setor/equipe'); if(!tipoOs) faltam.push('tipo da OS'); if(!responsavel) faltam.push('responsável'); if(!descricaoSolicitacao) faltam.push('descrição');
        if(faltam.length) return alert('Preencha: ' + faltam.join(', ') + '.');
        try{
          await apiPost('criarOS', {
            usuario: state.usuario.nome, login: state.usuario.login || state.usuario.nome,
            idEquipamento: eq.id, equipamento: eq.name, sistema: eq.systemCode, tipoLocal: eq.tipoLocal, localEstacao: eq.local,
            setorEquipe, area: setorEquipe, responsavel, tipoOs, tipoManutencao: tipoOs, prioridade, descricaoSolicitacao, descricaoProblema: descricaoSolicitacao
          });
          alert('OS criada com sucesso.'); fecharModal(); await atualizarAgora(); abrirPainelOS('abertas');
        } catch(e){ alert('Erro ao criar OS: ' + e.message); }
      });
    }

    async function iniciarOS(idOS){
      const justificativa = prompt('Justificativa para iniciar a OS:');
      if (!justificativa) return alert('Justificativa obrigatória.');
      const condicaoOperacional = prompt('Condição operacional ao iniciar (Operando, Em manutenção, operando, Em manutenção, parado, Em teste ou Parado):', 'Operando');
      if (!condicaoOperacional) return;
      try { await apiPost('iniciarOS', { idOs:idOS, idOS, usuario:state.usuario.nome, login:state.usuario.login || state.usuario.nome, condicaoOperacional, justificativa }); alert('OS iniciada.'); await atualizarAgora(); abrirPainelOS('abertas'); }
      catch(e){ alert('Erro ao iniciar OS: ' + e.message); }

        <label class="form-label">Condição operacional</label><select id="andCond" class="form-field"><option>Em manutenção, parado</option><option>Em manutenção, operando</option><option>Em teste</option><option>Parado</option><option>Operando</option><option>Pendente</option></select>
        <label class="form-label">Justificativa/observação</label><textarea id="andJust" class="form-field" rows="4"></textarea>

      if(!ehGestao(state.usuario)) return alert('KPIs disponíveis somente para gestão.');
      abrirModal('KPIs Industriais', '<div id="kpiBox">🔄 Calculando KPIs...</div>');
      try {
        const ret = await apiGet('calcularKPIs');
        const box = $('kpiBox');
        const cards = ret.cards || ret.kpis || ret.resultado || [];
        if (Array.isArray(cards) && cards.length) {
          box.innerHTML = '<div class="grid-2">' + cards.map(c => `<div style="background:#f7fafc;border-left:5px solid #3182ce;border-radius:14px;padding:12px;"><strong>${esc(c.chave || c.nome || c.indicador || 'KPI')}</strong><br><span style="font-size:1.4rem;color:#1e3a5f;font-weight:900;">${esc(c.valor || c.resultado || c.total || '')}</span><br><small>${esc(c.meta || c.prova || c.descricao || '')}</small></div>`).join('') + '</div>';
        } else {
          box.innerHTML = `<pre style="white-space:pre-wrap;background:#f7fafc;border-radius:12px;padding:12px;color:#2d3748;">${esc(JSON.stringify(ret, null, 2))}</pre>`;
        }
      } catch(e){ $('kpiBox').innerHTML = `<div style="background:#fff5f5;border-left:5px solid #e53e3e;border-radius:12px;padding:12px;color:#742a2a;">Erro ao carregar KPIs: ${esc(e.message)}</div>`; }
    }

    function limparCache(){
      const manter = localStorage.getItem(GMAN.storageUser);
      Object.keys(localStorage).filter(k => k.toLowerCase().includes('gman')).forEach(k => localStorage.removeItem(k));
      if (manter) localStorage.setItem(GMAN.storageUser, manter);
      alert('Cache operacional limpo. Sessão preservada.');
    }

    function configurarEventos(){
      $('loginFormGMAN').addEventListener('submit', ev => { ev.preventDefault(); fazerLogin(); });
      $('searchInput').addEventListener('input', ev => { state.busca = ev.target.value; renderEquipamentos(); });
      document.querySelectorAll('.system-btn').forEach(btn => btn.addEventListener('click', () => {
        state.filtroSistema = btn.dataset.system;
        document.querySelectorAll('.system-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderEquipamentos();
      }));
      document.querySelectorAll('.stat-card').forEach(card => card.addEventListener('click', () => {
        const st = card.dataset.status;
        state.filtroStatus = state.filtroStatus === st ? '' : st;
        document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active'));
        if (state.filtroStatus) card.classList.add('active');
        renderEquipamentos();
      }));
      $('mainActions').addEventListener('click', ev => {
        const btn = ev.target.closest('[data-action]'); if (!btn) return;
        const ac = btn.dataset.action;
        if (ac === 'os-abertas') abrirPainelOS('abertas');
        if (ac === 'os-minhas') abrirPainelOS('minhas');
        if (ac === 'os-nao-iniciadas') abrirPainelOS('naoIniciadas');
        if (ac === 'os-iniciadas') abrirPainelOS('iniciadas');
        if (ac === 'os-encerradas') abrirPainelOS('encerradas');
        if (ac === 'kpis') abrirPainelKPI();
        if (ac === 'atualizar') atualizarAgora();
        if (ac === 'limpar-cache') limparCache();
      });
    }

    function iniciar(){
      configurarEventos();
      aplicarPermissoes();
      renderEquipamentos();
      if (recuperarLoginSalvo()) atualizarAgora();
      if (state.timer) clearInterval(state.timer);
      state.timer = setInterval(() => { if (state.usuario) atualizarAgora(); }, GMAN.syncMs);
      console.log(GMAN.versaoIndex + ' carregado sem núcleo antigo.');
    }

    window.addEventListener('load', iniciar);
  })();
  </script>
</body>
</html>
